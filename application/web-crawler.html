<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网页爬虫采集器</title>
    <style>
        /* CSS变量定义 */
        :root {
            --primary-color: #4a90e2;
            --primary-hover: #357abd;
            --danger-color: #e74c3c;
            --danger-hover: #c0392b;
            --success-color: #27ae60;
            --warning-color: #f39c12;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333333;
            --text-secondary: #666666;
            --border-color: #e1e4e8;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        /* 重置样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }

        /* 页面整体布局 */
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: var(--card-bg);
            border-radius: 8px;
            box-shadow: var(--shadow);
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* 输入区域样式 */
        .input-section {
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .input-group input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        .input-group input::placeholder {
            color: #999;
        }

        /* 按钮样式 */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-danger {
            background-color: var(--danger-color);
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background-color: var(--danger-hover);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* 模式选择 */
        .mode-selector {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background-color: var(--bg-color);
            border-radius: 6px;
        }

        .mode-selector label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .mode-selector input[type="radio"] {
            cursor: pointer;
        }

        /* 结果展示区域 */
        .result-section {
            margin-top: 20px;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .result-header h3 {
            font-size: 16px;
            color: var(--text-color);
        }

        .result-container {
            border: 2px solid var(--border-color);
            border-radius: 6px;
            background-color: #fafafa;
            min-height: 300px;
            max-height: 600px;
            overflow: auto;
            position: relative;
        }

        .result-content {
            padding: 20px;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            line-height: 1.5;
        }

        .result-placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #999;
            text-align: center;
        }

        /* 加载动画 */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* 错误提示样式 */
        .error-message {
            padding: 15px;
            background-color: #fee;
            border: 1px solid var(--danger-color);
            border-radius: 6px;
            color: var(--danger-color);
            margin-bottom: 15px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .error-message strong {
            display: block;
            margin-bottom: 5px;
        }

        /* 成功提示 */
        .success-message {
            padding: 10px 15px;
            background-color: #e8f5e9;
            border: 1px solid var(--success-color);
            border-radius: 6px;
            color: var(--success-color);
            margin-bottom: 15px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        /* 警告提示 */
        .warning-box {
            padding: 15px;
            background-color: #fff3cd;
            border: 1px solid var(--warning-color);
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #856404;
        }

        .warning-box strong {
            display: block;
            margin-bottom: 5px;
        }

        /* 响应式设计 */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .input-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            .mode-selector {
                flex-direction: column;
                gap: 10px;
            }

            .result-header {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }

        /* 滚动条样式 */
        .result-container::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .result-container::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .result-container::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }

        .result-container::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 页面头部 -->
        <div class="header">
            <h1>网页爬虫采集器</h1>
            <p>输入网址，抓取网页内容</p>
        </div>

        <!-- 警告提示 -->
        <div class="warning-box">
            <strong>⚠️ 重要提示</strong>
            由于浏览器安全策略限制，本工具无法直接抓取大部分外部网站（CORS跨域限制）。建议使用浏览器扩展或后端代理服务来实现完整的爬虫功能。
        </div>

        <!-- 错误提示区域 -->
        <div id="errorMessage" class="error-message">
            <strong>❌ 错误</strong>
            <span id="errorText"></span>
        </div>

        <!-- 成功提示区域 -->
        <div id="successMessage" class="success-message">
            ✓ 抓取成功！
        </div>

        <!-- 输入区域 -->
        <div class="input-section">
            <div class="input-group">
                <input type="text" id="urlInput" placeholder="请输入网址，例如：example.com 或 https://example.com" />
                <button id="fetchBtn" class="btn btn-primary">
                    <span>开始抓取</span>
                </button>
                <button id="cancelBtn" class="btn btn-danger" style="display: none;">
                    <span>取消</span>
                </button>
            </div>

            <!-- 模式选择 -->
            <div class="mode-selector">
                <label>
                    <input type="radio" name="parseMode" value="source" checked />
                    <span>HTML源码模式</span>
                </label>
                <label>
                    <input type="radio" name="parseMode" value="text" />
                    <span>文本提取模式</span>
                </label>
            </div>
        </div>

        <!-- 结果展示区域 -->
        <div class="result-section">
            <div class="result-header">
                <h3>抓取结果</h3>
                <button id="clearBtn" class="btn btn-primary" style="padding: 8px 16px; font-size: 13px;">
                    清空结果
                </button>
            </div>
            <div class="result-container" id="resultContainer">
                <div class="result-placeholder" id="placeholder">
                    <p>等待抓取...</p>
                    <p style="font-size: 12px; margin-top: 10px;">输入网址后点击"开始抓取"按钮</p>
                </div>
                <div class="result-content" id="resultContent" style="display: none;"></div>
                <div class="loading-overlay" id="loadingOverlay" style="display: none;">
                    <div class="spinner"></div>
                    <div class="loading-text">正在抓取中...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== 全局变量 ====================
        let abortController = null;
        let isFetching = false;

        // ==================== DOM元素引用 ====================
        const urlInput = document.getElementById('urlInput');
        const fetchBtn = document.getElementById('fetchBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const clearBtn = document.getElementById('clearBtn');
        const resultContainer = document.getElementById('resultContainer');
        const resultContent = document.getElementById('resultContent');
        const placeholder = document.getElementById('placeholder');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const successMessage = document.getElementById('successMessage');

        // ==================== 任务T3: 输入验证模块 ====================

        /**
         * 检查是否为空值
         * @param {string} value - 输入值
         * @returns {boolean} - 是否为空
         */
        function isEmpty(value) {
            return !value || value.trim() === '';
        }

        /**
         * 验证URL格式是否有效
         * @param {string} url - URL字符串
         * @returns {boolean} - 是否有效
         */
        function isValidFormat(url) {
            // URL格式正则表达式
            const urlRegex = /^(https?:\/\/)?([\da-z\.-]+)\.([a-z\.]{2,6})([\/\w \.-]*)*\/?$/i;
            return urlRegex.test(url);
        }

        /**
         * 规范化URL，自动补全协议
         * @param {string} url - URL字符串
         * @returns {string} - 规范化后的URL
         */
        function normalizeUrl(url) {
            url = url.trim();
            // 如果不以http://或https://开头，自动补全https://
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            return url;
        }

        /**
         * 主验证函数
         * @param {string} input - 用户输入的URL
         * @returns {Object} - 验证结果 {valid: boolean, url?: string, error?: string}
         */
        function validateUrl(input) {
            // 空值检查
            if (isEmpty(input)) {
                return {
                    valid: false,
                    error: '请输入网址'
                };
            }

            // 规范化URL
            const normalizedUrl = normalizeUrl(input);

            // 格式验证
            if (!isValidFormat(normalizedUrl)) {
                return {
                    valid: false,
                    error: '请输入有效的网址格式'
                };
            }

            // 检查协议是否为http或https
            if (!normalizedUrl.startsWith('http://') && !normalizedUrl.startsWith('https://')) {
                return {
                    valid: false,
                    error: '仅支持http和https协议'
                };
            }

            return {
                valid: true,
                url: normalizedUrl
            };
        }

        // ==================== 任务T4: 网络请求模块 ====================

        /**
         * 创建超时控制器
         * @param {number} timeout - 超时时间（毫秒）
         * @returns {Object} - {controller, timeoutId}
         */
        function createTimeoutController(timeout = 30000) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => {
                controller.abort();
            }, timeout);
            return { controller, timeoutId };
        }

        /**
         * 核心请求函数
         * @param {string} url - 目标URL
         * @param {number} timeout - 超时时间
         * @returns {Promise<string>} - 网页内容
         */
        async function fetchUrl(url, timeout = 30000) {
            const { controller, timeoutId } = createTimeoutController(timeout);
            abortController = controller;

            try {
                const response = await fetch(url, {
                    method: 'GET',
                    mode: 'cors',
                    cache: 'no-cache',
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                // 处理响应状态
                if (!response.ok) {
                    throw {
                        type: 'HTTP_ERROR',
                        status: response.status,
                        message: `HTTP ${response.status}: ${response.statusText}`
                    };
                }

                const content = await response.text();
                return content;
            } catch (error) {
                clearTimeout(timeoutId);
                throw error;
            }
        }

        /**
         * 取消请求
         */
        function cancelRequest() {
            if (abortController) {
                abortController.abort();
                abortController = null;
            }
        }

        // ==================== 任务T5: 内容解析模块 ====================

        /**
         * 提取纯文本内容
         * @param {string} html - HTML内容
         * @returns {string} - 纯文本
         */
        function extractText(html) {
            // 创建临时DOM解析器
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');

            // 移除script和style标签
            const scripts = doc.querySelectorAll('script, style');
            scripts.forEach(script => script.remove());

            // 提取文本内容
            return doc.body.textContent || doc.body.innerText || '';
        }

        /**
         * 格式化HTML源码（保持原样）
         * @param {string} html - HTML内容
         * @returns {string} - 格式化后的HTML
         */
        function formatHtml(html) {
            return html;
        }

        /**
         * 主解析函数
         * @param {string} content - 网页内容
         * @param {string} mode - 解析模式 ('source' 或 'text')
         * @returns {string} - 解析后的内容
         */
        function parseContent(content, mode) {
            if (mode === 'text') {
                return extractText(content);
            } else {
                return formatHtml(content);
            }
        }

        // ==================== 任务T6: 结果展示模块 ====================

        /**
         * HTML转义函数，防止XSS攻击
         * @param {string} text - 原始文本
         * @returns {string} - 转义后的文本
         */
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        /**
         * 展示内容
         * @param {string} content - 要展示的内容
         */
        function displayContent(content) {
            // 隐藏占位符
            placeholder.style.display = 'none';
            // 显示结果区域
            resultContent.style.display = 'block';
            // 使用转义后的内容，防止XSS
            resultContent.textContent = content;
        }

        /**
         * 清空结果
         */
        function clearResult() {
            resultContent.textContent = '';
            resultContent.style.display = 'none';
            placeholder.style.display = 'block';
            hideError();
            hideSuccess();
        }

        // ==================== 任务T7: 错误处理机制 ====================

        /**
         * 识别错误类型并返回用户友好的错误消息
         * @param {Error} error - 错误对象
         * @returns {string} - 错误消息
         */
        function getErrorMessage(error) {
            // 超时或取消错误
            if (error.name === 'AbortError') {
                return '请求超时或已取消，请稍后重试';
            }

            // CORS跨域错误
            if (error.message && (
                error.message.includes('CORS') ||
                error.message.includes('Failed to fetch') ||
                error.message.includes('NetworkError')
            )) {
                return '跨域请求被阻止（CORS限制）。这是浏览器的安全策略，无法直接抓取该网站。建议：\n1. 使用浏览器扩展（如CORS Unblock）\n2. 使用后端代理服务\n3. 抓取允许跨域的网站';
            }

            // HTTP状态错误
            if (error.type === 'HTTP_ERROR') {
                switch (error.status) {
                    case 404:
                        return '目标页面不存在（404错误）';
                    case 403:
                        return '访问被拒绝（403错误）';
                    case 500:
                        return '服务器内部错误（500错误）';
                    case 503:
                        return '服务暂时不可用（503错误）';
                    default:
                        return `HTTP错误：${error.status} ${error.message}`;
                }
            }

            // 网络错误
            if (error.message && error.message.includes('network')) {
                return '网络连接失败，请检查网络连接';
            }

            // 其他错误
            return `抓取失败：${error.message || '未知错误'}`;
        }

        /**
         * 显示错误消息
         * @param {string} message - 错误消息
         */
        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.add('show');
            hideSuccess();
        }

        /**
         * 隐藏错误消息
         */
        function hideError() {
            errorMessage.classList.remove('show');
        }

        /**
         * 显示成功消息
         */
        function showSuccess() {
            successMessage.classList.add('show');
            hideError();
        }

        /**
         * 隐藏成功消息
         */
        function hideSuccess() {
            successMessage.classList.remove('show');
        }

        // ==================== UI状态管理 ====================

        /**
         * 设置加载状态
         * @param {boolean} loading - 是否加载中
         */
        function setLoading(loading) {
            isFetching = loading;
            
            if (loading) {
                loadingOverlay.style.display = 'flex';
                fetchBtn.style.display = 'none';
                cancelBtn.style.display = 'inline-flex';
                urlInput.disabled = true;
            } else {
                loadingOverlay.style.display = 'none';
                fetchBtn.style.display = 'inline-flex';
                cancelBtn.style.display = 'none';
                urlInput.disabled = false;
            }
        }

        /**
         * 获取当前选择的解析模式
         * @returns {string} - 解析模式
         */
        function getParseMode() {
            const selected = document.querySelector('input[name="parseMode"]:checked');
            return selected ? selected.value : 'source';
        }

        // ==================== 任务T8: 整合测试与优化 ====================

        /**
         * 主流程函数 - 点击抓取按钮
         */
        async function onFetchClick() {
            // 清空之前的错误和成功提示
            hideError();
            hideSuccess();

            // 获取并验证URL
            const input = urlInput.value;
            const validation = validateUrl(input);

            if (!validation.valid) {
                showError(validation.error);
                return;
            }

            // 设置加载状态
            setLoading(true);

            try {
                // 发起网络请求
                const content = await fetchUrl(validation.url, 30000);

                // 解析内容
                const mode = getParseMode();
                const parsedContent = parseContent(content, mode);

                // 展示结果
                displayContent(parsedContent);
                showSuccess();

            } catch (error) {
                // 处理错误
                const errorMsg = getErrorMessage(error);
                showError(errorMsg);
                console.error('抓取错误:', error);
            } finally {
                // 恢复UI状态
                setLoading(false);
                abortController = null;
            }
        }

        /**
         * 取消按钮点击处理
         */
        function onCancelClick() {
            cancelRequest();
            setLoading(false);
            showError('请求已取消');
        }

        /**
         * 清空按钮点击处理
         */
        function onClearClick() {
            clearResult();
        }

        /**
         * 输入框回车事件处理
         * @param {KeyboardEvent} event - 键盘事件
         */
        function onInputKeypress(event) {
            if (event.key === 'Enter' && !isFetching) {
                onFetchClick();
            }
        }

        /**
         * 初始化函数 - 绑定所有事件
         */
        function init() {
            // 绑定抓取按钮点击事件
            fetchBtn.addEventListener('click', onFetchClick);

            // 绑定取消按钮点击事件
            cancelBtn.addEventListener('click', onCancelClick);

            // 绑定清空按钮点击事件
            clearBtn.addEventListener('click', onClearClick);

            // 绑定输入框回车事件
            urlInput.addEventListener('keypress', onInputKeypress);

            // 页面加载完成后聚焦到输入框
            urlInput.focus();

            console.log('网页爬虫采集器已初始化');
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
