<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网页爬虫采集器 - 增强版</title>
    <style>
        /* CSS变量定义 */
        :root {
            --primary-color: #4a90e2;
            --primary-hover: #357abd;
            --danger-color: #e74c3c;
            --danger-hover: #c0392b;
            --success-color: #27ae60;
            --warning-color: #f39c12;
            --info-color: #3498db;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333333;
            --text-secondary: #666666;
            --border-color: #e1e4e8;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        /* 重置样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }

        /* 页面整体布局 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: var(--card-bg);
            border-radius: 8px;
            box-shadow: var(--shadow);
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* 输入区域样式 */
        .input-section {
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .input-group input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        .input-group input::placeholder {
            color: #999;
        }

        /* 按钮样式 */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-danger {
            background-color: var(--danger-color);
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background-color: var(--danger-hover);
        }

        .btn-success {
            background-color: var(--success-color);
            color: white;
        }

        .btn-success:hover:not(:disabled) {
            background-color: #229954;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* 模式选择 */
        .mode-selector {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background-color: var(--bg-color);
            border-radius: 6px;
            flex-wrap: wrap;
        }

        .mode-selector label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .mode-selector input[type="radio"] {
            cursor: pointer;
        }

        /* Tab切换 */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .tab {
            padding: 10px 20px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }

        .tab:hover {
            color: var(--primary-color);
        }

        .tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        /* 结果展示区域 */
        .result-section {
            margin-top: 20px;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .result-header h3 {
            font-size: 16px;
            color: var(--text-color);
        }

        .result-container {
            border: 2px solid var(--border-color);
            border-radius: 6px;
            background-color: #fafafa;
            min-height: 300px;
            max-height: 600px;
            overflow: auto;
            position: relative;
        }

        .result-content {
            padding: 20px;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            line-height: 1.5;
        }

        .result-placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #999;
            text-align: center;
        }

        /* 资源列表 */
        .resource-list {
            padding: 20px;
        }

        .resource-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }

        .resource-item:hover {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border-color: var(--primary-color);
        }

        .resource-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .resource-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 20px;
        }

        .resource-icon.video {
            background-color: #e3f2fd;
            color: #1976d2;
        }

        .resource-icon.audio {
            background-color: #f3e5f5;
            color: #7b1fa2;
        }

        .resource-icon.file {
            background-color: #e8f5e9;
            color: #388e3c;
        }

        .resource-details {
            flex: 1;
        }

        .resource-name {
            font-weight: 500;
            color: var(--text-color);
            margin-bottom: 4px;
            word-break: break-all;
        }

        .resource-meta {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .resource-actions {
            display: flex;
            gap: 8px;
        }

        .resource-actions .btn {
            padding: 8px 16px;
            font-size: 13px;
        }

        /* 预览区域 */
        .preview-container {
            padding: 20px;
            text-align: center;
        }

        .preview-video, .preview-audio {
            max-width: 100%;
            margin: 0 auto;
        }

        .preview-video video {
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
        }

        .preview-audio audio {
            width: 100%;
            max-width: 600px;
        }

        /* 加载动画 */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* 进度条 */
        .progress-bar {
            width: 300px;
            height: 6px;
            background-color: var(--border-color);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--primary-color);
            transition: width 0.3s;
        }

        /* 错误提示样式 */
        .error-message {
            padding: 15px;
            background-color: #fee;
            border: 1px solid var(--danger-color);
            border-radius: 6px;
            color: var(--danger-color);
            margin-bottom: 15px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .error-message strong {
            display: block;
            margin-bottom: 5px;
        }

        /* 成功提示 */
        .success-message {
            padding: 10px 15px;
            background-color: #e8f5e9;
            border: 1px solid var(--success-color);
            border-radius: 6px;
            color: var(--success-color);
            margin-bottom: 15px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        /* 警告提示 */
        .warning-box {
            padding: 15px;
            background-color: #fff3cd;
            border: 1px solid var(--warning-color);
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #856404;
        }

        .warning-box strong {
            display: block;
            margin-bottom: 5px;
        }

        /* 统计信息 */
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background-color: var(--bg-color);
            border-radius: 6px;
        }

        .stat-item {
            flex: 1;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: var(--primary-color);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .input-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            .mode-selector {
                flex-direction: column;
                gap: 10px;
            }

            .result-header {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }

            .resource-item {
                flex-direction: column;
                gap: 10px;
            }

            .resource-actions {
                width: 100%;
            }

            .resource-actions .btn {
                flex: 1;
            }

            .stats {
                flex-direction: column;
            }

            .tabs {
                flex-wrap: wrap;
            }
        }

        /* 滚动条样式 */
        .result-container::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .result-container::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .result-container::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }

        .result-container::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }

        /* 隐藏类 */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 页面头部 -->
        <div class="header">
            <h1>网页爬虫采集器 - 增强版</h1>
            <p>抓取网页内容、视频、音频和文件资源</p>
        </div>

        <!-- 警告提示 -->
        <div class="warning-box">
            <strong>⚠️ 重要提示</strong>
            由于浏览器安全策略限制，本工具无法直接抓取大部分外部网站（CORS跨域限制）。建议使用浏览器扩展或后端代理服务来实现完整的爬虫功能。
        </div>

        <!-- 错误提示区域 -->
        <div id="errorMessage" class="error-message">
            <strong>❌ 错误</strong>
            <span id="errorText"></span>
        </div>

        <!-- 成功提示区域 -->
        <div id="successMessage" class="success-message">
            ✓ 操作成功！
        </div>

        <!-- 输入区域 -->
        <div class="input-section">
            <div class="input-group">
                <input type="text" id="urlInput" placeholder="请输入网址，例如：example.com 或 https://example.com" />
                <button id="fetchBtn" class="btn btn-primary">
                    <span>开始抓取</span>
                </button>
                <button id="cancelBtn" class="btn btn-danger" style="display: none;">
                    <span>取消</span>
                </button>
            </div>

            <!-- 模式选择 -->
            <div class="mode-selector">
                <label>
                    <input type="radio" name="parseMode" value="source" checked />
                    <span>HTML源码</span>
                </label>
                <label>
                    <input type="radio" name="parseMode" value="text" />
                    <span>文本提取</span>
                </label>
                <label>
                    <input type="radio" name="parseMode" value="resources" />
                    <span>资源提取</span>
                </label>
            </div>
        </div>

        <!-- Tab切换 -->
        <div class="tabs">
            <button class="tab active" data-tab="content">网页内容</button>
            <button class="tab" data-tab="videos">视频资源</button>
            <button class="tab" data-tab="audios">音频资源</button>
            <button class="tab" data-tab="files">文件资源</button>
        </div>

        <!-- 统计信息 -->
        <div class="stats" id="statsSection">
            <div class="stat-item">
                <div class="stat-value" id="videoCount">0</div>
                <div class="stat-label">视频资源</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="audioCount">0</div>
                <div class="stat-label">音频资源</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="fileCount">0</div>
                <div class="stat-label">文件资源</div>
            </div>
        </div>

        <!-- 结果展示区域 -->
        <div class="result-section">
            <div class="result-header">
                <h3 id="resultTitle">抓取结果</h3>
                <button id="clearBtn" class="btn btn-primary" style="padding: 8px 16px; font-size: 13px;">
                    清空结果
                </button>
            </div>
            <div class="result-container" id="resultContainer">
                <div class="result-placeholder" id="placeholder">
                    <p>等待抓取...</p>
                    <p style="font-size: 12px; margin-top: 10px;">输入网址后点击"开始抓取"按钮</p>
                </div>
                <div class="result-content" id="resultContent" style="display: none;"></div>
                <div class="resource-list" id="resourceList" style="display: none;"></div>
                <div class="preview-container" id="previewContainer" style="display: none;"></div>
                <div class="loading-overlay" id="loadingOverlay" style="display: none;">
                    <div class="spinner"></div>
                    <div class="loading-text" id="loadingText">正在抓取中...</div>
                    <div class="progress-bar" id="progressBar" style="display: none;">
                        <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== 全局变量 ====================
        let abortController = null;
        let isFetching = false;
        let currentTab = 'content';
        let extractedResources = {
            videos: [],
            audios: [],
            files: []
        };

        // ==================== DOM元素引用 ====================
        const urlInput = document.getElementById('urlInput');
        const fetchBtn = document.getElementById('fetchBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const clearBtn = document.getElementById('clearBtn');
        const resultContainer = document.getElementById('resultContainer');
        const resultContent = document.getElementById('resultContent');
        const resourceList = document.getElementById('resourceList');
        const previewContainer = document.getElementById('previewContainer');
        const placeholder = document.getElementById('placeholder');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const successMessage = document.getElementById('successMessage');
        const resultTitle = document.getElementById('resultTitle');
        const statsSection = document.getElementById('statsSection');

        // ==================== 输入验证模块 ====================

        function isEmpty(value) {
            return !value || value.trim() === '';
        }

        function isValidFormat(url) {
            const urlRegex = /^(https?:\/\/)?([\da-z\.-]+)\.([a-z\.]{2,6})([\/\w \.-]*)*\/?$/i;
            return urlRegex.test(url);
        }

        function normalizeUrl(url) {
            url = url.trim();
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            return url;
        }

        function validateUrl(input) {
            if (isEmpty(input)) {
                return { valid: false, error: '请输入网址' };
            }

            const normalizedUrl = normalizeUrl(input);

            if (!isValidFormat(normalizedUrl)) {
                return { valid: false, error: '请输入有效的网址格式' };
            }

            if (!normalizedUrl.startsWith('http://') && !normalizedUrl.startsWith('https://')) {
                return { valid: false, error: '仅支持http和https协议' };
            }

            return { valid: true, url: normalizedUrl };
        }

        // ==================== 网络请求模块 ====================

        function createTimeoutController(timeout = 30000) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => {
                controller.abort();
            }, timeout);
            return { controller, timeoutId };
        }

        async function fetchUrl(url, timeout = 30000) {
            const { controller, timeoutId } = createTimeoutController(timeout);
            abortController = controller;

            try {
                const response = await fetch(url, {
                    method: 'GET',
                    mode: 'cors',
                    cache: 'no-cache',
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                if (!response.ok) {
                    throw {
                        type: 'HTTP_ERROR',
                        status: response.status,
                        message: `HTTP ${response.status}: ${response.statusText}`
                    };
                }

                const content = await response.text();
                return content;
            } catch (error) {
                clearTimeout(timeoutId);
                throw error;
            }
        }

        function cancelRequest() {
            if (abortController) {
                abortController.abort();
                abortController = null;
            }
        }

        // ==================== 内容解析模块 ====================

        function extractText(html) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const scripts = doc.querySelectorAll('script, style');
            scripts.forEach(script => script.remove());
            return doc.body.textContent || doc.body.innerText || '';
        }

        function formatHtml(html) {
            return html;
        }

        // ==================== 资源提取模块 ====================

        /**
         * 从HTML中提取所有资源链接
         * @param {string} html - HTML内容
         * @param {string} baseUrl - 基础URL用于解析相对路径
         * @returns {Object} - {videos, audios, files}
         */
        function extractResources(html, baseUrl) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            
            const videos = [];
            const audios = [];
            const files = [];

            // 提取视频资源
            // 1. <video> 标签
            doc.querySelectorAll('video').forEach(video => {
                const src = video.src || video.querySelector('source')?.src;
                if (src) {
                    videos.push({
                        url: resolveUrl(src, baseUrl),
                        type: getVideoType(src),
                        name: getFileName(src)
                    });
                }
            });

            // 2. <source> 标签（视频类型）
            doc.querySelectorAll('source[type^="video"]').forEach(source => {
                if (source.src) {
                    videos.push({
                        url: resolveUrl(source.src, baseUrl),
                        type: source.type || getVideoType(source.src),
                        name: getFileName(source.src)
                    });
                }
            });

            // 3. <a> 标签链接到视频文件
            doc.querySelectorAll('a[href]').forEach(link => {
                const href = link.href;
                if (isVideoUrl(href)) {
                    videos.push({
                        url: resolveUrl(href, baseUrl),
                        type: getVideoType(href),
                        name: link.textContent.trim() || getFileName(href)
                    });
                }
            });

            // 提取音频资源
            // 1. <audio> 标签
            doc.querySelectorAll('audio').forEach(audio => {
                const src = audio.src || audio.querySelector('source')?.src;
                if (src) {
                    audios.push({
                        url: resolveUrl(src, baseUrl),
                        type: getAudioType(src),
                        name: getFileName(src)
                    });
                }
            });

            // 2. <source> 标签（音频类型）
            doc.querySelectorAll('source[type^="audio"]').forEach(source => {
                if (source.src) {
                    audios.push({
                        url: resolveUrl(source.src, baseUrl),
                        type: source.type || getAudioType(source.src),
                        name: getFileName(source.src)
                    });
                }
            });

            // 3. <a> 标签链接到音频文件
            doc.querySelectorAll('a[href]').forEach(link => {
                const href = link.href;
                if (isAudioUrl(href)) {
                    audios.push({
                        url: resolveUrl(href, baseUrl),
                        type: getAudioType(href),
                        name: link.textContent.trim() || getFileName(href)
                    });
                }
            });

            // 提取文件资源
            doc.querySelectorAll('a[href]').forEach(link => {
                const href = link.href;
                if (isFileUrl(href)) {
                    files.push({
                        url: resolveUrl(href, baseUrl),
                        type: getFileType(href),
                        name: link.textContent.trim() || getFileName(href)
                    });
                }
            });

            // 去重
            return {
                videos: uniqueResources(videos),
                audios: uniqueResources(audios),
                files: uniqueResources(files)
            };
        }

        /**
         * 解析URL（处理相对路径）
         */
        function resolveUrl(url, baseUrl) {
            try {
                return new URL(url, baseUrl).href;
            } catch {
                return url;
            }
        }

        /**
         * 判断是否为视频URL
         */
        function isVideoUrl(url) {
            const videoExts = ['.mp4', '.webm', '.ogg', '.avi', '.mov', '.wmv', '.flv', '.mkv', '.m4v'];
            return videoExts.some(ext => url.toLowerCase().includes(ext));
        }

        /**
         * 判断是否为音频URL
         */
        function isAudioUrl(url) {
            const audioExts = ['.mp3', '.wav', '.ogg', '.aac', '.flac', '.m4a', '.wma'];
            return audioExts.some(ext => url.toLowerCase().includes(ext));
        }

        /**
         * 判断是否为文件URL
         */
        function isFileUrl(url) {
            const fileExts = ['.pdf', '.doc', '.docx', '.xls', '.xlsx', '.ppt', '.pptx', 
                            '.zip', '.rar', '.7z', '.tar', '.gz', 
                            '.txt', '.csv', '.json', '.xml',
                            '.jpg', '.jpeg', '.png', '.gif', '.svg', '.webp', '.bmp'];
            return fileExts.some(ext => url.toLowerCase().includes(ext));
        }

        /**
         * 获取视频类型
         */
        function getVideoType(url) {
            const ext = url.split('.').pop().toLowerCase().split('?')[0];
            const typeMap = {
                'mp4': 'video/mp4',
                'webm': 'video/webm',
                'ogg': 'video/ogg',
                'avi': 'video/x-msvideo',
                'mov': 'video/quicktime',
                'wmv': 'video/x-ms-wmv',
                'flv': 'video/x-flv',
                'mkv': 'video/x-matroska'
            };
            return typeMap[ext] || 'video/mp4';
        }

        /**
         * 获取音频类型
         */
        function getAudioType(url) {
            const ext = url.split('.').pop().toLowerCase().split('?')[0];
            const typeMap = {
                'mp3': 'audio/mpeg',
                'wav': 'audio/wav',
                'ogg': 'audio/ogg',
                'aac': 'audio/aac',
                'flac': 'audio/flac',
                'm4a': 'audio/mp4'
            };
            return typeMap[ext] || 'audio/mpeg';
        }

        /**
         * 获取文件类型
         */
        function getFileType(url) {
            const ext = url.split('.').pop().toLowerCase().split('?')[0];
            return ext.toUpperCase() + ' 文件';
        }

        /**
         * 获取文件名
         */
        function getFileName(url) {
            try {
                const pathname = new URL(url).pathname;
                return pathname.split('/').pop() || '未命名';
            } catch {
                return url.split('/').pop() || '未命名';
            }
        }

        /**
         * 资源去重
         */
        function uniqueResources(resources) {
            const seen = new Set();
            return resources.filter(resource => {
                if (seen.has(resource.url)) {
                    return false;
                }
                seen.add(resource.url);
                return true;
            });
        }

        // ==================== 结果展示模块 ====================

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function displayContent(content) {
            placeholder.style.display = 'none';
            resultContent.style.display = 'block';
            resourceList.style.display = 'none';
            previewContainer.style.display = 'none';
            resultContent.textContent = content;
        }

        function displayResources(resources) {
            placeholder.style.display = 'none';
            resultContent.style.display = 'none';
            resourceList.style.display = 'block';
            previewContainer.style.display = 'none';
            
            resourceList.innerHTML = '';
            
            const currentResources = getCurrentResources();
            
            if (currentResources.length === 0) {
                resourceList.innerHTML = '<p style="text-align: center; color: #999; padding: 40px;">未找到相关资源</p>';
                return;
            }

            currentResources.forEach((resource, index) => {
                const item = createResourceItem(resource, index);
                resourceList.appendChild(item);
            });
        }

        function getCurrentResources() {
            switch (currentTab) {
                case 'videos':
                    return extractedResources.videos;
                case 'audios':
                    return extractedResources.audios;
                case 'files':
                    return extractedResources.files;
                default:
                    return [];
            }
        }

        function createResourceItem(resource, index) {
            const item = document.createElement('div');
            item.className = 'resource-item';
            
            const iconClass = currentTab === 'videos' ? 'video' : 
                            currentTab === 'audios' ? 'audio' : 'file';
            
            const iconSymbol = currentTab === 'videos' ? '🎬' : 
                             currentTab === 'audios' ? '🎵' : '📄';

            item.innerHTML = `
                <div class="resource-info">
                    <div class="resource-icon ${iconClass}">${iconSymbol}</div>
                    <div class="resource-details">
                        <div class="resource-name">${escapeHtml(resource.name)}</div>
                        <div class="resource-meta">${resource.type} | ${resource.url}</div>
                    </div>
                </div>
                <div class="resource-actions">
                    ${currentTab !== 'files' ? `<button class="btn btn-primary" onclick="previewResource(${index})">预览</button>` : ''}
                    <button class="btn btn-success" onclick="downloadResource(${index})">下载</button>
                </div>
            `;

            return item;
        }

        function clearResult() {
            resultContent.textContent = '';
            resultContent.style.display = 'none';
            resourceList.innerHTML = '';
            resourceList.style.display = 'none';
            previewContainer.innerHTML = '';
            previewContainer.style.display = 'none';
            placeholder.style.display = 'block';
            hideError();
            hideSuccess();
            extractedResources = { videos: [], audios: [], files: [] };
            updateStats();
        }

        // ==================== 资源操作模块 ====================

        function previewResource(index) {
            const resources = getCurrentResources();
            const resource = resources[index];
            
            if (!resource) return;

            placeholder.style.display = 'none';
            resultContent.style.display = 'none';
            resourceList.style.display = 'none';
            previewContainer.style.display = 'block';
            previewContainer.innerHTML = '';

            if (currentTab === 'videos') {
                const previewDiv = document.createElement('div');
                previewDiv.className = 'preview-video';
                previewDiv.innerHTML = `
                    <video controls crossorigin="anonymous">
                        <source src="${escapeHtml(resource.url)}" type="${resource.type}">
                        您的浏览器不支持视频播放
                    </video>
                    <p style="margin-top: 15px; color: var(--text-secondary);">${escapeHtml(resource.name)}</p>
                `;
                previewContainer.appendChild(previewDiv);
            } else if (currentTab === 'audios') {
                const previewDiv = document.createElement('div');
                previewDiv.className = 'preview-audio';
                previewDiv.innerHTML = `
                    <audio controls crossorigin="anonymous">
                        <source src="${escapeHtml(resource.url)}" type="${resource.type}">
                        您的浏览器不支持音频播放
                    </audio>
                    <p style="margin-top: 15px; color: var(--text-secondary);">${escapeHtml(resource.name)}</p>
                `;
                previewContainer.appendChild(previewDiv);
            }
        }

        async function downloadResource(index) {
            const resources = getCurrentResources();
            const resource = resources[index];
            
            if (!resource) return;

            try {
                showLoading('正在下载...');
                
                const response = await fetch(resource.url, {
                    mode: 'cors',
                    cache: 'no-cache'
                });

                if (!response.ok) {
                    throw new Error(`下载失败: ${response.status}`);
                }

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = resource.name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                hideLoading();
                showSuccess();
            } catch (error) {
                hideLoading();
                showError(`下载失败: ${error.message}`);
            }
        }

        // ==================== 错误处理机制 ====================

        function getErrorMessage(error) {
            if (error.name === 'AbortError') {
                return '请求超时或已取消，请稍后重试';
            }

            if (error.message && (
                error.message.includes('CORS') ||
                error.message.includes('Failed to fetch') ||
                error.message.includes('NetworkError')
            )) {
                return '跨域请求被阻止（CORS限制）。这是浏览器的安全策略，无法直接抓取该网站。建议：\n1. 使用浏览器扩展（如CORS Unblock）\n2. 使用后端代理服务\n3. 抓取允许跨域的网站';
            }

            if (error.type === 'HTTP_ERROR') {
                switch (error.status) {
                    case 404:
                        return '目标页面不存在（404错误）';
                    case 403:
                        return '访问被拒绝（403错误）';
                    case 500:
                        return '服务器内部错误（500错误）';
                    case 503:
                        return '服务暂时不可用（503错误）';
                    default:
                        return `HTTP错误：${error.status} ${error.message}`;
                }
            }

            if (error.message && error.message.includes('network')) {
                return '网络连接失败，请检查网络连接';
            }

            return `抓取失败：${error.message || '未知错误'}`;
        }

        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.add('show');
            hideSuccess();
        }

        function hideError() {
            errorMessage.classList.remove('show');
        }

        function showSuccess() {
            successMessage.classList.add('show');
            hideError();
        }

        function hideSuccess() {
            successMessage.classList.remove('show');
        }

        // ==================== UI状态管理 ====================

        function showLoading(text = '正在抓取中...') {
            isFetching = true;
            loadingOverlay.style.display = 'flex';
            loadingText.textContent = text;
            fetchBtn.style.display = 'none';
            cancelBtn.style.display = 'inline-flex';
            urlInput.disabled = true;
        }

        function hideLoading() {
            isFetching = false;
            loadingOverlay.style.display = 'none';
            fetchBtn.style.display = 'inline-flex';
            cancelBtn.style.display = 'none';
            urlInput.disabled = false;
        }

        function setLoading(loading) {
            if (loading) {
                showLoading();
            } else {
                hideLoading();
            }
        }

        function updateStats() {
            document.getElementById('videoCount').textContent = extractedResources.videos.length;
            document.getElementById('audioCount').textContent = extractedResources.audios.length;
            document.getElementById('fileCount').textContent = extractedResources.files.length;
        }

        function getParseMode() {
            const selected = document.querySelector('input[name="parseMode"]:checked');
            return selected ? selected.value : 'source';
        }

        function switchTab(tab) {
            currentTab = tab;
            
            // 更新tab样式
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.remove('active');
            });
            document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');

            // 更新标题
            const titles = {
                'content': '网页内容',
                'videos': '视频资源',
                'audios': '音频资源',
                'files': '文件资源'
            };
            resultTitle.textContent = titles[tab];

            // 显示对应内容
            if (tab === 'content') {
                statsSection.style.display = 'none';
                if (resultContent.textContent) {
                    displayContent(resultContent.textContent);
                }
            } else {
                statsSection.style.display = 'flex';
                displayResources(extractedResources);
            }
        }

        // ==================== 主流程函数 ====================

        async function onFetchClick() {
            hideError();
            hideSuccess();

            const input = urlInput.value;
            const validation = validateUrl(input);

            if (!validation.valid) {
                showError(validation.error);
                return;
            }

            setLoading(true);

            try {
                const content = await fetchUrl(validation.url, 30000);
                const mode = getParseMode();

                if (mode === 'resources') {
                    // 提取所有资源
                    extractedResources = extractResources(content, validation.url);
                    updateStats();
                    
                    // 自动切换到视频tab
                    switchTab('videos');
                    
                    showSuccess();
                } else {
                    const parsedContent = parseContent(content, mode);
                    displayContent(parsedContent);
                    showSuccess();
                }

            } catch (error) {
                const errorMsg = getErrorMessage(error);
                showError(errorMsg);
                console.error('抓取错误:', error);
            } finally {
                setLoading(false);
                abortController = null;
            }
        }

        function parseContent(content, mode) {
            if (mode === 'text') {
                return extractText(content);
            } else {
                return formatHtml(content);
            }
        }

        function onCancelClick() {
            cancelRequest();
            setLoading(false);
            showError('请求已取消');
        }

        function onClearClick() {
            clearResult();
        }

        function onInputKeypress(event) {
            if (event.key === 'Enter' && !isFetching) {
                onFetchClick();
            }
        }

        // ==================== 初始化 ====================

        function init() {
            fetchBtn.addEventListener('click', onFetchClick);
            cancelBtn.addEventListener('click', onCancelClick);
            clearBtn.addEventListener('click', onClearClick);
            urlInput.addEventListener('keypress', onInputKeypress);

            // Tab切换事件
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    switchTab(tab.dataset.tab);
                });
            });

            urlInput.focus();
            console.log('网页爬虫采集器增强版已初始化');
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
