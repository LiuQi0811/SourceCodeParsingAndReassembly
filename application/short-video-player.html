<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>红果短视频播放器</title>
    <style>
        /* ========== 基础重置与全局样式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* ========== 主容器 ========== */
        #app {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }

        /* ========== 视频容器 ========== */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: translateY(0);
            transition: transform 300ms cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }

        /* ========== 覆盖层UI ========== */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* 视频标题 */
        .video-title {
            position: absolute;
            bottom: 80px;
            left: 20px;
            right: 80px;
            color: #fff;
            font-size: 16px;
            line-height: 1.5;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            word-wrap: break-word;
            pointer-events: auto;
        }

        /* 播放按钮 */
        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            opacity: 0;
            transition: opacity 200ms ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .play-button.visible {
            opacity: 1;
        }

        .play-button::after {
            content: '';
            width: 0;
            height: 0;
            border-left: 20px solid #fff;
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            margin-left: 5px;
        }

        .play-button.paused::after {
            border-left: none;
            border-top: 12px solid #fff;
            border-bottom: 12px solid #fff;
            border-right: 12px solid #fff;
            border-left: 12px solid #fff;
            width: 8px;
            height: 16px;
            margin-left: 0;
            box-sizing: border-box;
            background: #fff;
        }

        /* ========== 指示器 ========== */
        .indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fff;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 16px;
            border-radius: 20px;
            z-index: 20;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .progress-text {
            font-weight: 500;
        }

        /* ========== 进度条 ========== */
        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.3);
            z-index: 15;
        }

        .progress-bar-fill {
            height: 100%;
            background: #fe2c55;
            width: 0%;
            transition: width 100ms linear;
        }

        /* ========== 侧边栏按钮 ========== */
        .sidebar {
            position: absolute;
            right: 12px;
            bottom: 150px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 20;
        }

        .sidebar-btn {
            width: 45px;
            height: 45px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: background 200ms ease;
        }

        .sidebar-btn:active {
            background: rgba(0, 0, 0, 0.6);
        }

        .sidebar-btn svg {
            width: 24px;
            height: 24px;
            fill: #fff;
        }

        /* ========== 加载动画 ========== */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            z-index: 25;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .loading.hidden {
            display: none;
        }

        /* ========== 提示信息 ========== */
        .toast {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 30;
            opacity: 0;
            transition: opacity 300ms ease;
            pointer-events: none;
        }

        .toast.visible {
            opacity: 1;
        }

        /* ========== 双击点赞动画 ========== */
        .like-animation {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            opacity: 0;
            z-index: 25;
            pointer-events: none;
        }

        .like-animation.active {
            animation: likeHeart 0.8s ease-out forwards;
        }

        @keyframes likeHeart {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1);
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 视频容器 -->
        <div class="video-container">
            <video playsinline webkit-playsinline x5-playsinline preload="auto"></video>
        </div>

        <!-- 覆盖层UI -->
        <div class="overlay">
            <div class="video-title"></div>
            <div class="play-button"></div>
        </div>

        <!-- 指示器 -->
        <div class="indicator">
            <span class="progress-text">1/1</span>
        </div>

        <!-- 进度条 -->
        <div class="progress-bar">
            <div class="progress-bar-fill"></div>
        </div>

        <!-- 侧边栏按钮 -->
        <div class="sidebar">
            <!-- 点赞按钮 -->
            <div class="sidebar-btn like-btn" title="点赞">
                <svg viewBox="0 0 24 24">
                    <path d="M12 21.35l-1.15-1.05C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.85 11.8L12 21.35z"/>
                </svg>
            </div>
            <!-- 评论按钮 -->
            <div class="sidebar-btn comment-btn" title="评论">
                <svg viewBox="0 0 24 24">
                    <path d="M21 6h-2v9H6v2c0 .55.45 1 1 1h11l4 4V7c0-.55-.45-1-1-1zm-4 6V3c0-.55-.45-1-1-1H3c-.55 0-1 .45-1 1v14l4-4h10c.55 0 1-.45 1-1z"/>
                </svg>
            </div>
            <!-- 分享按钮 -->
            <div class="sidebar-btn share-btn" title="分享">
                <svg viewBox="0 0 24 24">
                    <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.42-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/>
                </svg>
            </div>
        </div>

        <!-- 加载动画 -->
        <div class="loading hidden"></div>

        <!-- 提示信息 -->
        <div class="toast"></div>

        <!-- 点赞动画 -->
        <div class="like-animation">❤️</div>
    </div>

    <script>
        // ========== 工具函数 ==========

        /**
         * 节流函数
         * @param {Function} fn - 要节流的函数
         * @param {number} delay - 节流延迟时间(ms)
         * @returns {Function} 节流后的函数
         */
        function throttle(fn, delay) {
            let lastTime = 0;
            return function(...args) {
                const now = Date.now();
                if (now - lastTime >= delay) {
                    lastTime = now;
                    fn.apply(this, args);
                }
            };
        }

        /**
         * 显示提示信息
         * @param {string} message - 提示消息
         * @param {number} duration - 显示时长(ms)
         */
        function showToast(message, duration = 2000) {
            const toast = document.querySelector('.toast');
            toast.textContent = message;
            toast.classList.add('visible');
            setTimeout(() => {
                toast.classList.remove('visible');
            }, duration);
        }

        // ========== 存储策略选择 ==========

        /**
         * 检测并选择可用的存储策略
         * 优先使用localStorage，失败时降级到sessionStorage
         */
        const storage = (function() {
            // 测试localStorage是否可用
            try {
                const test = '__storage_test__';
                localStorage.setItem(test, test);
                localStorage.removeItem(test);
                return localStorage;
            } catch (e) {
                console.warn('localStorage不可用，降级到sessionStorage');
                return sessionStorage;
            }
        })();

        // ========== ProgressManager 进度管理器 ==========

        /**
         * 进度管理器类
         * 负责视频播放进度的保存、加载和清除
         */
        class ProgressManager {
            /**
             * @param {string} prefix - 存储键前缀
             */
            constructor(prefix = 'video_progress_') {
                this.prefix = prefix;
            }

            /**
             * 保存视频播放进度
             * @param {string} videoId - 视频ID
             * @param {number} currentTime - 当前播放时间(秒)
             */
            save(videoId, currentTime) {
                try {
                    const data = {
                        currentTime: currentTime,
                        lastUpdated: Date.now()
                    };
                    storage.setItem(this.prefix + videoId, JSON.stringify(data));
                } catch (e) {
                    console.error('保存进度失败:', e);
                }
            }

            /**
             * 加载视频播放进度
             * @param {string} videoId - 视频ID
             * @returns {number|null} 播放时间(秒)或null
             */
            load(videoId) {
                try {
                    const data = storage.getItem(this.prefix + videoId);
                    if (data) {
                        const parsed = JSON.parse(data);
                        return parsed.currentTime;
                    }
                } catch (e) {
                    console.error('加载进度失败:', e);
                }
                return null;
            }

            /**
             * 清除单个视频的进度
             * @param {string} videoId - 视频ID
             */
            clear(videoId) {
                try {
                    storage.removeItem(this.prefix + videoId);
                } catch (e) {
                    console.error('清除进度失败:', e);
                }
            }

            /**
             * 清除所有视频进度
             */
            clearAll() {
                try {
                    const keys = Object.keys(storage);
                    keys.forEach(key => {
                        if (key.startsWith(this.prefix)) {
                            storage.removeItem(key);
                        }
                    });
                } catch (e) {
                    console.error('清除所有进度失败:', e);
                }
            }
        }

        // ========== VideoDataManager 视频数据管理器 ==========

        /**
         * 视频数据管理器类
         * 负责视频数据的管理和查询
         */
        class VideoDataManager {
            /**
             * @param {Array} videos - 视频数据数组
             */
            constructor(videos) {
                this.videos = videos;
            }

            /**
             * 获取所有视频
             * @returns {Array} 视频数组
             */
            getAll() {
                return this.videos;
            }

            /**
             * 按索引获取视频
             * @param {number} index - 视频索引
             * @returns {Object|null} 视频对象或null
             */
            getByIndex(index) {
                if (index >= 0 && index < this.videos.length) {
                    return this.videos[index];
                }
                return null;
            }

            /**
             * 按ID获取视频
             * @param {string} id - 视频ID
             * @returns {Object|null} 视频对象或null
             */
            getById(id) {
                return this.videos.find(v => v.id === id) || null;
            }

            /**
             * 获取视频总数
             * @returns {number} 视频数量
             */
            getCount() {
                return this.videos.length;
            }
        }

        // ========== VideoPlayer 视频播放器 ==========

        /**
         * 视频播放器类
         * 负责视频元素的创建、播放控制和状态管理
         */
        class VideoPlayer {
            /**
             * @param {HTMLElement} container - 视频容器元素
             */
            constructor(container) {
                this.container = container;
                this.video = container.querySelector('video');
                this.isPlaying = false;
                this.isMuted = false;
                this.setupVideo();
            }

            /**
             * 设置视频元素属性
             */
            setupVideo() {
                this.video.setAttribute('playsinline', '');
                this.video.setAttribute('webkit-playsinline', '');
                this.video.setAttribute('x5-playsinline', '');
                this.video.setAttribute('preload', 'auto');
                this.video.muted = false;
            }

            /**
             * 加载视频
             * @param {Object} video - 视频数据对象
             * @param {number} startTime - 起始播放时间(秒)
             * @returns {Promise} 加载完成的Promise
             */
            load(video, startTime = 0) {
                return new Promise((resolve, reject) => {
                    this.video.src = video.url;
                    this.video.currentTime = startTime;

                    const onCanPlay = () => {
                        this.video.removeEventListener('canplay', onCanPlay);
                        this.video.removeEventListener('error', onError);
                        resolve();
                    };

                    const onError = (e) => {
                        this.video.removeEventListener('canplay', onCanPlay);
                        this.video.removeEventListener('error', onError);
                        reject(e);
                    };

                    this.video.addEventListener('canplay', onCanPlay);
                    this.video.addEventListener('error', onError);
                    this.video.load();
                });
            }

            /**
             * 播放视频
             * @returns {Promise} 播放Promise
             */
            async play() {
                try {
                    await this.video.play();
                    this.isPlaying = true;
                } catch (e) {
                    // 自动播放被阻止，尝试静音播放
                    console.warn('自动播放被阻止，尝试静音播放');
                    this.video.muted = true;
                    this.isMuted = true;
                    await this.video.play();
                    this.isPlaying = true;
                }
            }

            /**
             * 暂停视频
             */
            pause() {
                this.video.pause();
                this.isPlaying = false;
            }

            /**
             * 获取当前播放时间
             * @returns {number} 当前时间(秒)
             */
            getCurrentTime() {
                return this.video.currentTime;
            }

            /**
             * 获取视频总时长
             * @returns {number} 总时长(秒)
             */
            getDuration() {
                return this.video.duration || 0;
            }

            /**
             * 切换播放/暂停状态
             */
            togglePlay() {
                if (this.isPlaying) {
                    this.pause();
                } else {
                    this.play();
                }
            }

            /**
             * 静音切换
             */
            toggleMute() {
                this.video.muted = !this.video.muted;
                this.isMuted = this.video.muted;
            }
        }

        // ========== GestureHandler 手势处理 ==========

        /**
         * 手势处理类
         * 负责处理触摸滑动和鼠标滚轮事件
         */
        class GestureHandler {
            /**
             * @param {HTMLElement} element - 监听手势的元素
             * @param {Object} options - 配置选项
             */
            constructor(element, options = {}) {
                this.element = element;
                this.threshold = options.threshold || 50; // 滑动阈值
                this.onSwitch = null; // 切换回调
                this.onTap = null; // 点击回调
                this.onDoubleTap = null; // 双击回调

                this.startY = 0;
                this.startX = 0;
                this.isDragging = false;
                this.lastTapTime = 0;

                this.bindEvents();
            }

            /**
             * 绑定事件监听
             */
            bindEvents() {
                // 触摸事件
                this.element.addEventListener('touchstart', this.handleTouchStart.bind(this), { passive: false });
                this.element.addEventListener('touchmove', this.handleTouchMove.bind(this), { passive: false });
                this.element.addEventListener('touchend', this.handleTouchEnd.bind(this), { passive: false });

                // 鼠标滚轮事件（节流）
                this.element.addEventListener('wheel', throttle(this.handleWheel.bind(this), 200), { passive: false });

                // 鼠标点击事件
                this.element.addEventListener('click', this.handleClick.bind(this));
            }

            /**
             * 处理触摸开始
             */
            handleTouchStart(e) {
                if (e.touches.length === 1) {
                    this.startY = e.touches[0].clientY;
                    this.startX = e.touches[0].clientX;
                    this.isDragging = true;
                }
            }

            /**
             * 处理触摸移动
             */
            handleTouchMove(e) {
                if (!this.isDragging || e.touches.length !== 1) return;

                const currentY = e.touches[0].clientY;
                const deltaY = currentY - this.startY;

                // 更新UI位置（跟随手指移动）
                const container = document.querySelector('.video-container');
                container.style.transform = `translateY(${deltaY}px)`;
            }

            /**
             * 处理触摸结束
             */
            handleTouchEnd(e) {
                if (!this.isDragging) return;

                const endY = e.changedTouches[0].clientY;
                const deltaY = endY - this.startY;
                const direction = this.getSwipeDirection(deltaY);

                // 重置UI位置
                const container = document.querySelector('.video-container');
                container.style.transform = '';

                if (direction && this.onSwitch) {
                    this.onSwitch(direction);
                }

                this.isDragging = false;
            }

            /**
             * 处理滚轮事件
             */
            handleWheel(e) {
                e.preventDefault();
                const direction = e.deltaY > 0 ? 'up' : 'down';
                if (this.onSwitch) {
                    this.onSwitch(direction);
                }
            }

            /**
             * 处理点击事件
             */
            handleClick(e) {
                const now = Date.now();
                const timeDiff = now - this.lastTapTime;

                // 双击检测（300ms内）
                if (timeDiff < 300) {
                    if (this.onDoubleTap) {
                        this.onDoubleTap(e);
                    }
                    this.lastTapTime = 0;
                } else {
                    // 单击
                    if (this.onTap) {
                        this.onTap(e);
                    }
                    this.lastTapTime = now;
                }
            }

            /**
             * 判断滑动方向
             * @param {number} deltaY - Y轴移动距离
             * @returns {string|null} 'up'、'down'或null
             */
            getSwipeDirection(deltaY) {
                if (Math.abs(deltaY) < this.threshold) {
                    return null;
                }
                return deltaY > 0 ? 'down' : 'up';
            }
        }

        // ========== SwitcherManager 视频切换管理 ==========

        /**
         * 视频切换管理类
         * 负责协调视频切换逻辑
         */
        class SwitcherManager {
            /**
             * @param {VideoDataManager} videoDataManager - 视频数据管理器
             * @param {VideoPlayer} player - 视频播放器
             * @param {ProgressManager} progressManager - 进度管理器
             */
            constructor(videoDataManager, player, progressManager) {
                this.videoDataManager = videoDataManager;
                this.player = player;
                this.progressManager = progressManager;

                this.currentIndex = 0;
                this.isTransitioning = false;

                // UI元素引用
                this.container = document.querySelector('.video-container');
                this.titleElement = document.querySelector('.video-title');
                this.progressText = document.querySelector('.progress-text');
                this.playButton = document.querySelector('.play-button');
                this.progressBarFill = document.querySelector('.progress-bar-fill');
                this.loading = document.querySelector('.loading');
            }

            /**
             * 检查是否可以切换到下一个视频
             * @returns {boolean}
             */
            canNext() {
                return this.currentIndex < this.videoDataManager.getCount() - 1;
            }

            /**
             * 检查是否可以切换到上一个视频
             * @returns {boolean}
             */
            canPrev() {
                return this.currentIndex > 0;
            }

            /**
             * 切换到指定索引的视频
             * @param {number} index - 目标索引
             */
            async switchTo(index) {
                // 边界检查
                if (index < 0 || index >= this.videoDataManager.getCount()) {
                    return;
                }

                // 防止重复切换
                if (this.isTransitioning || index === this.currentIndex) {
                    return;
                }

                this.isTransitioning = true;

                // 保存当前视频进度
                const currentVideo = this.videoDataManager.getByIndex(this.currentIndex);
                if (currentVideo) {
                    const currentTime = this.player.getCurrentTime();
                    this.progressManager.save(currentVideo.id, currentTime);
                }

                // 暂停当前视频
                this.player.pause();

                // 显示加载动画
                this.loading.classList.remove('hidden');

                // 执行切换动画
                const direction = index > this.currentIndex ? 'up' : 'down';
                await this.animateSwitch(direction);

                // 更新索引
                this.currentIndex = index;

                // 加载新视频
                const newVideo = this.videoDataManager.getByIndex(index);
                if (newVideo) {
                    // 恢复进度
                    const savedTime = this.progressManager.load(newVideo.id) || 0;

                    try {
                        await this.player.load(newVideo, savedTime);
                        await this.player.play();
                        this.updateUI(newVideo);
                    } catch (e) {
                        console.error('视频加载失败:', e);
                        showToast('视频加载失败，请稍后重试');
                    }
                }

                // 隐藏加载动画
                this.loading.classList.add('hidden');

                // 重置过渡状态
                setTimeout(() => {
                    this.isTransitioning = false;
                }, 100);
            }

            /**
             * 切换到下一个视频
             */
            next() {
                if (this.canNext()) {
                    this.switchTo(this.currentIndex + 1);
                }
            }

            /**
             * 切换到上一个视频
             */
            prev() {
                if (this.canPrev()) {
                    this.switchTo(this.currentIndex - 1);
                }
            }

            /**
             * 执行切换动画
             * @param {string} direction - 方向 'up' 或 'down'
             */
            animateSwitch(direction) {
                return new Promise(resolve => {
                    const offset = direction === 'up' ? '-100%' : '100%';
                    this.container.style.transform = `translateY(${offset})`;

                    setTimeout(() => {
                        this.container.style.transition = 'none';
                        this.container.style.transform = 'translateY(0)';
                        // 强制重绘
                        this.container.offsetHeight;
                        this.container.style.transition = '';
                        resolve();
                    }, 300);
                });
            }

            /**
             * 更新UI显示
             * @param {Object} video - 视频数据对象
             */
            updateUI(video) {
                // 更新标题
                this.titleElement.textContent = video.title;

                // 更新进度文本
                const total = this.videoDataManager.getCount();
                this.progressText.textContent = `${this.currentIndex + 1}/${total}`;

                // 隐藏播放按钮
                this.playButton.classList.remove('visible');
            }

            /**
             * 更新进度条
             */
            updateProgressBar() {
                const duration = this.player.getDuration();
                const currentTime = this.player.getCurrentTime();
                if (duration > 0) {
                    const percent = (currentTime / duration) * 100;
                    this.progressBarFill.style.width = `${percent}%`;
                }
            }

            /**
             * 显示/隐藏播放按钮
             * @param {boolean} show - 是否显示
             */
            togglePlayButton(show) {
                if (show) {
                    this.playButton.classList.add('visible');
                } else {
                    this.playButton.classList.remove('visible');
                }
            }
        }

        // ========== 应用初始化 ==========

        /**
         * 初始化应用
         */
        async function initApp() {
            // 获取DOM元素
            const app = document.getElementById('app');
            const videoContainer = document.querySelector('.video-container');
            const playButton = document.querySelector('.play-button');
            const loading = document.querySelector('.loading');
            const likeBtn = document.querySelector('.like-btn');
            const commentBtn = document.querySelector('.comment-btn');
            const shareBtn = document.querySelector('.share-btn');
            const likeAnimation = document.querySelector('.like-animation');

            // 创建模块实例
            const progressManager = new ProgressManager('douyin_video_');
            const videoDataManager = new VideoDataManager(videoData);
            const player = new VideoPlayer(videoContainer);
            const switcher = new SwitcherManager(videoDataManager, player, progressManager);

            // 创建手势处理器
            const gestureHandler = new GestureHandler(videoContainer, {
                threshold: 50
            });

            // 设置手势回调
            gestureHandler.onSwitch = (direction) => {
                if (direction === 'up') {
                    switcher.next();
                } else if (direction === 'down') {
                    switcher.prev();
                }
            };

            gestureHandler.onTap = () => {
                player.togglePlay();
                switcher.togglePlayButton(!player.isPlaying);
            };

            gestureHandler.onDoubleTap = () => {
                // 双击点赞动画
                likeAnimation.classList.remove('active');
                void likeAnimation.offsetWidth; // 强制重绘
                likeAnimation.classList.add('active');
                showToast('已点赞 ❤️');
            };

            // 播放按钮点击
            playButton.addEventListener('click', (e) => {
                e.stopPropagation();
                player.togglePlay();
                switcher.togglePlayButton(!player.isPlaying);
            });

            // 侧边栏按钮
            likeBtn.addEventListener('click', () => {
                likeAnimation.classList.remove('active');
                void likeAnimation.offsetWidth;
                likeAnimation.classList.add('active');
                showToast('已点赞 ❤️');
            });

            commentBtn.addEventListener('click', () => {
                showToast('评论功能开发中...');
            });

            shareBtn.addEventListener('click', () => {
                showToast('分享功能开发中...');
            });

            // 视频播放进度更新
            player.video.addEventListener('timeupdate', () => {
                switcher.updateProgressBar();
            });

            // 视频播放结束
            player.video.addEventListener('ended', () => {
                // 自动切换到下一个视频
                if (switcher.canNext()) {
                    switcher.next();
                } else {
                    // 最后一个视频播放完毕，循环播放
                    player.video.currentTime = 0;
                    player.play();
                }
            });

            // 视频暂停事件
            player.video.addEventListener('pause', () => {
                switcher.togglePlayButton(true);
            });

            // 视频播放事件
            player.video.addEventListener('play', () => {
                switcher.togglePlayButton(false);
            });

            // 加载第一个视频
            loading.classList.remove('hidden');
            const firstVideo = videoDataManager.getByIndex(0);
            if (firstVideo) {
                const savedTime = progressManager.load(firstVideo.id) || 0;

                try {
                    await player.load(firstVideo, savedTime);
                    await player.play();
                    switcher.updateUI(firstVideo);
                } catch (e) {
                    console.error('初始视频加载失败:', e);
                    showToast('视频加载失败，请刷新页面重试');
                }
            }
            loading.classList.add('hidden');

            // 键盘快捷键支持
            document.addEventListener('keydown', (e) => {
                switch (e.key) {
                    case 'ArrowUp':
                        switcher.prev();
                        break;
                    case 'ArrowDown':
                        switcher.next();
                        break;
                    case ' ':
                        e.preventDefault();
                        player.togglePlay();
                        switcher.togglePlayButton(!player.isPlaying);
                        break;
                }
            });

            console.log('红果短视频播放器初始化完成');
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initApp);

        // 页面卸载前保存进度
        window.addEventListener('beforeunload', () => {
            // 这里可以添加额外的清理逻辑
        });
    </script>
