<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>八爪鱼采集器模拟器</title>
  <style>
    /* ==================== CSS变量系统 ==================== */
    :root {
      /* 颜色变量 */
      --primary-color: #1890ff;
      --primary-hover: #40a9ff;
      --success-color: #52c41a;
      --warning-color: #faad14;
      --error-color: #f5222d;
      
      /* 背景色 */
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f5;
      --bg-tertiary: #fafafa;
      
      /* 文字色 */
      --text-primary: #262626;
      --text-secondary: #595959;
      --text-tertiary: #8c8c8c;
      
      /* 边框色 */
      --border-color: #d9d9d9;
      --border-light: #e8e8e8;
      
      /* 间距 */
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --spacing-xl: 32px;
      
      /* 圆角 */
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      
      /* 阴影 */
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.12);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.16);
      
      /* 字体 */
      --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      --font-size-sm: 12px;
      --font-size-base: 14px;
      --font-size-lg: 16px;
      --font-size-xl: 20px;
    }
    
    /* 深色主题 */
    [data-theme="dark"] {
      --bg-primary: #1f1f1f;
      --bg-secondary: #2f2f2f;
      --bg-tertiary: #3a3a3a;
      
      --text-primary: #e8e8e8;
      --text-secondary: #b8b8b8;
      --text-tertiary: #8c8c8c;
      
      --border-color: #4a4a4a;
      --border-light: #3a3a3a;
      
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);
    }
    
    /* ==================== 基础样式重置 ==================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: var(--font-family);
      font-size: var(--font-size-base);
      color: var(--text-primary);
      background: var(--bg-secondary);
      line-height: 1.6;
      overflow: hidden;
    }
    
    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      outline: none;
      transition: all 0.3s;
    }
    
    input, select, textarea {
      font-family: inherit;
      outline: none;
      transition: all 0.3s;
    }
    
    /* ==================== 布局样式 ==================== */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    
    /* Header */
    #app-header {
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-color);
      padding: var(--spacing-md) var(--spacing-lg);
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow-sm);
      z-index: 100;
    }
    
    .header-left {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
    }
    
    .logo {
      font-size: var(--font-size-xl);
      font-weight: bold;
      color: var(--primary-color);
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }
    
    .logo-icon {
      font-size: 24px;
    }
    
    .header-right {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
    }
    
    /* Main */
    #app-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    /* URL Section */
    #url-section {
      background: var(--bg-primary);
      padding: var(--spacing-md) var(--spacing-lg);
      border-bottom: 1px solid var(--border-color);
    }
    
    .url-input-wrapper {
      display: flex;
      gap: var(--spacing-sm);
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .url-input {
      flex: 1;
      padding: var(--spacing-sm) var(--spacing-md);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      font-size: var(--font-size-base);
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    
    .url-input:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.2);
    }
    
    .url-input.error {
      border-color: var(--error-color);
    }
    
    .error-message {
      color: var(--error-color);
      font-size: var(--font-size-sm);
      margin-top: var(--spacing-xs);
      display: none;
    }
    
    .error-message.show {
      display: block;
    }
    
    /* Content Wrapper */
    .content-wrapper {
      flex: 1;
      display: flex;
      gap: 1px;
      background: var(--border-color);
      overflow: hidden;
    }
    
    /* Rule Panel */
    #rule-panel {
      width: 350px;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .panel-header {
      padding: var(--spacing-md);
      border-bottom: 1px solid var(--border-color);
      font-weight: bold;
      font-size: var(--font-size-lg);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: var(--spacing-md);
    }
    
    /* Preview Panel */
    #preview-panel {
      flex: 1;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .preview-tabs {
      display: flex;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-tertiary);
    }
    
    .preview-tab {
      padding: var(--spacing-sm) var(--spacing-lg);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      color: var(--text-secondary);
      transition: all 0.3s;
    }
    
    .preview-tab:hover {
      color: var(--text-primary);
    }
    
    .preview-tab.active {
      color: var(--primary-color);
      border-bottom-color: var(--primary-color);
    }
    
    .preview-content {
      flex: 1;
      overflow: auto;
      padding: var(--spacing-md);
    }
    
    /* Footer */
    #app-footer {
      background: var(--bg-primary);
      border-top: 1px solid var(--border-color);
      padding: var(--spacing-sm) var(--spacing-lg);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: var(--font-size-sm);
      color: var(--text-secondary);
    }
    
    .status-bar {
      display: flex;
      align-items: center;
      gap: var(--spacing-lg);
    }
    
    .status-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-xs);
    }
    
    .progress-bar {
      width: 200px;
      height: 6px;
      background: var(--bg-secondary);
      border-radius: 3px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: var(--primary-color);
      transition: width 0.3s;
    }
    
    /* ==================== 组件样式 ==================== */
    /* 按钮样式 */
    .btn {
      padding: var(--spacing-sm) var(--spacing-md);
      border-radius: var(--radius-md);
      font-size: var(--font-size-base);
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-xs);
    }
    
    .btn-primary {
      background: var(--primary-color);
      color: white;
    }
    
    .btn-primary:hover {
      background: var(--primary-hover);
    }
    
    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }
    
    .btn-secondary:hover {
      background: var(--bg-tertiary);
    }
    
    .btn-success {
      background: var(--success-color);
      color: white;
    }
    
    .btn-warning {
      background: var(--warning-color);
      color: white;
    }
    
    .btn-error {
      background: var(--error-color);
      color: white;
    }
    
    .btn-sm {
      padding: var(--spacing-xs) var(--spacing-sm);
      font-size: var(--font-size-sm);
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    /* 规则列表 */
    .rule-list {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
    }
    
    .rule-item {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: var(--spacing-md);
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .rule-item:hover {
      border-color: var(--primary-color);
      box-shadow: var(--shadow-sm);
    }
    
    .rule-item.selected {
      border-color: var(--primary-color);
      background: rgba(24, 144, 255, 0.05);
    }
    
    .rule-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--spacing-sm);
    }
    
    .rule-name {
      font-weight: bold;
      color: var(--text-primary);
    }
    
    .rule-actions {
      display: flex;
      gap: var(--spacing-xs);
    }
    
    .rule-info {
      font-size: var(--font-size-sm);
      color: var(--text-secondary);
    }
    
    /* 数据表格 */
    .data-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--spacing-md);
      border-bottom: 1px solid var(--border-color);
    }
    
    .data-table {
      width: 100%;
      border-collapse: collapse;
    }
    
    .data-table th,
    .data-table td {
      padding: var(--spacing-sm) var(--spacing-md);
      text-align: left;
      border-bottom: 1px solid var(--border-light);
    }
    
    .data-table th {
      background: var(--bg-tertiary);
      font-weight: bold;
      color: var(--text-primary);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    
    .data-table tr:hover {
      background: var(--bg-tertiary);
    }
    
    /* 导出按钮组 */
    .export-buttons {
      display: flex;
      gap: var(--spacing-sm);
    }
    
    /* 配置面板 */
    .config-section {
      margin-bottom: var(--spacing-lg);
    }
    
    .config-title {
      font-weight: bold;
      margin-bottom: var(--spacing-sm);
      color: var(--text-primary);
    }
    
    .config-row {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-sm);
    }
    
    .config-label {
      min-width: 80px;
      font-size: var(--font-size-sm);
      color: var(--text-secondary);
    }
    
    .config-input {
      flex: 1;
      padding: var(--spacing-xs) var(--spacing-sm);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      font-size: var(--font-size-sm);
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    
    .config-select {
      flex: 1;
      padding: var(--spacing-xs) var(--spacing-sm);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      font-size: var(--font-size-sm);
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    
    /* 页面预览 */
    .preview-iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
    
    .preview-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-tertiary);
    }
    
    .preview-placeholder-icon {
      font-size: 48px;
      margin-bottom: var(--spacing-md);
    }
    
    /* 通知提示 */
    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: var(--spacing-md) var(--spacing-lg);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      z-index: 1000;
      animation: slideIn 0.3s ease;
      max-width: 400px;
    }
    
    .notification.success {
      background: var(--success-color);
      color: white;
    }
    
    .notification.error {
      background: var(--error-color);
      color: white;
    }
    
    .notification.warning {
      background: var(--warning-color);
      color: white;
    }
    
    .notification.info {
      background: var(--primary-color);
      color: white;
    }
    
    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    
    /* 模态框 */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .modal {
      background: var(--bg-primary);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow: auto;
    }
    
    .modal-header {
      padding: var(--spacing-lg);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .modal-title {
      font-size: var(--font-size-lg);
      font-weight: bold;
    }
    
    .modal-close {
      font-size: 20px;
      cursor: pointer;
      color: var(--text-secondary);
    }
    
    .modal-body {
      padding: var(--spacing-lg);
    }
    
    .modal-footer {
      padding: var(--spacing-lg);
      border-top: 1px solid var(--border-color);
      display: flex;
      justify-content: flex-end;
      gap: var(--spacing-sm);
    }
    
    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: var(--spacing-xl);
      color: var(--text-tertiary);
    }
    
    .empty-icon {
      font-size: 48px;
      margin-bottom: var(--spacing-md);
    }
    
    /* 加载状态 */
    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border-color);
      border-top-color: var(--primary-color);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
    
    /* ==================== 响应式布局 ==================== */
    @media (max-width: 1199px) {
      #rule-panel {
        width: 300px;
      }
    }
    
    @media (max-width: 767px) {
      .content-wrapper {
        flex-direction: column;
      }
      
      #rule-panel {
        width: 100%;
        height: 40vh;
      }
      
      .header-left .logo span {
        display: none;
      }
      
      .progress-bar {
        width: 100px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="app-header">
      <div class="header-left">
        <div class="logo">
          <span class="logo-icon">🐙</span>
          <span>八爪鱼采集器</span>
        </div>
      </div>
      <div class="header-right">
        <button class="btn btn-secondary btn-sm" id="template-btn">📋 模板</button>
        <button class="btn btn-secondary btn-sm" id="history-btn">📜 历史</button>
        <button class="btn btn-secondary btn-sm" id="theme-toggle">🌙 主题</button>
      </div>
    </header>
    
    <!-- Main -->
    <main id="app-main">
      <!-- URL Section -->
      <section id="url-section">
        <div class="url-input-wrapper">
          <input type="text" class="url-input" id="url-input" placeholder="请输入目标网页URL (例如: https://example.com)">
          <button class="btn btn-primary" id="load-btn">加载页面</button>
          <button class="btn btn-success" id="start-btn" disabled>开始采集</button>
          <button class="btn btn-warning" id="pause-btn" disabled>暂停</button>
          <button class="btn btn-error" id="stop-btn" disabled>停止</button>
        </div>
        <div class="error-message" id="error-message"></div>
      </section>
      
      <!-- Content Wrapper -->
      <div class="content-wrapper">
        <!-- Rule Panel -->
        <aside id="rule-panel">
          <div class="panel-header">
            <span>采集规则</span>
            <button class="btn btn-primary btn-sm" id="add-rule-btn">+ 添加规则</button>
          </div>
          <div class="panel-content">
            <div class="rule-list" id="rule-list">
              <div class="empty-state">
                <div class="empty-icon">📝</div>
                <p>暂无采集规则</p>
                <p>点击"添加规则"开始配置</p>
              </div>
            </div>
            
            <!-- 翻页配置 -->
            <div class="config-section" style="margin-top: 24px;">
              <div class="config-title">翻页配置</div>
              <div class="config-row">
                <label class="config-label">启用翻页:</label>
                <input type="checkbox" id="pagination-enabled">
              </div>
              <div class="config-row">
                <label class="config-label">最大页数:</label>
                <input type="number" class="config-input" id="max-pages" value="5" min="1" max="100">
              </div>
              <div class="config-row">
                <label class="config-label">间隔时间:</label>
                <input type="number" class="config-input" id="wait-time" value="1000" min="100">
                <span style="font-size: 12px; color: var(--text-secondary);">ms</span>
              </div>
            </div>
          </div>
        </aside>
        
        <!-- Preview Panel -->
        <section id="preview-panel">
          <div class="preview-tabs">
            <div class="preview-tab active" data-tab="preview">页面预览</div>
            <div class="preview-tab" data-tab="data">数据预览</div>
            <div class="preview-tab" data-tab="export">数据导出</div>
          </div>
          <div class="preview-content" id="preview-content">
            <!-- 页面预览 -->
            <div id="tab-preview" class="tab-content">
              <div class="preview-placeholder">
                <div class="preview-placeholder-icon">🌐</div>
                <p>请输入URL并加载页面</p>
              </div>
            </div>
            <!-- 数据预览 -->
            <div id="tab-data" class="tab-content" style="display: none;">
              <div class="data-toolbar">
                <span id="data-count">共 0 条数据</span>
                <div>
                  <button class="btn btn-secondary btn-sm" id="clear-data-btn">清空数据</button>
                </div>
              </div>
              <div style="overflow: auto; max-height: calc(100vh - 300px);">
                <table class="data-table" id="data-table">
                  <thead id="data-thead"></thead>
                  <tbody id="data-tbody"></tbody>
                </table>
              </div>
            </div>
            <!-- 数据导出 -->
            <div id="tab-export" class="tab-content" style="display: none;">
              <div style="padding: 24px;">
                <h3 style="margin-bottom: 16px;">导出采集数据</h3>
                <div class="export-buttons">
                  <button class="btn btn-primary" id="export-json">导出 JSON</button>
                  <button class="btn btn-secondary" id="export-csv">导出 CSV</button>
                  <button class="btn btn-secondary" id="export-excel">导出 Excel</button>
                </div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>
    
    <!-- Footer -->
    <footer id="app-footer">
      <div class="status-bar">
        <div class="status-item">
          <span>状态:</span>
          <span id="status-text">空闲</span>
        </div>
        <div class="status-item">
          <span>进度:</span>
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
          </div>
          <span id="progress-text">0%</span>
        </div>
      </div>
      <div>
        <span>快捷键: Ctrl+Enter 开始采集 | Ctrl+S 保存模板</span>
      </div>
    </footer>
  </div>
  
  <script>
    // ==================== 状态管理模块 ====================
    class StateStore {
      constructor(initialState) {
        this.state = initialState;
        this.subscribers = new Map();
      }
      
      get(key) {
        return this.state[key];
      }
      
      set(key, value) {
        const oldValue = this.state[key];
        this.state[key] = value;
        if (oldValue !== value) {
          this.notify(key);
        }
      }
      
      subscribe(key, callback) {
        if (!this.subscribers.has(key)) {
          this.subscribers.set(key, new Set());
        }
        this.subscribers.get(key).add(callback);
        return () => this.subscribers.get(key).delete(callback);
      }
      
      notify(key) {
        const callbacks = this.subscribers.get(key);
        if (callbacks) {
          callbacks.forEach(cb => cb(this.state[key]));
        }
      }
      
      getState() {
        return { ...this.state };
      }
    }
    
    // ==================== 工具函数 ====================
    function debounce(fn, delay) {
      let timer = null;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), delay);
      };
    }
    
    function throttle(fn, interval) {
      let lastTime = 0;
      return (...args) => {
        const now = Date.now();
        if (now - lastTime >= interval) {
          lastTime = now;
          fn(...args);
        }
      };
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // ==================== 通知提示 ====================
    class Notification {
      static show(message, type = 'info') {
        const notification = document.createElement('div');
        notification.className = `notification ${type}`;
        notification.textContent = message;
        document.body.appendChild(notification);
        
        setTimeout(() => {

          setTimeout(() => notification.remove(), 300);

    // ==================== 模态框 ====================
    class Modal {
      static show(title, content, onConfirm) {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = `
          <div class="modal">
            <div class="modal-header">
              <span class="modal-title">${title}</span>
              <span class="modal-close">×</span>
            </div>
            <div class="modal-body">${content}</div>
            <div class="modal-footer">
              <button class="btn btn-secondary modal-cancel">取消</button>
              <button class="btn btn-primary modal-confirm">确定</button>
            </div>
          </div>
        `;
        
        document.body.appendChild(overlay);
        
        const close = () => overlay.remove();
        
        overlay.querySelector('.modal-close').addEventListener('click', close);
        overlay.querySelector('.modal-cancel').addEventListener('click', close);
        overlay.querySelector('.modal-confirm').addEventListener('click', () => {
          if (onConfirm) {
            const result = onConfirm();
            if (result !== false) {
              close();
            }
          } else {
            close();
          }
        });
        
        overlay.addEventListener('click', (e) => {
          if (e.target === overlay) close();
        });
        
        return overlay;
      }
    }

    // ==================== 采集执行引擎 ====================
    class CollectorEngine {
      constructor(store) {
        this.store = store;
        this.status = 'idle';
        this.data = [];
        this.currentPage = 0;
        this.totalPages = 0;
        this.rules = [];
      }
      
      async start(config) {
        this.status = 'running';
        this.store.set('status', 'running');
        this.data = [];
        
        const { rules, pagination } = config;
        this.rules = rules;
        this.totalPages = pagination?.enabled ? pagination.maxPages : 1;
        
        for (let page = 1; page <= this.totalPages; page++) {
          if (this.status === 'stopped') break;
          
          while (this.status === 'paused') {
            await this.delay(100);
          }
          
          if (this.status === 'stopped') break;
          
          this.currentPage = page;
          const pageData = await this.collectPage(rules, page);
          this.data.push(...pageData);
          
          this.store.set('data', [...this.data]);
          this.store.set('progress', (page / this.totalPages) * 100);
          
          if (pagination?.enabled && pagination.waitTime && page < this.totalPages) {
            await this.delay(pagination.waitTime);
          }
        }
        
        if (this.status !== 'stopped') {
          this.status = 'completed';
          this.store.set('status', 'completed');
          Notification.show(`采集完成，共采集 ${this.data.length} 条数据`, 'success');
        }
      }
      
      async collectPage(rules, pageNum) {
        await this.delay(500 + Math.random() * 500);
        
        const itemCount = 3 + Math.floor(Math.random() * 5);
        const results = [];
        
        for (let i = 0; i < itemCount; i++) {
          const item = {};
          rules.forEach(rule => {
            item[rule.fieldName] = this.generateMockData(rule, pageNum, i);
          });
          results.push(item);
        }
        
        return results;
      }
      
      generateMockData(rule, pageNum, itemIndex) {
        const types = {
          'text': `文本内容_第${pageNum}页_${itemIndex + 1}`,
          'link': `https://example.com/page/${pageNum}/item/${itemIndex + 1}`,
          'image': `https://picsum.photos/200/200?random=${pageNum * 10 + itemIndex}`,
          'price': (Math.random() * 1000).toFixed(2),
          'title': `商品标题_第${pageNum}页_${itemIndex + 1}_${Date.now()}`,
          'date': new Date(Date.now() - Math.random() * 86400000 * 30).toLocaleDateString(),
          'number': Math.floor(Math.random() * 10000)
        };
        
        return types[rule.collectType] || types['text'];
      }
      
      pause() {
        if (this.status === 'running') {
          this.status = 'paused';
          this.store.set('status', 'paused');
          Notification.show('采集已暂停', 'warning');
        }
      }
      
      resume() {
        if (this.status === 'paused') {
          this.status = 'running';
          this.store.set('status', 'running');
          Notification.show('采集已继续', 'info');
        }
      }
      
      stop() {
        if (this.status === 'running' || this.status === 'paused') {
          this.status = 'stopped';
          this.store.set('status', 'stopped');
          Notification.show('采集已停止', 'warning');
        }
      }
      
      delay(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
      }
    }
    
    // ==================== 数据导出 ====================
    class DataExporter {
      static exportJSON(data) {
        if (!data || data.length === 0) {
          Notification.show('没有数据可导出', 'warning');
          return;
        }
        
        const json = JSON.stringify(data, null, 2);
        const blob = new Blob([json], { type: 'application/json;charset=utf-8' });
        this.download(blob, `collect_${Date.now()}.json`);
        Notification.show('JSON导出成功', 'success');
      }
      
      static exportCSV(data) {
        if (!data || data.length === 0) {
          Notification.show('没有数据可导出', 'warning');
          return;
        }
        
        const headers = Object.keys(data[0] || {});
        const rows = data.map(item => 
          headers.map(h => {
            const value = item[h] || '';
            return `"${String(value).replace(/"/g, '""')}"`;
          }).join(',')
        );
        const csv = [headers.join(','), ...rows].join('\n');
        const bom = '\uFEFF';
        const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8' });
        this.download(blob, `collect_${Date.now()}.csv`);
        Notification.show('CSV导出成功', 'success');
      }
      
      static async exportExcel(data) {
        if (!data || data.length === 0) {
          Notification.show('没有数据可导出', 'warning');
          return;
        }
        
        if (!window.XLSX) {
          Notification.show('正在加载Excel导出组件...', 'info');
          await this.loadSheetJS();
        }
        
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
        XLSX.writeFile(wb, `collect_${Date.now()}.xlsx`);
        Notification.show('Excel导出成功', 'success');
      }
      
      static download(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
      }
      
      static async loadSheetJS() {
        return new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = 'https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js';
          script.onload = resolve;
          script.onerror = reject;
          document.head.appendChild(script);
        });
      }
    }

        tbody.innerHTML = data.map((item, index) => `
          <tr>
            ${headers.map(h => `<td>${escapeHtml(String(item[h] || ''))}</td>`).join('')}
          </tr>
        `).join('');
      }
      
      toggleTheme() {
        const current = this.store.get('theme');
        const next = current === 'light' ? 'dark' : 'light';
        this.store.set('theme', next);
        Notification.show(`已切换到${next === 'light' ? '浅色' : '深色'}主题`, 'info');
      }
      
      showTemplateModal() {
        const templates = this.templateStore.listTemplates();
        
        let content = '';
        if (templates.length === 0) {
          content = '<p style="text-align: center; color: var(--text-tertiary);">暂无保存的模板</p>';
        } else {
          content = `
            <div style="max-height: 400px; overflow-y: auto;">
              ${templates.map(t => `
                <div style="padding: 12px; border: 1px solid var(--border-color); border-radius: 4px; margin-bottom: 8px;">
                  <div style="font-weight: bold; margin-bottom: 4px;">${escapeHtml(t.name || '未命名模板')}</div>
                  <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 8px;">
                    规则数: ${t.rules?.length || 0} | 创建时间: ${new Date(t.createdAt).toLocaleString()}
                  </div>
                  <div>
                    <button class="btn btn-primary btn-sm" onclick="app.loadTemplate('${t.id}')">加载</button>
                    <button class="btn btn-error btn-sm" onclick="app.deleteTemplate('${t.id}')">删除</button>
                  </div>
                </div>
              `).join('')}
            </div>
          `;
        }
        
        content += `
          <div style="margin-top: 16px;">
            <button class="btn btn-primary" onclick="app.saveCurrentTemplate()">保存当前配置为模板</button>
          </div>
        `;
        
        Modal.show('模板管理', content, null);
      }
      
      saveCurrentTemplate() {
        const rules = this.store.get('rules');
        if (rules.length === 0) {
          Notification.show('当前没有规则可保存', 'warning');
          return;
        }
        
        const name = prompt('请输入模板名称:', `模板_${Date.now()}`);
        if (!name) return;
        
        this.templateStore.saveTemplate({
          name,
          rules,
          pagination: {
            enabled: document.getElementById('pagination-enabled').checked,
            maxPages: parseInt(document.getElementById('max-pages').value),
            waitTime: parseInt(document.getElementById('wait-time').value)
          }
        });
      }
      
      loadTemplate(id) {
        const template = this.templateStore.loadTemplate(id);
        if (!template) return;
        
        this.store.set('rules', template.rules || []);
        this.renderRuleList();
        
        if (template.pagination) {
          document.getElementById('pagination-enabled').checked = template.pagination.enabled;
          document.getElementById('max-pages').value = template.pagination.maxPages;
          document.getElementById('wait-time').value = template.pagination.waitTime;
        }
        
        Notification.show('模板加载成功', 'success');
        document.querySelector('.modal-overlay')?.remove();
      }
      
      deleteTemplate(id) {
        if (confirm('确定要删除这个模板吗？')) {
          this.templateStore.deleteTemplate(id);
          this.showTemplateModal();
        }
      }
      
      showHistoryModal() {
        const history = this.historyManager.listHistory();
        
        let content = '';
        if (history.length === 0) {
          content = '<p style="text-align: center; color: var(--text-tertiary);">暂无历史记录</p>';
        } else {
          content = `
            <div style="max-height: 400px; overflow-y: auto;">
              ${history.map(h => `
                <div style="padding: 12px; border: 1px solid var(--border-color); border-radius: 4px; margin-bottom: 8px;">
                  <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 4px;">
                    ${new Date(h.collectTime).toLocaleString()}
                  </div>
                  <div style="margin-bottom: 4px;"><strong>URL:</strong> ${escapeHtml(h.url)}</div>
                  <div style="margin-bottom: 4px;"><strong>数据量:</strong> ${h.dataCount} 条</div>
                  <div><strong>规则数:</strong> ${h.rules?.length || 0}</div>
                </div>
              `).join('')}
            </div>
          `;
        }
        
        content += `
          <div style="margin-top: 16px;">
            <button class="btn btn-error" onclick="app.clearHistory()">清空历史记录</button>
          </div>
        `;
        
        Modal.show('采集历史', content, null);
      }
      
      clearHistory() {
        if (confirm('确定要清空所有历史记录吗？')) {
          this.historyManager.clearHistory();
          this.showHistoryModal();
        }
      }
      
      checkFirstVisit() {
        if (!localStorage.getItem('collector_visited')) {
          setTimeout(() => {
            Notification.show('欢迎使用八爪鱼采集器！请先输入URL并添加采集规则', 'info');
            localStorage.setItem('collector_visited', 'true');
          }, 1000);
        }
      }
    }
    
    // ==================== 初始化应用 ====================
    const app = new App();
  </script>
</body>
</html>
