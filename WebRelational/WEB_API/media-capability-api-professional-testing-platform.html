<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Capabilities API 专业检测台</title>
    <style>
        :root {
            --bg-deep: #05070a;
            --bg-main: #0c1017;
            --bg-card: #151a23;
            --bg-hover: #1c2433;
            --border: #232b3a;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-purple: #8b5cf6;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            --accent-cyan: #06b6d4;
            --radius: 8px;
            --radius-lg: 12px;
            --font-mono: "SF Mono", Monaco, Consolas, monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            height: 56px;
            background: var(--bg-main);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: white;
        }

        .status-badge {
            padding: 6px 12px;
            background: var(--bg-card);
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
        .status-dot.active { background: var(--accent-green); box-shadow: 0 0 8px rgba(16, 185, 129, 0.5); }

        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* 左侧控制面板 */
        .sidebar {
            width: 320px;
            background: var(--bg-main);
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 16px;
        }

        button {
            padding: 10px 14px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg-hover);
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        button:hover { background: #2a3142; }
        button.primary { background: var(--accent-blue); border-color: var(--accent-blue); color: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        select, input {
            width: 100%;
            padding: 8px 10px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg-deep);
            color: var(--text-primary);
            font-size: 12px;
            margin-bottom: 10px;
            outline: none;
        }
        select:focus, input:focus { border-color: var(--accent-blue); }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-group { margin-bottom: 0; }
        .form-group label { display: block; font-size: 10px; color: var(--text-muted); margin-bottom: 4px; }

        /* 右侧主区域 */
        .content-area {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            background: radial-gradient(circle at top, #1a1f2e 0%, var(--bg-main) 100%);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* 状态概览 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
        }
        .stat-card::after {
            content: '';
            position: absolute;
            left: 0; right: 0; bottom: 0;
            height: 3px;
            background: var(--border);
            border-radius: 0 0 var(--radius) var(--radius);
        }
        .stat-card.good::after { background: var(--accent-green); }
        .stat-card.warn::after { background: var(--accent-orange); }
        .stat-card.bad::after { background: var(--accent-red); }

        .stat-icon { font-size: 20px; margin-bottom: 8px; opacity: 0.7; }
        .stat-val { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
        .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }

        /* 能力矩阵 */
        .matrix-wrapper {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .matrix-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .matrix-title { font-size: 15px; font-weight: 600; }

        .matrix-grid {
            display: grid;
            grid-template-columns: 120px repeat(4, 1fr); /* Codec列 + 4个分辨率列 */
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .grid-cell {
            background: var(--bg-main);
            padding: 10px;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 44px;
        }

        .grid-header {
            background: var(--bg-deep);
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 10px;
            text-transform: uppercase;
        }

        .grid-codec {
            align-items: flex-start;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-secondary);
        }

        .grid-result {
            transition: all 0.3s;
            position: relative;
            cursor: default;
        }
        .grid-result:hover { z-index: 1; transform: scale(1.05); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* 状态颜色 */
        .status-none { background: rgba(100, 116, 139, 0.1); color: var(--text-muted); }
        .status-sw { background: rgba(245, 158, 11, 0.15); color: var(--accent-orange); }
        .status-hw { background: rgba(16, 185, 129, 0.15); color: var(--accent-green); }
        .status-no { background: rgba(239, 68, 68, 0.1); color: var(--accent-red); }

        /* 日志区域 */
        .log-area {
            height: 140px;
            background: var(--bg-main);
            border-top: 1px solid var(--border);
            padding: 12px;
            overflow-y: auto;
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-muted);
        }
        .log-entry { margin-bottom: 4px; display: flex; gap: 10px; }
        .log-time { color: var(--accent-blue); }
        .log-msg { color: var(--text-secondary); }

        /* 动画 */
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; display: inline-block; }

        /* 预设标签 */
        .preset-tag {
            font-size: 9px;
            padding: 2px 4px;
            background: var(--bg-deep);
            border-radius: 4px;
            margin-top: 2px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-icon">MC</div>
        <span>Media Capabilities 探测台</span>
    </div>
    <div class="status-badge">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">检测环境...</span>
    </div>
</header>

<div class="main-container">
    <!-- 左侧配置 -->
    <aside class="sidebar">
        <div class="card">
            <div class="section-title">自动化扫描</div>
            <button id="btn-scan" class="primary">🔍 扫描解码能力矩阵</button>
        </div>

        <div class="card">
            <div class="section-title">自定义测试</div>

            <div class="form-group">
                <label>场景预设</label>
                <select id="select-preset">
                    <option value="custom">自定义配置</option>
                    <option value="4k">4K 流媒体</option>
                    <option value="1080p">1080P 高清</option>
                    <option value="live">直播 (低延迟)</option>
                </select>
            </div>

            <div class="form-group" style="margin-top: 12px;">
                <label>媒体类型</label>
                <select id="select-type">
                    <option value="video">视频</option>
                    <option value="audio">音频</option>
                </select>
            </div>

            <div class="form-group">
                <label>编码格式</label>
                <select id="select-codec">
                    <option value='video/mp4; codecs="avc1.64001F"'>H.264 (High Profile)</option>
                    <option value='video/mp4; codecs="hev1.2.4.L120.90"'>HEVC (H.265)</option>
                    <option value='video/webm; codecs="vp09.00.50.08"'>VP9</option>
                    <option value='video/mp4; codecs="av01.0.08M.08"'>AV1</option>
                    <option value='audio/mp4; codecs="mp4a.40.2"'>AAC</option>
                    <option value='audio/webm; codecs="opus"'>Opus</option>
                </select>
            </div>

            <!-- 动态字段容器 -->
            <div id="dynamic-fields">
                <!-- 将由 JS 填充 -->
            </div>

            <button id="btn-test" style="margin-top: 10px;">⚙️ 测试当前配置</button>
        </div>
    </aside>

    <!-- 右侧展示 -->
    <section class="content-area">

        <!-- 顶部状态卡片 -->
        <div class="stats-grid">
            <div class="stat-card" id="stat-supported">
                <div class="stat-icon">❓</div>
                <div class="stat-val" id="val-supported">-</div>
                <div class="stat-label">支持状态</div>
            </div>
            <div class="stat-card" id="stat-smooth">
                <div class="stat-icon">🐢</div>
                <div class="stat-val" id="val-smooth">-</div>
                <div class="stat-label">播放流畅</div>
            </div>
            <div class="stat-card" id="stat-power">
                <div class="stat-icon">🔋</div>
                <div class="stat-val" id="val-power">-</div>
                <div class="stat-label">硬件加速</div>
            </div>
            <div class="stat-card" id="stat-desc">
                <div class="stat-icon">📝</div>
                <div class="stat-val" id="val-desc" style="font-size: 10px;">等待测试</div>
                <div class="stat-label">决策建议</div>
            </div>
        </div>

        <!-- 矩阵区域 -->
        <div class="matrix-wrapper">
            <div class="matrix-header">
                <span class="matrix-title">硬件解码支持矩阵</span>
                <span style="font-size: 11px; color: var(--text-muted);">分辨率 vs 编码格式</span>
            </div>

            <div class="matrix-grid" id="matrix-container">
                <!-- 表头 -->
                <div class="grid-cell grid-header">编码格式</div>
                <div class="grid-cell grid-header">1080p</div>
                <div class="grid-cell grid-header">1440p (2K)</div>
                <div class="grid-cell grid-header">2160p (4K)</div>
                <div class="grid-cell grid-header">4320p (8K)</div>
                <!-- 内容将由JS生成 -->
            </div>
        </div>

        <!-- 底部日志 -->
        <div style="margin-top: auto;">
            <div class="section-title">调试日志</div>
            <div class="log-area" id="log-area">
                <div class="log-entry"><span class="log-time">[System]</span> <span class="log-msg">初始化完成...</span></div>
            </div>
        </div>

    </section>
</div>

<script>
    // ========================================
    // Media Capabilities API - 优化版
    // ========================================

    const $ = id => document.getElementById(id);

    const state = {
        supported: 'mediaCapabilities' in navigator,
        isBusy: false,
        currentType: 'video'
    };

    // 配置预设
    const CONFIG = {
        videoCodecs: [
            { name: 'H.264', mime: 'video/mp4; codecs="avc1.64001F"' },
            { name: 'H.265 (HEVC)', mime: 'video/mp4; codecs="hev1.2.4.L120.90"' },
            { name: 'VP9', mime: 'video/webm; codecs="vp09.00.50.08"' },
            { name: 'AV1', mime: 'video/mp4; codecs="av01.0.08M.08"' }
        ],
        resolutions: [
            { w: 1920, h: 1080, label: '1080p' },
            { w: 2560, h: 1440, label: '1440p' },
            { w: 3840, h: 2160, label: '2160p' },
            { w: 7680, h: 4320, label: '4320p' }
        ],
        presets: {
            '4k': { w: 3840, h: 2160, fps: 60, bitrate: 15000000, profile: 'video/mp4; codecs="hev1.2.4.L120.90"' },
            '1080p': { w: 1920, h: 1080, fps: 30, bitrate: 5000000, profile: 'video/mp4; codecs="avc1.64001F"' },
            'live': { w: 1280, h: 720, fps: 30, bitrate: 3000000, profile: 'video/mp4; codecs="avc1.64001F"' }
        }
    };

    // 初始化
    function init() {
        if (state.supported) {
            $('status-dot').classList.add('active');
            $('status-text').textContent = 'API 支持';
        } else {
            $('status-text').textContent = 'API 不支持';
            $('btn-scan').disabled = true;
            $('btn-test').disabled = true;
        }

        setupListeners();
        renderDynamicForm('video'); // 初始渲染视频表单
    }

    function setupListeners() {
        $('btn-scan').addEventListener('click', runMatrixScan);
        $('btn-test').addEventListener('click', runSingleTest);

        $('select-preset').addEventListener('change', handlePresetChange);
        $('select-type').addEventListener('change', (e) => {
            state.currentType = e.target.value;
            renderDynamicForm(e.target.value);
        });
    }

    // ========================================
    // 表单逻辑
    // ========================================

    function renderDynamicForm(type) {
        const container = $('dynamic-fields');
        if (type === 'video') {
            container.innerHTML = `
          <div class="form-row">
            <div class="form-group"><label>宽度</label><input type="number" id="f-width" value="1920"></div>
            <div class="form-group"><label>高度</label><input type="number" id="f-height" value="1080"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>帧率</label><input type="number" id="f-fps" value="30"></div>
            <div class="form-group"><label>码率</label><input type="number" id="f-bitrate" value="5000000"></div>
          </div>
        `;
        } else {
            container.innerHTML = `
          <div class="form-row">
            <div class="form-group"><label>采样率</label><input type="number" id="f-samplerate" value="48000"></div>
            <div class="form-group"><label>声道数</label><input type="number" id="f-channels" value="2"></div>
          </div>
          <div class="form-group"><label>码率</label><input type="number" id="f-bitrate" value="320000"></div>
        `;
        }
    }

    function handlePresetChange(e) {
        const val = e.target.value;
        if (val === 'custom') return;

        const preset = CONFIG.presets[val];
        if (preset) {
            $('select-type').value = 'video';
            renderDynamicForm('video');

            // 稍微延时确保DOM已生成
            setTimeout(() => {
                $('f-width').value = preset.w;
                $('f-height').value = preset.h;
                $('f-fps').value = preset.fps;
                $('f-bitrate').value = preset.bitrate;
                $('select-codec').value = preset.profile;
            }, 0);
        }
    }

    // ========================================
    // 核心测试逻辑
    // ========================================

    async function testConfig(config) {
        try {
            const result = await navigator.mediaCapabilities.decodingInfo(config);
            return result;
        } catch (e) {
            log("Error: " + e.message, true);
            return { supported: false, smooth: false, powerEfficient: false, error: true };
        }
    }

    // 单个测试
    async function runSingleTest() {
        const type = $('select-type').value;
        const mime = $('select-codec').value;

        let config = { type: 'file' };

        if (type === 'video') {
            config.video = {
                contentType: mime,
                width: parseInt($('f-width').value),
                height: parseInt($('f-height').value),
                bitrate: parseInt($('f-bitrate').value),
                framerate: parseFloat($('f-fps').value)
            };
        } else {
            config.audio = {
                contentType: mime,
                channels: parseInt($('f-channels').value),
                sampleRate: parseInt($('f-samplerate').value),
                bitrate: parseInt($('f-bitrate').value)
            };
        }

        log(`测试配置: ${JSON.stringify(config.video || config.audio)}`);
        const res = await testConfig(config);

        updateTopStats(res);
        log(`结果: Supported=${res.supported}, Smooth=${res.smooth}, HW=${res.powerEfficient}`);
    }

    // 矩阵扫描
    async function runMatrixScan() {
        if (state.isBusy) return;
        state.isBusy = true;

        const btn = $('btn-scan');
        btn.innerHTML = '<span class="spinner">⚙️</span> 扫描中...';
        btn.disabled = true;

        const container = $('matrix-container');
        // 清空旧内容，保留表头
        const headers = Array.from(container.children).slice(0, 5);
        container.innerHTML = '';
        headers.forEach(h => container.appendChild(h));

        // 遍历所有视频编码
        for (const codec of CONFIG.videoCodecs) {
            // 创建行首
            const labelCell = document.createElement('div');
            labelCell.className = 'grid-cell grid-codec';
            labelCell.innerHTML = `<div>${codec.name}</div><div class="preset-tag">${codec.mime.split(';')[1].replace('codecs="','').replace('"','')}</div>`;
            container.appendChild(labelCell);

            // 遍历分辨率
            for (const res of CONFIG.resolutions) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell grid-result';
                cell.innerHTML = '...';
                container.appendChild(cell);

                const config = {
                    type: 'file',
                    video: {
                        contentType: codec.mime,
                        width: res.w,
                        height: res.h,
                        bitrate: res.w * res.h * 30 * 0.15, // 动态码率估算
                        framerate: 30
                    }
                };

                const resData = await testConfig(config);

                // 更新单元格
                updateMatrixCell(cell, resData);

                // 刷新 UI (允许渲染)
                await new Promise(r => setTimeout(r, 20));
            }
        }

        btn.innerHTML = '🔍 重新扫描';
        btn.disabled = false;
        state.isBusy = false;
    }

    // ========================================
    // UI 更新辅助函数
    // ========================================

    function updateTopStats(info) {
        const supportedCard = $('stat-supported');
        const smoothCard = $('stat-smooth');
        const powerCard = $('stat-power');
        const descCard = $('stat-desc');

        // Supported
        supportedCard.className = 'stat-card ' + (info.supported ? 'good' : 'bad');
        $('val-supported').textContent = info.supported ? 'Yes' : 'No';
        supportedCard.querySelector('.stat-icon').textContent = info.supported ? '✅' : '❌';

        // Smooth
        smoothCard.className = 'stat-card ' + (info.smooth ? 'good' : 'warn');
        $('val-smooth').textContent = info.smooth ? 'Yes' : 'No';
        smoothCard.querySelector('.stat-icon').textContent = info.smooth ? '🚀' : '🐢';

        // Power Efficient
        powerCard.className = 'stat-card ' + (info.powerEfficient ? 'good' : 'warn');
        $('val-power').textContent = info.powerEfficient ? 'Yes' : 'No';
        powerCard.querySelector('.stat-icon').textContent = info.powerEfficient ? '⚡' : '💡';

        // Description
        let msg = '等待测试';
        if(info.supported && info.smooth && info.powerEfficient) msg = '完美: 硬件加速';
        else if(info.supported && info.smooth) msg = '良好: 软件解码';
        else if(info.supported) msg = '风险: 可能卡顿';
        else msg = '不支持';

        $('val-desc').textContent = msg;
    }

    function updateMatrixCell(cell, info) {
        // 优先级: 不支持 > 支持但卡顿 > 软解 > 硬解
        if (!info.supported) {
            cell.className = 'grid-cell grid-result status-no';
            cell.innerHTML = '❌<div style="font-size:9px">不支持</div>';
        } else if (!info.smooth) {
            cell.className = 'grid-cell grid-result status-sw';
            cell.innerHTML = '🐢<div style="font-size:9px">卡顿</div>';
        } else if (info.powerEfficient) {
            cell.className = 'grid-cell grid-result status-hw';
            cell.innerHTML = '⚡<div style="font-size:9px">硬解</div>';
        } else {
            cell.className = 'grid-cell grid-result status-sw';
            cell.innerHTML = '💾<div style="font-size:9px">软解</div>';
        }
    }

    function log(msg, isError = false) {
        const panel = $('log-area');
        const time = new Date().toLocaleTimeString('zh-CN', {hour12: false});
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-msg" style="color:${isError ? 'var(--accent-red)' : 'inherit'}">${msg}</span>`;
        panel.appendChild(entry);
        panel.scrollTop = panel.scrollHeight;
    }

    init();
</script>
</body>
</html>
