<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Intersection Observer 综合演示 - 技术文档阅读器</title>
    <style>
        :root {
            --bg-deep: #05070a;
            --bg-main: #0c1017;
            --bg-card: #151a23;
            --bg-hover: #1c2433;
            --border: #232b3a;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-purple: #8b5cf6;
            --accent-orange: #f59e0b;
            --radius: 8px;
            --radius-lg: 12px;
            --sidebar-width: 260px;
            --log-width: 300px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* 顶部进度条 */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            width: 0%;
            z-index: 1000;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px var(--accent-blue);
        }

        /* 左侧目录栏 */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-main);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            position: relative;
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .nav-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .nav-section-title {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: var(--radius);
            margin-bottom: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
            border-left: 2px solid transparent;
        }

        .nav-item:hover {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        /* 活动状态样式 */
        .nav-item.active {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-blue);
            border-left-color: var(--accent-blue);
            font-weight: 500;
        }

        /* 主内容区 */
        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .content-header {
            height: 56px;
            padding: 0 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(12, 16, 23, 0.9);
            backdrop-filter: blur(8px);
            z-index: 5;
        }

        .content-title {
            font-size: 16px;
            font-weight: 600;
        }

        .content-meta {
            font-size: 12px;
            color: var(--text-muted);
        }

        .content-scroll-container {
            flex: 1;
            overflow-y: auto;
            scroll-behavior: smooth; /* 启用平滑滚动 */
            padding: 40px;
            background: radial-gradient(circle at top, #1a1f2e 0%, var(--bg-main) 100%);
        }

        .article-container {
            max-width: 840px;
            margin: 0 auto;
            padding-bottom: 100px;
        }

        /* 文章样式 */
        .section-block {
            margin-bottom: 80px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .section-block.visible {
            opacity: 1;
            transform: translateY(0);
        }

        h2 {
            font-size: 28px;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(90deg, #fff, var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 16px;
            line-height: 1.8;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        /* 图片容器 */
        .image-container {
            width: 100%;
            height: 300px;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin: 32px 0;
            position: relative;
            border: 1px solid var(--border);
        }

        .image-skeleton {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-hover) 50%, var(--bg-card) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        .lazy-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        .lazy-img.loaded {
            opacity: 1;
        }

        /* 加载哨兵 (无限滚动) */
        #load-sentinel {
            height: 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
            margin-top: 40px;
        }

        /* 右侧日志面板 */
        .log-panel {
            width: var(--log-width);
            background: var(--bg-main);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .log-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-green);
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        .log-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            font-family: "SF Mono", Monaco, Consolas, monospace;
            font-size: 10px;
            color: var(--text-muted);
        }

        .log-entry {
            margin-bottom: 8px;
            padding: 8px;
            background: var(--bg-card);
            border-radius: 4px;
            border-left: 2px solid var(--border);
            opacity: 0;
            transform: translateX(10px);
            animation: slideIn 0.3s forwards;
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .log-entry.highlight {
            border-left-color: var(--accent-blue);
        }

        .log-entry.load {
            border-left-color: var(--accent-orange);
        }

        .log-entry.scroll {
            border-left-color: var(--accent-purple);
        }

        .log-time {
            color: var(--accent-blue);
            margin-right: 4px;
        }

        .log-msg {
            color: var(--text-secondary);
            line-height: 1.4;
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .log-panel {
                display: none;
            }
        }

        @media (max-width: 900px) {
            .sidebar {
                position: absolute;
                left: -100%;
                height: 100%;
                transition: left 0.3s;
                z-index: 100;
                background: var(--bg-deep);
            }

            .sidebar.open {
                left: 0;
                box-shadow: 4px 0 20px rgba(0, 0, 0, 0.5);
            }

            .content-wrapper {
                padding-left: 0;
            }
        }
    </style>
</head>
<body>

<!-- 全局进度条 -->
<div class="progress-bar" id="progress-bar"></div>

<!-- 左侧目录 -->
<aside class="sidebar">
    <div class="sidebar-header">
        <div class="logo">
            <div class="logo-icon">IO</div>
            <span>技术文档</span>
        </div>
    </div>
    <nav class="nav-list" id="toc-container">
        <div class="nav-section-title">目录导航</div>
        <!-- 动态生成目录 -->
    </nav>
</aside>

<!-- 中间内容 -->
<main class="content-wrapper">
    <header class="content-header">
        <div class="content-title">Intersection Observer API 综合演示</div>
        <div class="content-meta">演示：懒加载、目录高亮、无限滚动</div>
    </header>

    <div class="content-scroll-container" id="scroller">
        <div class="article-container" id="article">
            <!-- 动态生成的内容 -->
        </div>
    </div>
</main>

<!-- 右侧日志 -->
<aside class="log-panel">
    <div class="log-header">
        <span>API 触发日志</span>
        <div class="status-indicator" title="观察器运行中"></div>
    </div>
    <div class="log-content" id="log-box">
        <!-- 日志条目 -->
    </div>
</aside>

<script>
    // ========================================
    // 综合演示核心逻辑
    // ========================================

    const state = {
        sections: [
            {id: 'sec-1', title: 'API 概述', imgId: 10},
            {id: 'sec-2', title: '核心概念与原理', imgId: 20},
            {id: 'sec-3', title: '懒加载 实现', imgId: 30},
            {id: 'sec-4', title: '目录高亮 实现', imgId: 40},
            {id: 'sec-5', title: '无限滚动 实现', imgId: 50},
            {id: 'sec-6', title: '性能优化建议', imgId: 60}
        ],
        logs: [],
        sectionCount: 0
    };

    const $ = id => document.getElementById(id);
    const dom = {
        progressBar: $('progress-bar'),
        scroller: $('scroller'),
        article: $('article'),
        tocContainer: $('toc-container'),
        logBox: $('log-box')
    };

    // 日志工具
    function log(type, msg) {
        const time = new Date().toLocaleTimeString('zh-CN', {hour12: false});
        const entry = document.createElement('div');
        entry.className = `log-entry ${type}`;
        entry.innerHTML = `<span class="log-time">${time}</span><div class="log-msg">${msg}</div>`;

        dom.logBox.insertBefore(entry, dom.logBox.firstChild);

        // 限制日志数量
        if (dom.logBox.children.length > 50) {
            dom.logBox.removeChild(dom.logBox.lastChild);
        }
    }

    // 生成模拟内容
    function generateSectionHTML(section, index) {
        const lorem = `这是 <b>${section.title}</b> 的详细内容。Intersection Observer API 提供了一种异步检测目标元素与祖先元素或顶级文档视口相交情况的方法。这允许开发者更高效地处理滚动相关的交互，而无需在主线程上进行昂贵的循环计算。`;

        return `
        <section class="section-block" id="${section.id}">
          <h2>${index + 1}. ${section.title}</h2>
          <p>${lorem}</p>
          <p>下方图片将在进入视口时自动加载：</p>
          <div class="image-container">
            <div class="image-skeleton">图片加载中...</div>
            <img class="lazy-img"
                 data-src="https://picsum.photos/id/${section.imgId}/800/300.jpg"
                 alt="示例图片" />
          </div>
          <p>监听元素可见性变化可以用于实现各种复杂的交互逻辑，例如广告曝光统计、动画触发等。</p>
        </section>
      `;
    }

    // 初始化页面
    function initContent() {
        // 渲染初始章节
        const initialHTML = state.sections.map((sec, idx) => generateSectionHTML(sec, idx)).join('');
        dom.article.innerHTML = initialHTML + `<div id="load-sentinel">正在监测底部...</div>`;

        // 渲染目录
        dom.tocContainer.innerHTML += state.sections.map(sec => `
        <a class="nav-item" data-target="${sec.id}">${sec.title}</a>
      `).join('');

        state.sectionCount = state.sections.length;
        log('highlight', '页面初始化完成，创建观察器...');
    }

    // ========================================
    // 修复：点击目录跳转逻辑
    // ========================================
    function setupClickListener() {
        dom.tocContainer.addEventListener('click', function (e) {
            const item = e.target.closest('.nav-item');
            if (!item) return;

            e.preventDefault(); // 阻止默认锚点跳转

            const targetId = item.getAttribute('data-target');
            const targetEl = document.getElementById(targetId);

            if (targetEl) {
                // 1. 立即更新选中状态 (用户主动行为优先)
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');

                // 2. 平滑滚动到目标 (注意：容器是 dom.scroller)
                targetEl.scrollIntoView({behavior: 'smooth', block: 'start'});

                log('highlight', `用户点击导航跳转至: ${targetId}`);
            }
        });
    }

    // ========================================
    // 1. 图片懒加载观察器
    // ========================================
    const lazyLoadObserver = new IntersectionObserver((entries, observer) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const img = entry.target;
                const src = img.dataset.src;
                const container = img.parentElement;

                log('load', `检测到图片进入视口，开始加载: ${src.split('/').pop()}`);

                img.src = src;
                img.onload = () => {
                    img.classList.add('loaded');
                    container.querySelector('.image-skeleton').style.display = 'none';
                    log('load', `图片加载完成`);
                };

                // 加载后解除观察
                observer.unobserve(img);
            }
        });
    }, {
        root: dom.scroller,
        rootMargin: '100px',
        threshold: 0.01
    });

    // ========================================
    // 2. 目录高亮观察器
    // ========================================
    const tocObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const id = entry.target.id;

                // 更新目录UI
                document.querySelectorAll('.nav-item').forEach(nav => {
                    nav.classList.toggle('active', nav.dataset.target === id);
                });

                log('highlight', `滚动触发高亮章节: ${entry.target.querySelector('h2').textContent}`);
            }
        });
    }, {
        root: dom.scroller,
        rootMargin: '-20% 0px -70% 0px',
        threshold: 0
    });

    // ========================================
    // 3. 无限滚动观察器
    // ========================================
    const infiniteObserver = new IntersectionObserver(async (entries) => {
        const sentinel = entries[0];
        if (sentinel.isIntersecting) {
            log('scroll', '监测到底部哨兵，加载更多内容...');

            // 模拟网络延迟
            await new Promise(resolve => setTimeout(resolve, 500));

            // 移除旧哨兵
            sentinel.target.remove();

            // 添加新内容
            const newSection = {
                id: `sec-new-${Date.now()}`,
                title: `扩展章节 ${state.sectionCount + 1}`,
                imgId: Math.floor(Math.random() * 100)
            };

            const newHTML = generateSectionHTML(newSection, state.sectionCount);
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = newHTML;
            const newElement = tempDiv.firstElementChild;

            // 添加到DOM并触发动画
            dom.article.appendChild(newElement);
            void newElement.offsetHeight;
            newElement.classList.add('visible');

            // 监听新内容
            startObserving(newElement);

            // 添加新的目录项
            const newNavItem = document.createElement('a');
            newNavItem.className = 'nav-item';
            newNavItem.dataset.target = newSection.id;
            newNavItem.textContent = newSection.title;
            dom.tocContainer.appendChild(newNavItem);

            state.sectionCount++;

            // 重新添加哨兵
            const newSentinel = document.createElement('div');
            newSentinel.id = 'load-sentinel';
            newSentinel.textContent = '正在监测底部...';
            dom.article.appendChild(newSentinel);
            infiniteObserver.observe(newSentinel);

            log('scroll', '新内容加载完成，重置哨兵');
        }
    }, {
        root: dom.scroller,
        rootMargin: '200px',
        threshold: 0
    });

    // ========================================
    // 4. 阅读进度条
    // ========================================
    dom.scroller.addEventListener('scroll', () => {
        const scrollTop = dom.scroller.scrollTop;
        const scrollHeight = dom.scroller.scrollHeight - dom.scroller.clientHeight;
        const progress = (scrollTop / scrollHeight) * 100;
        dom.progressBar.style.width = `${progress}%`;
    });

    // ========================================
    // 启动所有观察器
    // ========================================
    function startObserving(root) {
        // 懒加载图片
        root.querySelectorAll('.lazy-img').forEach(img => {
            lazyLoadObserver.observe(img);
        });

        // 目录高亮章节
        if (root.id) {
            tocObserver.observe(root);
        }
    }

    // 初始化
    function init() {
        initContent();
        setupClickListener(); // 绑定点击事件

        // 观察初始内容
        document.querySelectorAll('.section-block').forEach(sec => {
            startObserving(sec);
            setTimeout(() => sec.classList.add('visible'), 100);
        });

        // 观察底部哨兵
        infiniteObserver.observe($('load-sentinel'));

        log('highlight', '所有观察器已激活');
    }

    init();
</script>
</body>
</html>
