<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 属性和值 API - 彻底修复版</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-supported {
            background: #4CAF50;
            color: white;
        }

        .status-unsupported {
            background: #f44336;
            color: white;
        }

        .info-panel {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            border-left: 4px solid #667eea;
        }

        /* 属性控制区 */
        .control-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 20px 0;
        }

        .control-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #e0e0e0;
        }

        .control-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .control-title {
            font-weight: bold;
            color: #667eea;
            font-size: 16px;
        }

        .control-type {
            padding: 3px 8px;
            background: #e0e0e0;
            border-radius: 12px;
            font-size: 11px;
        }

        .control-slider {
            margin: 15px 0;
        }

        .control-slider label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .control-slider input[type="range"] {
            width: 100%;
            height: 6px;
            background: #ddd;
            border-radius: 3px;
            -webkit-appearance: none;
        }

        .control-slider input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #667eea;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .control-slider input[type="color"] {
            width: 100%;
            height: 40px;
            border: 2px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
        }

        .value-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin-left: 10px;
        }

        /* 预览区域 */
        .preview-section {
            margin: 30px 0;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin: 20px 0;
        }

        .preview-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .preview-box {
            width: 150px;
            height: 150px;
            margin: 15px auto;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            transition: all 0.1s;
        }

        /* 单独为每个预览盒子设置不同的样式 */
        #scalePreview {
            transform: scale(1);
            border-radius: 20px;
            opacity: 1;
        }

        #radiusPreview {
            transform: none;
            border-radius: 20px;
            opacity: 1;
        }

        #rotationPreview {
            transform: rotate(0deg);
            border-radius: 20px;
            opacity: 1;
        }

        #opacityPreview {
            transform: none;
            border-radius: 20px;
            opacity: 1;
        }

        /* 组合预览 */
        .combined-preview {
            background: linear-gradient(135deg, #667eea, #764ba2);
            width: 300px;
            height: 300px;
            margin: 20px auto;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transition: all 0.1s;
        }

        .value-panel {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .value-tag {
            background: #f0f0f0;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 13px;
        }

        .value-tag span {
            font-weight: bold;
            color: #667eea;
            margin-left: 5px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
        }

        .btn-primary:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .btn-warning {
            background: #ff9800;
            color: white;
        }

        .btn-warning:hover {
            background: #e68a00;
            transform: translateY(-2px);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            justify-content: center;
        }

        .log-panel {
            background: #1e1e2f;
            color: #fff;
            border-radius: 6px;
            padding: 10px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 11px;
            max-height: 150px;
            overflow-y: auto;
        }

        .log-entry {
            margin: 2px 0;
            padding: 2px 5px;
        }

        .log-entry.success {
            color: #81c784;
        }

        .log-entry.warning {
            color: #ffb74d;
        }

        .log-entry.info {
            color: #64b5f6;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <h1>
                <span>🎨 CSS 属性和值 API</span>
                <span class="status-badge" id="apiStatus">检测中...</span>
            </h1>
            <p>直接操作元素样式，无需注册属性也能实时预览</p>

            <!-- 控制区 -->
            <div class="control-grid">
                <!-- 缩放因子 -->
                <div class="control-item">
                    <div class="control-header">
                        <span class="control-title">缩放因子</span>
                        <span class="control-type">number</span>
                    </div>
                    <div class="control-slider">
                        <label>当前值: <span class="value-badge" id="scaleValue">1.0</span></label>
                        <input type="range" id="scaleSlider" min="0.5" max="2" step="0.1" value="1"
                            oninput="updateScale(this.value)">
                    </div>
                </div>

                <!-- 圆角大小 -->
                <div class="control-item">
                    <div class="control-header">
                        <span class="control-title">圆角大小</span>
                        <span class="control-type">length</span>
                    </div>
                    <div class="control-slider">
                        <label>当前值: <span class="value-badge" id="radiusValue">20px</span></label>
                        <input type="range" id="radiusSlider" min="0" max="50" step="1" value="20"
                            oninput="updateRadius(this.value)">
                    </div>
                </div>

                <!-- 旋转角度 -->
                <div class="control-item">
                    <div class="control-header">
                        <span class="control-title">旋转角度</span>
                        <span class="control-type">angle</span>
                    </div>
                    <div class="control-slider">
                        <label>当前值: <span class="value-badge" id="rotationValue">0deg</span></label>
                        <input type="range" id="rotationSlider" min="0" max="360" step="5" value="0"
                            oninput="updateRotation(this.value)">
                    </div>
                </div>

                <!-- 透明度 -->
                <div class="control-item">
                    <div class="control-header">
                        <span class="control-title">透明度</span>
                        <span class="control-type">number</span>
                    </div>
                    <div class="control-slider">
                        <label>当前值: <span class="value-badge" id="opacityValue">1.0</span></label>
                        <input type="range" id="opacitySlider" min="0" max="1" step="0.1" value="1"
                            oninput="updateOpacity(this.value)">
                    </div>
                </div>
            </div>

            <!-- 值面板 -->
            <div class="value-panel">
                <div class="value-tag">缩放: <span id="scaleDisplay">1.0</span></div>
                <div class="value-tag">圆角: <span id="radiusDisplay">20px</span></div>
                <div class="value-tag">旋转: <span id="rotationDisplay">0deg</span></div>
                <div class="value-tag">透明度: <span id="opacityDisplay">1.0</span></div>
            </div>

            <!-- 预览区域 -->
            <h2>🔍 单个属性预览</h2>
            <div class="preview-grid">
                <div class="preview-card">
                    <div class="preview-box" id="scalePreview">缩放</div>
                    <div>缩放效果</div>
                    <div id="scalePreviewValue">scale(1.0)</div>
                </div>

                <div class="preview-card">
                    <div class="preview-box" id="radiusPreview">圆角</div>
                    <div>圆角效果</div>
                    <div id="radiusPreviewValue">20px</div>
                </div>

                <div class="preview-card">
                    <div class="preview-box" id="rotationPreview">旋转</div>
                    <div>旋转效果</div>
                    <div id="rotationPreviewValue">0deg</div>
                </div>

                <div class="preview-card">
                    <div class="preview-box" id="opacityPreview">透明度</div>
                    <div>透明度效果</div>
                    <div id="opacityPreviewValue">1.0</div>
                </div>
            </div>

            <!-- 组合预览 -->
            <h2>🎯 组合效果预览</h2>
            <div class="combined-preview" id="combinedPreview">
                CSS 自定义属性<br>
                所有效果组合
            </div>

            <!-- 控制按钮 -->
            <div class="button-group">
                <button class="btn btn-primary" onclick="resetAll()">🔄 重置</button>
                <button class="btn btn-warning" onclick="randomAll()">🎲 随机</button>
            </div>

            <!-- 操作日志 -->
            <div class="log-panel" id="logPanel">
                <div class="log-entry info">📝 系统初始化...</div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            'use strict';

            // 当前值
            let currentValues = {
                scale: 1.0,
                radius: 20,
                rotation: 0,
                opacity: 1.0
            };

            // 检查API支持
            const supported = 'registerProperty' in CSS;
            const statusEl = document.getElementById('apiStatus');
            if (supported) {
                statusEl.textContent = '✓ 支持';
                statusEl.className = 'status-badge status-supported';

                // 尝试注册属性（只注册一次）
                try {
                    const properties = [
                        { name: '--demo-scale', syntax: '<number>', inherits: false, initialValue: '1' },
                        { name: '--demo-radius', syntax: '<length>', inherits: false, initialValue: '20px' },
                        { name: '--demo-rotation', syntax: '<angle>', inherits: false, initialValue: '0deg' },
                        { name: '--demo-opacity', syntax: '<number>', inherits: false, initialValue: '1' }
                    ];

                    properties.forEach(prop => {
                        try {
                            CSS.registerProperty(prop);
                        } catch (e) {
                            // 忽略重复注册的错误
                        }
                    });
                } catch (e) {
                    // 忽略错误
                }
            } else {
                statusEl.textContent = '✗ 不支持';
                statusEl.className = 'status-badge status-unsupported';
            }

            // 更新缩放
            window.updateScale = function (value) {
                currentValues.scale = parseFloat(value);

                // 更新显示
                document.getElementById('scaleValue').textContent = value;
                document.getElementById('scaleDisplay').textContent = value;
                document.getElementById('scalePreviewValue').textContent = `scale(${value})`;

                // 直接操作样式
                document.getElementById('scalePreview').style.transform = `scale(${value})`;

                // 更新组合预览
                updateCombinedPreview();

                log(`更新缩放 = ${value}`, 'info');
            };

            // 更新圆角
            window.updateRadius = function (value) {
                currentValues.radius = parseInt(value);
                const radiusValue = value + 'px';

                // 更新显示
                document.getElementById('radiusValue').textContent = radiusValue;
                document.getElementById('radiusDisplay').textContent = radiusValue;
                document.getElementById('radiusPreviewValue').textContent = radiusValue;

                // 直接操作样式
                document.getElementById('radiusPreview').style.borderRadius = radiusValue;

                // 更新组合预览
                updateCombinedPreview();

                log(`更新圆角 = ${radiusValue}`, 'info');
            };

            // 更新旋转
            window.updateRotation = function (value) {
                currentValues.rotation = parseInt(value);
                const rotationValue = value + 'deg';

                // 更新显示
                document.getElementById('rotationValue').textContent = rotationValue;
                document.getElementById('rotationDisplay').textContent = rotationValue;
                document.getElementById('rotationPreviewValue').textContent = rotationValue;

                // 直接操作样式
                document.getElementById('rotationPreview').style.transform = `rotate(${rotationValue})`;

                // 更新组合预览
                updateCombinedPreview();

                log(`更新旋转 = ${rotationValue}`, 'info');
            };

            // 更新透明度
            window.updateOpacity = function (value) {
                currentValues.opacity = parseFloat(value);

                // 更新显示
                document.getElementById('opacityValue').textContent = value;
                document.getElementById('opacityDisplay').textContent = value;
                document.getElementById('opacityPreviewValue').textContent = value;

                // 直接操作样式
                document.getElementById('opacityPreview').style.opacity = value;

                // 更新组合预览
                updateCombinedPreview();

                log(`更新透明度 = ${value}`, 'info');
            };

            // 更新组合预览
            function updateCombinedPreview() {
                const combined = document.getElementById('combinedPreview');
                combined.style.transform = `scale(${currentValues.scale}) rotate(${currentValues.rotation}deg)`;
                combined.style.borderRadius = currentValues.radius + 'px';
                combined.style.opacity = currentValues.opacity;
            }

            // 重置所有
            window.resetAll = function () {
                // 重置滑块
                document.getElementById('scaleSlider').value = 1;
                document.getElementById('radiusSlider').value = 20;
                document.getElementById('rotationSlider').value = 0;
                document.getElementById('opacitySlider').value = 1;

                // 重置值
                currentValues = { scale: 1.0, radius: 20, rotation: 0, opacity: 1.0 };

                // 更新显示
                updateScale(1);
                updateRadius(20);
                updateRotation(0);
                updateOpacity(1);

                log('🔄 所有值已重置', 'success');
            };

            // 随机所有
            window.randomAll = function () {
                const scale = (Math.random() * 1.5 + 0.5).toFixed(1);
                const radius = Math.floor(Math.random() * 40 + 10);
                const rotation = Math.floor(Math.random() * 360);
                const opacity = (Math.random() * 0.8 + 0.2).toFixed(1);

                // 更新滑块
                document.getElementById('scaleSlider').value = scale;
                document.getElementById('radiusSlider').value = radius;
                document.getElementById('rotationSlider').value = rotation;
                document.getElementById('opacitySlider').value = opacity;

                // 更新值
                currentValues = {
                    scale: parseFloat(scale),
                    radius: radius,
                    rotation: rotation,
                    opacity: parseFloat(opacity)
                };

                // 更新显示
                updateScale(scale);
                updateRadius(radius);
                updateRotation(rotation);
                updateOpacity(opacity);

                log('🎲 随机效果已应用', 'success');
            };

            // 日志
            function log(message, type) {
                const logPanel = document.getElementById('logPanel');
                const entry = document.createElement('div');
                entry.className = `log-entry ${type}`;

                const now = new Date();
                const time = `[${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}]`;

                entry.textContent = `${time} ${message}`;
                logPanel.appendChild(entry);
                logPanel.scrollTop = logPanel.scrollHeight;

                while (logPanel.children.length > 30) {
                    logPanel.removeChild(logPanel.children[0]);
                }
            }

            // 初始化
            log('系统初始化完成', 'success');
        })();
    </script>
</body>

</html>
