<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio 播放</title>
    <style>
        body {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 20px;
            font-family: Arial, sans-serif;
        }

        button {
            border-radius: 10px;
            background-color: #ccc;
            width: 100%;
            height: 50px;
            border-width: 0;
        }
    </style>
</head>

<body>
<button id="audioBtn">音频</button>
<script>
    document.getElementById("audioBtn")
        .addEventListener("click", async () => {
            if (navigator.mediaDevices.selectAudioOutput) { // 检查是否支持选择音频输出设备的功能
                // 显示选择设备的提示
                const audioDevice = await navigator.mediaDevices.selectAudioOutput();
                // 创建音频元素并在默认设备上开始播放音频
                const audio = document.createElement("audio");
                audio.src = "https://wsaudio2bssdlbig.kugou.com/202602240944/d15ca79db3a92f56c442b7e9604573bb/bss/extname/wsaudio/b415397d571ec9f1f3bc3e3a9c6df299.mp3";
                audio.play();
                // 将输出更改为所选的音频输出设备。
                audio.setSinkId(audioDevice.deviceId)
            } else { // 实现选择音频输出设备的功能
                const audioDevices = await navigator.mediaDevices.enumerateDevices();
                // 获取音频输出设备
                const audioDevice = audioDevices.find((device) => device.kind === "audiooutput");
                const audio = document.createElement("audio");
                audio.src = "https://wsaudio2bssdlbig.kugou.com/202602240944/d15ca79db3a92f56c442b7e9604573bb/bss/extname/wsaudio/b415397d571ec9f1f3bc3e3a9c6df299.mp3";
                audio.play();
                await audio.setSinkId(audioDevice.deviceId);

            }
        });
</script>
</body>
</html>
