<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Painting API - 完全修复版</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-supported {
            background: #4CAF50;
            color: white;
        }

        .status-unsupported {
            background: #f44336;
            color: white;
        }

        /* 演示网格 */
        .demo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 20px 0;
        }

        .paint-container {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .paint-container.selected {
            border-color: #4CAF50;
            background: #e8f5e8;
        }

        .paint-box {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
            border: 2px solid white;
        }

        .paint-label {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }

        /* 控制面板 */
        .control-panel {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
        }

        .control-group {
            margin-bottom: 20px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        .control-group input[type="range"] {
            width: 100%;
            height: 6px;
            background: #ddd;
            border-radius: 3px;
            -webkit-appearance: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #667eea;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .control-group input[type="color"] {
            width: 100%;
            height: 40px;
            border: 2px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
        }

        .value-display {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
        }

        .btn-primary:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #f44336;
            color: white;
        }

        .btn-danger:hover {
            background: #da190b;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #2196F3;
            color: white;
        }

        .btn-success:hover {
            background: #1976D2;
            transform: translateY(-2px);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* 参数网格 */
        .params-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 15px 0;
        }

        .param-item {
            background: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #eee;
            cursor: pointer;
            transition: all 0.3s;
        }

        .param-item:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .param-item.selected {
            border-color: #4CAF50;
            background: #e8f5e8;
        }

        .param-name {
            font-weight: bold;
            color: #667eea;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .param-value {
            font-size: 12px;
            color: #333;
            background: #f5f5f5;
            padding: 3px 6px;
            border-radius: 4px;
            display: inline-block;
            margin: 2px;
        }

        .log-panel {
            background: #1e1e2f;
            color: #fff;
            border-radius: 6px;
            padding: 10px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 11px;
            max-height: 150px;
            overflow-y: auto;
        }

        .log-entry {
            margin: 2px 0;
            padding: 2px 5px;
            border-radius: 3px;
        }

        .log-entry.success {
            color: #81c784;
            background: #1e3a2a;
        }

        .log-entry.warning {
            color: #ffb74d;
            background: #3a2e1e;
        }

        .log-entry.error {
            color: #e57373;
            background: #3a1e1e;
        }

        .log-entry.info {
            color: #64b5f6;
            background: #1e2a3a;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <h1>
                <span>🎨 CSS Painting API</span>
                <span class="status-badge" id="apiStatus">检测中...</span>
            </h1>
            <p>点击图案或参数网格选择，滑块和颜色选择器实时更新</p>

            <!-- 演示网格 -->
            <div class="demo-grid" id="demoGrid"></div>

            <!-- 控制面板 -->
            <h2>🎮 实时控制</h2>
            <div class="control-panel" id="controlPanel">
                <p style="text-align: center; color: #666;">点击上方图案选择</p>
            </div>

            <!-- 参数网格 -->
            <h2>📊 当前参数</h2>
            <div class="params-grid" id="paramGrid"></div>

            <!-- 操作按钮 -->
            <div class="button-group">
                <button class="btn btn-primary" id="registerBtn">📦 注册Worklet</button>
                <button class="btn btn-success" id="refreshBtn">🔄 刷新所有</button>
                <button class="btn btn-danger" id="clearLogsBtn">📋 清空日志</button>
            </div>

            <!-- 操作日志 -->
            <div class="log-panel" id="logPanel">
                <div class="log-entry info">📝 系统初始化...</div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            'use strict';

            class PaintDemo {
                constructor() {
                    this.supported = 'paintWorklet' in CSS;
                    this.currentPattern = 'checkerboard';

                    // 图案配置 - 确保参数名称与CSS变量一致
                    this.patterns = {
                        checkerboard: {
                            name: '🏁 棋盘格',
                            params: {
                                '--color1': { type: 'color', default: '#667eea', label: '颜色1' },
                                '--color2': { type: 'color', default: '#ffffff', label: '颜色2' },
                                '--size': { type: 'range', default: 20, min: 5, max: 50, label: '格子大小' }
                            }
                        },
                        circles: {
                            name: '⭕ 同心圆',
                            params: {
                                '--circle-color': { type: 'color', default: '#764ba2', label: '颜色' },
                                '--circle-count': { type: 'range', default: 5, min: 2, max: 15, label: '数量' },
                                '--circle-spacing': { type: 'range', default: 20, min: 5, max: 40, label: '间距' }
                            }
                        },
                        waves: {
                            name: '🌊 波浪线',
                            params: {
                                '--wave-color': { type: 'color', default: '#4CAF50', label: '颜色' },
                                '--wave-amplitude': { type: 'range', default: 20, min: 5, max: 50, label: '振幅' },
                                '--wave-frequency': { type: 'range', default: 3, min: 1, max: 10, label: '频率' }
                            }
                        },
                        dots: {
                            name: '🔴 随机点',
                            params: {
                                '--dot-color': { type: 'color', default: '#f44336', label: '颜色' },
                                '--dot-size': { type: 'range', default: 5, min: 2, max: 20, label: '大小' },
                                '--dot-density': { type: 'range', default: 50, min: 10, max: 200, label: '密度' }
                            }
                        }
                    };

                    // 存储当前参数值
                    this.params = {};
                    Object.keys(this.patterns).forEach(key => {
                        this.params[key] = {};
                        Object.entries(this.patterns[key].params).forEach(([pKey, pConfig]) => {
                            this.params[key][pKey] = pConfig.default;
                        });
                    });

                    this.elements = {
                        apiStatus: document.getElementById('apiStatus'),
                        demoGrid: document.getElementById('demoGrid'),
                        controlPanel: document.getElementById('controlPanel'),
                        paramGrid: document.getElementById('paramGrid'),
                        registerBtn: document.getElementById('registerBtn'),
                        refreshBtn: document.getElementById('refreshBtn'),
                        clearLogsBtn: document.getElementById('clearLogsBtn'),
                        logPanel: document.getElementById('logPanel')
                    };

                    this.init();
                }

                init() {
                    this.checkSupport();
                    this.setupEventListeners();
                    this.renderDemoGrid();
                    this.updateParamGrid();

                    if (this.supported) {
                        this.registerWorklet();
                    } else {
                        this.useFallback();
                    }

                    this.log('系统初始化完成', 'success');
                }

                checkSupport() {
                    if (this.supported) {
                        this.elements.apiStatus.textContent = '✓ 支持';
                        this.elements.apiStatus.className = 'status-badge status-supported';
                        this.log('✅ CSS Painting API 可用', 'success');
                    } else {
                        this.elements.apiStatus.textContent = '✗ 不支持';
                        this.elements.apiStatus.className = 'status-badge status-unsupported';
                        this.log('❌ 当前浏览器不支持，使用Canvas降级方案', 'warning');
                    }
                }

                setupEventListeners() {
                    this.elements.registerBtn.addEventListener('click', () => this.registerWorklet());
                    this.elements.refreshBtn.addEventListener('click', () => this.refreshAll());
                    this.elements.clearLogsBtn.addEventListener('click', () => this.clearLogs());
                }

                renderDemoGrid() {
                    let html = '';

                    Object.entries(this.patterns).forEach(([key, pattern]) => {
                        // 构建CSS变量字符串
                        const cssVars = Object.entries(this.params[key])
                            .map(([varName, value]) => `${varName}: ${value};`)
                            .join(' ');

                        const selectedClass = key === this.currentPattern ? 'selected' : '';

                        html += `
                            <div class="paint-container ${selectedClass}" data-pattern="${key}" onclick="window.demo.selectPattern('${key}')">
                                <h3>${pattern.name}</h3>
                                <div class="paint-box" 
                                     id="pattern-${key}"
                                     style="background-image: paint(${key}); ${cssVars}">
                                </div>
                                <div class="paint-label">点击选择</div>
                            </div>
                        `;
                    });

                    this.elements.demoGrid.innerHTML = html;
                }

                selectPattern(patternName) {
                    // 更新选中状态
                    document.querySelectorAll('.paint-container').forEach(el => {
                        el.classList.remove('selected');
                    });
                    const selectedEl = document.querySelector(`[data-pattern="${patternName}"]`);
                    if (selectedEl) selectedEl.classList.add('selected');

                    this.currentPattern = patternName;
                    this.updateControlPanel();
                    this.updateParamGrid();
                    this.log(`📋 已选择: ${this.patterns[patternName].name}`, 'success');
                }

                updateControlPanel() {
                    const pattern = this.patterns[this.currentPattern];
                    if (!pattern) return;

                    let html = `<h3 style="margin-bottom:15px;">${pattern.name} 参数控制</h3>`;

                    Object.entries(pattern.params).forEach(([varName, config]) => {
                        const value = this.params[this.currentPattern][varName];

                        html += `<div class="control-group">`;
                        html += `<label>${config.label} `;

                        if (config.type === 'range') {
                            html += `<span class="value-display" id="val-${varName.replace('--', '')}">${value}</span>`;
                            html += `</label>`;
                            html += `<input type="range" id="input-${varName.replace('--', '')}" `;
                            html += `min="${config.min}" max="${config.max}" value="${value}" step="1" `;
                            html += `oninput="window.demo.updateParam('${varName}', this.value)">`;
                        } else if (config.type === 'color') {
                            html += `</label>`;
                            html += `<input type="color" id="input-${varName.replace('--', '')}" `;
                            html += `value="${value}" `;
                            html += `oninput="window.demo.updateParam('${varName}', this.value)">`;
                        }

                        html += `</div>`;
                    });

                    this.elements.controlPanel.innerHTML = html;
                }

                updateParam(varName, value) {
                    // 更新参数值
                    this.params[this.currentPattern][varName] = value;

                    // 更新显示
                    const displayId = `val-${varName.replace('--', '')}`;
                    const display = document.getElementById(displayId);
                    if (display) display.textContent = value;

                    // 立即更新图案
                    this.refreshPattern(this.currentPattern);

                    // 更新参数网格
                    this.updateParamGrid();
                }

                refreshPattern(patternName) {
                    const patternEl = document.getElementById(`pattern-${patternName}`);
                    if (!patternEl) return;

                    // 更新CSS变量
                    Object.entries(this.params[patternName]).forEach(([varName, value]) => {
                        patternEl.style.setProperty(varName, value);
                    });

                    // 强制重绘 - 通过稍微改变transform来触发
                    patternEl.style.transform = 'scale(1.01)';
                    setTimeout(() => {
                        patternEl.style.transform = 'scale(1)';
                    }, 10);

                    this.log(`🔄 更新 ${this.patterns[patternName].name}`, 'info');
                }

                updateParamGrid() {
                    let html = '';

                    Object.entries(this.patterns).forEach(([patternName, pattern]) => {
                        const selectedClass = patternName === this.currentPattern ? 'selected' : '';

                        html += `<div class="param-item ${selectedClass}" onclick="window.demo.selectPattern('${patternName}')">`;
                        html += `<div class="param-name">${pattern.name}</div>`;

                        Object.entries(this.params[patternName]).forEach(([varName, value]) => {
                            const displayValue = varName.includes('color') ?
                                `<span style="display:inline-block; width:10px; height:10px; background:${value}; border-radius:2px;"></span> ${value}` :
                                value;
                            html += `<div class="param-value">${displayValue}</div>`;
                        });

                        html += `</div>`;
                    });

                    this.elements.paramGrid.innerHTML = html;
                }

                registerWorklet() {
                    if (!this.supported) return;

                    try {
                        // Worklet代码 - 使用正确的参数名称
                        const workletCode = `
                            // 棋盘格绘制器
                            class CheckerboardPainter {
                                static get inputProperties() {
                                    return ['--color1', '--color2', '--size'];
                                }

                                paint(ctx, size, properties) {
                                    const color1 = properties.get('--color1')?.toString() || '#667eea';
                                    const color2 = properties.get('--color2')?.toString() || '#ffffff';
                                    const size_px = parseInt(properties.get('--size')) || 20;

                                    const cols = Math.ceil(size.width / size_px);
                                    const rows = Math.ceil(size.height / size_px);

                                    for (let i = 0; i < cols; i++) {
                                        for (let j = 0; j < rows; j++) {
                                            ctx.fillStyle = (i + j) % 2 === 0 ? color1 : color2;
                                            ctx.fillRect(i * size_px, j * size_px, size_px, size_px);
                                        }
                                    }
                                }
                            }

                            // 同心圆绘制器
                            class CirclesPainter {
                                static get inputProperties() {
                                    return ['--circle-color', '--circle-count', '--circle-spacing'];
                                }

                                paint(ctx, size, properties) {
                                    const color = properties.get('--circle-color')?.toString() || '#764ba2';
                                    const count = parseInt(properties.get('--circle-count')) || 5;
                                    const spacing = parseInt(properties.get('--circle-spacing')) || 20;

                                    const centerX = size.width / 2;
                                    const centerY = size.height / 2;
                                    const maxRadius = Math.min(size.width, size.height) / 2;

                                    ctx.strokeStyle = color;
                                    ctx.lineWidth = 2;

                                    for (let i = 0; i < count; i++) {
                                        const radius = maxRadius - (i * spacing);
                                        if (radius <= 0) break;
                                        
                                        ctx.beginPath();
                                        ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
                                        ctx.stroke();
                                    }
                                }
                            }

                            // 波浪线绘制器 - 修复版
                            class WavesPainter {
                                static get inputProperties() {
                                    return ['--wave-color', '--wave-amplitude', '--wave-frequency'];
                                }

                                paint(ctx, size, properties) {
                                    const color = properties.get('--wave-color')?.toString() || '#4CAF50';
                                    const amplitude = parseInt(properties.get('--wave-amplitude')) || 20;
                                    const frequency = parseInt(properties.get('--wave-frequency')) || 3;

                                    ctx.strokeStyle = color;
                                    ctx.lineWidth = 2;

                                    // 绘制多条波浪线
                                    for (let y = 20; y < size.height; y += 20) {
                                        ctx.beginPath();
                                        for (let x = 0; x <= size.width; x += 5) {
                                            const waveY = y + amplitude * Math.sin(x * frequency / 20);
                                            if (x === 0) {
                                                ctx.moveTo(x, waveY);
                                            } else {
                                                ctx.lineTo(x, waveY);
                                            }
                                        }
                                        ctx.stroke();
                                    }
                                }
                            }

                            // 随机点绘制器 - 修复版
                            class DotsPainter {
                                static get inputProperties() {
                                    return ['--dot-color', '--dot-size', '--dot-density'];
                                }

                                paint(ctx, size, properties) {
                                    const color = properties.get('--dot-color')?.toString() || '#f44336';
                                    const dotSize = parseInt(properties.get('--dot-size')) || 5;
                                    const density = parseInt(properties.get('--dot-density')) || 50;

                                    // 根据密度计算点的数量
                                    const count = Math.floor(size.width * size.height * density / 10000);

                                    ctx.fillStyle = color;

                                    for (let i = 0; i < count; i++) {
                                        const x = Math.random() * size.width;
                                        const y = Math.random() * size.height;
                                        
                                        ctx.beginPath();
                                        ctx.arc(x, y, dotSize / 2, 0, 2 * Math.PI);
                                        ctx.fill();
                                    }
                                }
                            }

                            // 注册所有绘制器
                            registerPaint('checkerboard', CheckerboardPainter);
                            registerPaint('circles', CirclesPainter);
                            registerPaint('waves', WavesPainter);
                            registerPaint('dots', DotsPainter);
                        `;

                        const blob = new Blob([workletCode], { type: 'application/javascript' });
                        const url = URL.createObjectURL(blob);

                        CSS.paintWorklet.addModule(url).then(() => {
                            URL.revokeObjectURL(url);
                            this.log('✅ Paint Worklet 注册成功', 'success');

                            // 刷新所有图案
                            setTimeout(() => {
                                this.refreshAll();
                            }, 100);

                        }).catch(error => {
                            this.log(`❌ Worklet 注册失败: ${error.message}`, 'error');
                            this.useFallback();
                        });

                    } catch (error) {
                        this.log(`❌ 注册错误: ${error.message}`, 'error');
                        this.useFallback();
                    }
                }

                useFallback() {
                    // Canvas降级方案
                    Object.keys(this.patterns).forEach(key => {
                        this.drawFallback(key);
                    });
                    this.log('🎨 使用Canvas降级方案', 'info');
                }

                drawFallback(patternName) {
                    const container = document.getElementById(`pattern-${patternName}`);
                    if (!container) return;

                    // 清除原有背景
                    container.style.background = 'none';

                    // 创建Canvas
                    const canvas = document.createElement('canvas');
                    canvas.width = 200;
                    canvas.height = 200;
                    canvas.style.width = '100%';
                    canvas.style.height = '100%';

                    const ctx = canvas.getContext('2d');
                    const params = this.params[patternName];

                    // 根据图案类型绘制
                    switch (patternName) {
                        case 'checkerboard':
                            this.drawCheckerboard(ctx, params);
                            break;
                        case 'circles':
                            this.drawCircles(ctx, params);
                            break;
                        case 'waves':
                            this.drawWaves(ctx, params);
                            break;
                        case 'dots':
                            this.drawDots(ctx, params);
                            break;
                    }

                    // 保存canvas引用以便更新
                    container.innerHTML = '';
                    container.appendChild(canvas);
                }

                drawCheckerboard(ctx, params) {
                    const size = params['--size'];
                    const cols = Math.ceil(200 / size);
                    const rows = Math.ceil(200 / size);

                    for (let i = 0; i < cols; i++) {
                        for (let j = 0; j < rows; j++) {
                            ctx.fillStyle = (i + j) % 2 === 0 ? params['--color1'] : params['--color2'];
                            ctx.fillRect(i * size, j * size, size, size);
                        }
                    }
                }

                drawCircles(ctx, params) {
                    const centerX = 100;
                    const centerY = 100;
                    const maxRadius = 80;

                    ctx.strokeStyle = params['--circle-color'];
                    ctx.lineWidth = 2;

                    for (let i = 0; i < params['--circle-count']; i++) {
                        const radius = maxRadius - (i * params['--circle-spacing']);
                        if (radius <= 0) break;

                        ctx.beginPath();
                        ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
                        ctx.stroke();
                    }
                }

                drawWaves(ctx, params) {
                    ctx.strokeStyle = params['--wave-color'];
                    ctx.lineWidth = 2;

                    for (let y = 20; y < 200; y += 20) {
                        ctx.beginPath();
                        for (let x = 0; x <= 200; x += 5) {
                            const waveY = y + params['--wave-amplitude'] * Math.sin(x * params['--wave-frequency'] / 20);
                            if (x === 0) {
                                ctx.moveTo(x, waveY);
                            } else {
                                ctx.lineTo(x, waveY);
                            }
                        }
                        ctx.stroke();
                    }
                }

                drawDots(ctx, params) {
                    const count = Math.floor(200 * 200 * params['--dot-density'] / 10000);

                    ctx.fillStyle = params['--dot-color'];

                    for (let i = 0; i < count; i++) {
                        const x = Math.random() * 200;
                        const y = Math.random() * 200;

                        ctx.beginPath();
                        ctx.arc(x, y, params['--dot-size'] / 2, 0, 2 * Math.PI);
                        ctx.fill();
                    }
                }

                refreshAll() {
                    Object.keys(this.patterns).forEach(key => {
                        if (this.supported) {
                            this.refreshPattern(key);
                        } else {
                            this.drawFallback(key);
                        }
                    });

                    this.log('🔄 已刷新所有图案', 'success');
                }

                clearLogs() {
                    this.elements.logPanel.innerHTML = '<div class="log-entry info">📝 日志已清空</div>';
                    this.log('🗑️ 日志已清空', 'info');
                }

                log(message, type = 'info') {
                    const entry = document.createElement('div');
                    entry.className = `log-entry ${type}`;

                    const now = new Date();
                    const time = `[${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}]`;

                    entry.textContent = `${time} ${message}`;
                    this.elements.logPanel.appendChild(entry);

                    this.elements.logPanel.scrollTop = this.elements.logPanel.scrollHeight;

                    while (this.elements.logPanel.children.length > 50) {
                        this.elements.logPanel.removeChild(this.elements.logPanel.children[0]);
                    }
                }
            }

            // 启动
            window.demo = new PaintDemo();
        })();
    </script>
</body>

</html>
