<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Media Source Extensions - 分片加载演示</title>
    <style>
        :root {
            --bg-deep: #05070a;
            --bg-main: #0c1017;
            --bg-card: #151a23;
            --bg-hover: #1c2433;
            --border: #232b3a;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-purple: #8b5cf6;
            --accent-orange: #f59e0b;
            --radius: 8px;
            --font-mono: "SF Mono", Monaco, Consolas, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .badge {
            font-size: 10px;
            padding: 3px 6px;
            border-radius: 4px;
            background: rgba(139, 92, 246, 0.2);
            color: var(--accent-purple);
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .video-wrapper {
            background: #000;
            position: relative;
        }

        video {
            width: 100%;
            display: block;
            max-height: 450px;
        }

        /* 自定义进度条容器 */
        .progress-container {
            padding: 15px 20px;
            background: var(--bg-main);
            border-top: 1px solid var(--border);
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .progress-bar {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            position: relative;
            margin-bottom: 15px;
        }

        /* 已播放部分 */
        .played-progress {
            position: absolute;
            background: var(--accent-blue);
            height: 100%;
            border-radius: 3px;
            width: 0%;
            z-index: 2;
        }

        /* 缓冲部分 (MSE喂进去的数据) */
        .buffered-progress {
            position: absolute;
            background: var(--accent-green);
            height: 100%;
            border-radius: 3px;
            width: 0%;
            opacity: 0.5;
            z-index: 1;
        }

        /* 控制区 */
        .controls {
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            border-top: 1px solid var(--border);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 600;
        }

        select, button {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-deep);
            color: var(--text-primary);
            font-size: 12px;
            outline: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        button {
            background: var(--accent-blue);
            border: none;
            font-weight: 500;
        }

        button:hover:not(:disabled) {
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 日志区 */
        .log-area {
            background: var(--bg-deep);
            height: 150px;
            overflow-y: auto;
            padding: 10px;
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-secondary);
        }

        .log-entry {
            margin-bottom: 4px;
            padding-left: 8px;
            border-left: 2px solid var(--border);
        }

        .log-range {
            border-left-color: var(--accent-orange);
        }

        .log-buffer {
            border-left-color: var(--accent-green);
        }

        .log-error {
            border-left-color: var(--accent-purple);
            color: var(--accent-purple);
        }

        .stats-row {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
        }

        .stat-box {
            background: var(--bg-hover);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            color: var(--text-muted);
        }

        .stat-val {
            color: var(--text-primary);
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="title">
            Media Source Extensions API
            <span class="badge">Chunked Loading</span>
        </div>
        <div style="font-size: 12px; color: var(--text-secondary);">
            演示：使用 fetch Range 请求分片加载视频，模拟流媒体传输过程。
        </div>
    </div>

    <div class="video-wrapper">
        <video id="video" controls></video>
    </div>

    <!-- 自定义进度显示 -->
    <div class="progress-container">
        <div class="stats-row">
            <div class="stat-box">文件大小: <span id="stat-size" class="stat-val">-</span></div>
            <div class="stat-box">已下载: <span id="stat-downloaded" class="stat-val">0 MB</span></div>
            <div class="stat-box">分片大小: <span id="stat-chunk" class="stat-val">1 MB</span></div>
        </div>
        <div class="progress-labels">
            <span>播放进度</span>
            <span>缓冲进度</span>
        </div>
        <div class="progress-bar">
            <div class="buffered-progress" id="buffered-bar"></div>
            <div class="played-progress" id="played-bar"></div>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>分片大小</label>
            <select id="chunk-size-select">
                <option value="262144">256 KB (慢速演示)</option>
                <option value="524288">512 KB</option>
                <option value="1048576" selected>1 MB (推荐)</option>
                <option value="5242880">5 MB</option>
            </select>
        </div>
        <div class="control-group">
            <label>操作</label>
            <button id="btn-start">开始加载视频</button>
        </div>
    </div>

    <div class="log-area" id="log-area">
        <div class="log-entry">等待操作...</div>
    </div>
</div>

<script>
    // ========================================
    // Media Source Extensions API - 分片加载演示
    // ========================================

    const video = document.getElementById('video');
    const logArea = document.getElementById('log-area');
    const btnStart = document.getElementById('btn-start');
    const chunkSelect = document.getElementById('chunk-size-select');

    // UI 元素
    const playedBar = document.getElementById('played-bar');
    const bufferedBar = document.getElementById('buffered-bar');
    const statSize = document.getElementById('stat-size');
    const statDownloaded = document.getElementById('stat-downloaded');
    const statChunk = document.getElementById('stat-chunk');

    // 测试视频 URL (Sintel Trailer - 支持CORS和Range)
    const VIDEO_URL = 'http://vjs.zencdn.net/v/oceans.mp4';

    // 状态变量
    let mediaSource = null;
    let sourceBuffer = null;
    let totalFileSize = 0;
    let currentBytesLoaded = 0;
    let chunkSize = 1048576; // 默认 1MB

    // 日志工具
    function log(type, msg) {
        const div = document.createElement('div');
        div.className = `log-entry ${type}`;
        const time = new Date().toLocaleTimeString('zh-CN', {hour12: false});
        div.textContent = `[${time}] ${msg}`;
        logArea.appendChild(div);
        logArea.scrollTop = logArea.scrollHeight;
    }

    // 格式化字节
    function formatBytes(bytes) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const sizes = ['Bytes', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    // 初始化流程
    btnStart.addEventListener('click', async () => {
        // 1. 重置状态
        btnStart.disabled = true;
        chunkSize = parseInt(chunkSelect.value);
        statChunk.textContent = formatBytes(chunkSize);

        // 清空旧日志
        logArea.innerHTML = '';
        log('log-buffer', '初始化 MediaSource...');

        try {
            // 2. 探测文件大小 (HEAD 请求)
            log('log-range', '正在探测文件大小...');
            const headResp = await fetch(VIDEO_URL, {method: 'HEAD'});
            if (!headResp.ok) throw new Error('无法连接到视频源');

            totalFileSize = parseInt(headResp.headers.get('Content-Length'));
            statSize.textContent = formatBytes(totalFileSize);
            log('log-buffer', `文件总大小: ${formatBytes(totalFileSize)}`);

            // 3. 创建 MediaSource
            mediaSource = new MediaSource();
            video.src = URL.createObjectURL(mediaSource);

            // 监听 sourceopen 事件
            mediaSource.addEventListener('sourceopen', onSourceOpen);

        } catch (err) {
            log('log-error', `初始化失败: ${err.message}`);
            btnStart.disabled = false;
        }
    });

    // MediaSource 就绪回调
    function onSourceOpen() {
        log('log-buffer', 'MediaSource 已打开，创建 SourceBuffer...');

        // 4. 创建 SourceBuffer
        // 注意：MIME 类型必须匹配视频编码。Sintel 是 H.264 视频 + AAC 音频
        const mime = 'video/mp4; codecs="avc1.64001F, mp4a.40.2"';

        // 兼容性检查
        if (!MediaSource.isTypeSupported(mime)) {
            log('log-error', `不支持的 MIME 类型: ${mime}`);
            return;
        }

        sourceBuffer = mediaSource.addSourceBuffer(mime);

        // 5. 监听 updateend 事件，这是链式加载的关键
        sourceBuffer.addEventListener('updateend', fetchNextSegment);

        // 开始加载第一个分片
        fetchNextSegment();
    }

    // 核心函数：请求下一个分片
    async function fetchNextSegment() {
        // 判断是否下载完毕
        if (currentBytesLoaded >= totalFileSize) {
            log('log-buffer', '所有分片加载完成，结束流。');
            mediaSource.endOfStream();

            // 更新进度条为100%
            bufferedBar.style.width = '100%';

            // 移除监听器避免重复触发
            sourceBuffer.removeEventListener('updateend', fetchNextSegment);
            btnStart.disabled = false; // 允许重新开始
            return;
        }

        // 计算请求范围
        const startByte = currentBytesLoaded;
        const endByte = Math.min(startByte + chunkSize - 1, totalFileSize - 1);

        log('log-range', `请求字节范围: ${startByte} - ${endByte}`);

        try {
            // 发送带 Range 头的 GET 请求
            const response = await fetch(VIDEO_URL, {
                headers: {Range: `bytes=${startByte}-${endByte}`}
            });

            if (response.status !== 206) { // 206 Partial Content
                throw new Error(`服务器未返回 Range 数据，状态码: ${response.status}`);
            }

            // 获取 ArrayBuffer 数据
            const arrayBuffer = await response.arrayBuffer();

            log('log-buffer', `接收到分片: ${formatBytes(arrayBuffer.byteLength)}，正在追加到缓冲区...`);

            // 6. 将数据追加到 SourceBuffer
            sourceBuffer.appendBuffer(arrayBuffer);

            // 更新统计
            currentBytesLoaded += arrayBuffer.byteLength;
            updateStats();

        } catch (err) {
            log('log-error', `分片加载失败: ${err.message}`);
            // 简单的错误重试逻辑这里省略，实际生产环境需要重试
        }
    }

    // 更新 UI 统计和进度条
    function updateStats() {
        statDownloaded.textContent = formatBytes(currentBytesLoaded);

        // 更新缓冲进度条 (绿色)
        const percent = (currentBytesLoaded / totalFileSize) * 100;
        bufferedBar.style.width = `${percent}%`;
    }

    // 监听视频播放进度，更新播放条 (蓝色)
    video.addEventListener('timeupdate', () => {
        if (video.duration) {
            const percent = (video.currentTime / video.duration) * 100;
            playedBar.style.width = `${percent}%`;
        }
    });
</script>
</body>
</html>
