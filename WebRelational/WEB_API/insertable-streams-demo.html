<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Insertable Streams 演示</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --primary: #3b82f6;
            --radius: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 12px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 11px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--border);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--muted);
        }

        .status-dot.active {
            background: #22c55e;
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
            }
        }

        .video-card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
        }

        .card-body {
            position: relative;
            aspect-ratio: 4/3;
            background: #000;
        }

        video, canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            background: rgba(0, 0, 0, 0.8);
        }

        .placeholder-icon {
            font-size: 36px;
            margin-bottom: 12px;
        }

        .controls {
            padding: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 8px 16px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.9);
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        button:hover:not(:disabled) {
            background: #334155;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button.primary {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }

        .log-panel {
            grid-column: 1 / -1;
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 16px;
            font-family: "SF Mono", Monaco, Consolas, monospace;
            font-size: 11px;
            max-height: 150px;
            overflow-y: auto;
        }

        .log-entry {
            margin-bottom: 4px;
        }

        .log-time {
            color: var(--primary);
            margin-right: 6px;
        }

        .log-msg {
            color: var(--muted);
        }

        .log-msg.error {
            color: #f87171;
        }

        .log-msg.success {
            color: #4ade80;
        }
    </style>
</head>
<body>
<header>
    <h1>Insertable Streams for MediaStreamTrack 演示</h1>
    <p class="subtitle">实时视频帧处理：灰度滤镜</p>
    <div class="status-badge">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">未启动</span>
    </div>
</header>

<div class="main-container">
    <!-- 原始视频 -->
    <div class="video-card">
        <div class="card-header">
            <span class="card-title">原始视频</span>
            <span style="font-size: 11px; color: var(--muted);">Camera Source</span>
        </div>
        <div class="card-body">
            <video id="original-video" autoplay playsinline muted></video>
            <div class="placeholder" id="original-placeholder">
                <div class="placeholder-icon">📷</div>
                <div>等待启动摄像头</div>
            </div>
        </div>
    </div>

    <!-- 处理后视频 -->
    <div class="video-card">
        <div class="card-header">
            <span class="card-title">处理后视频</span>
            <span style="font-size: 11px; color: var(--muted);">Processed Stream</span>
        </div>
        <div class="card-body">
            <video id="processed-video" autoplay playsinline muted></video>
            <div class="placeholder" id="processed-placeholder">
                <div class="placeholder-icon">⚙️</div>
                <div>处理后的视频流</div>
            </div>
        </div>
    </div>

    <!-- 控制区 -->
    <div class="controls" style="grid-column: 1 / -1;">
        <button type="button" id="start-btn" class="primary">启动处理管线</button>
        <button type="button" id="stop-btn" disabled>停止处理</button>
    </div>

    <!-- 日志 -->
    <div class="log-panel" id="log-panel"></div>
</div>

<script>
    // ========================================
    // Insertable Streams for MediaStreamTrack 演示
    // ========================================

    // DOM 元素
    const elements = {
        originalVideo: document.getElementById('original-video'),
        processedVideo: document.getElementById('processed-video'),
        originalPlaceholder: document.getElementById('original-placeholder'),
        processedPlaceholder: document.getElementById('processed-placeholder'),
        startBtn: document.getElementById('start-btn'),
        stopBtn: document.getElementById('stop-btn'),
        statusDot: document.getElementById('status-dot'),
        statusText: document.getElementById('status-text'),
        logPanel: document.getElementById('log-panel')
    };

    // 状态
    let originalStream = null;
    let processor = null;
    let generator = null;
    let transformer = null;
    let abortController = null;

    // 日志
    function log(message, type = 'info') {
        const time = new Date().toLocaleTimeString('zh-CN', {hour12: false});
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `
        <span class="log-time">${time}</span>
        <span class="log-msg ${type}">${message}</span>
      `;
        elements.logPanel.appendChild(entry);
        elements.logPanel.scrollTop = elements.logPanel.scrollHeight;
        console.log(`[InsertableStreams][${time}] ${message}`);
    }

    // 更新状态
    function updateStatus(active, text) {
        elements.statusDot.classList.toggle('active', active);
        elements.statusText.textContent = text;
    }

    // ========================================
    // 核心处理逻辑：灰度滤镜
    // ========================================
    function processFrame(videoFrame) {
        // 1. 创建离屏 Canvas
        const canvas = new OffscreenCanvas(videoFrame.displayWidth, videoFrame.displayHeight);
        const ctx = canvas.getContext('2d');

        // 2. 绘制原始帧
        ctx.drawImage(videoFrame, 0, 0);

        // 3. 获取像素数据
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;

        // 4. 灰度转换算法
        for (let i = 0; i < data.length; i += 4) {
            const gray = data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
            data[i] = gray;     // R
            data[i + 1] = gray; // G
            data[i + 2] = gray; // B
            // data[i + 3] 保持不变
        }

        // 5. 写回 Canvas
        ctx.putImageData(imageData, 0, 0);

        // 6. 从 Canvas 创建新的 VideoFrame
        const newFrame = new VideoFrame(canvas, {
            timestamp: videoFrame.timestamp,
            alpha: 'discard'
        });

        // 7. 【非常重要】关闭原始帧以释放内存
        videoFrame.close();

        return newFrame;
    }

    // ========================================
    // 启动处理管线
    // ========================================
    async function startPipeline() {
        try {
            log('正在启动处理管线...');
            updateStatus(false, '正在初始化...');

            // 1. 检查 API 支持
            if (!window.MediaStreamTrackProcessor || !window.MediaStreamTrackGenerator) {
                throw new Error('当前浏览器不支持 Insertable Streams API');
            }

            // 2. 获取摄像头流
            log('请求摄像头权限...');
            originalStream = await navigator.mediaDevices.getUserMedia({
                video: {width: {ideal: 640}, height: {ideal: 480}},
                audio: false
            });

            // 显示原始视频
            elements.originalVideo.srcObject = originalStream;
            elements.originalPlaceholder.style.display = 'none';

            const videoTrack = originalStream.getVideoTracks()[0];
            log(`视频轨道已获取: ${videoTrack.label}`);

            // 3. 创建 Processor (消费者)
            processor = new MediaStreamTrackProcessor({track: videoTrack});
            log('MediaStreamTrackProcessor 已创建');

            // 4. 创建 Generator (生产者)
            generator = new MediaStreamTrackGenerator({kind: 'video'});
            log('MediaStreamTrackGenerator 已创建');

            // 5. 创建新的流并显示
            const processedStream = new MediaStream([generator]);
            elements.processedVideo.srcObject = processedStream;
            elements.processedPlaceholder.style.display = 'none';

            // 6. 创建 AbortController 用于停止
            abortController = new AbortController();

            // 7. 创建 TransformStream 定义处理逻辑
            transformer = new TransformStream({
                transform(videoFrame, controller) {
                    try {
                        // 核心处理：灰度转换
                        const newFrame = processFrame(videoFrame);
                        // 将处理后的帧放入输出流
                        controller.enqueue(newFrame);
                    } catch (error) {
                        log(`帧处理错误: ${error.message}`, 'error');
                        videoFrame.close(); // 确保关闭
                    }
                },
                flush(controller) {
                    log('流已结束');
                }
            });

            // 8. 连接管线：Processor -> Transform -> Generator
            await processor.readable
                .pipeThrough(transformer, {signal: abortController.signal})
                .pipeTo(generator.writable);

            log('管线连接成功，开始处理视频帧', 'success');
            updateStatus(true, '处理中');

            // 更新按钮状态
            elements.startBtn.disabled = true;
            elements.stopBtn.disabled = false;

        } catch (error) {
            log(`启动失败: ${error.message}`, 'error');
            updateStatus(false, '启动失败');
            stopPipeline(); // 清理资源
        }
    }

    // ========================================
    // 停止处理管线
    // ========================================
    function stopPipeline() {
        log('正在停止处理管线...');

        // 1. 取消管道传输
        if (abortController) {
            abortController.abort();
            abortController = null;
        }

        // 2. 停止原始流
        if (originalStream) {
            originalStream.getTracks().forEach(track => track.stop());
            originalStream = null;
        }

        // 3. 清理视频元素
        elements.originalVideo.srcObject = null;
        elements.processedVideo.srcObject = null;
        elements.originalPlaceholder.style.display = 'flex';
        elements.processedPlaceholder.style.display = 'flex';

        // 4. 重置状态
        processor = null;
        generator = null;
        transformer = null;

        updateStatus(false, '已停止');
        log('处理管线已停止', 'success');

        // 更新按钮状态
        elements.startBtn.disabled = false;
        elements.stopBtn.disabled = true;
    }

    // ========================================
    // 事件绑定
    // ========================================
    elements.startBtn.addEventListener('click', startPipeline);
    elements.stopBtn.addEventListener('click', stopPipeline);

    // 初始化日志
    log('页面加载完成，点击"启动处理管线"开始演示');
    if (!window.MediaStreamTrackProcessor || !window.MediaStreamTrackGenerator) {
        log('警告：当前浏览器不支持 Insertable Streams API', 'error');
    }
</script>
</body>
</html>
