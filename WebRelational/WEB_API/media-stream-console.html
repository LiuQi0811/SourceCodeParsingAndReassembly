<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediaStream 控制台</title>
    <style>
        :root {
            --bg-deep: #05070a;
            --bg-main: #0c1017;
            --bg-card: #151a23;
            --bg-hover: #1c2433;
            --border: #232b3a;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-purple: #8b5cf6;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            --radius: 8px;
            --radius-lg: 12px;
            --font-mono: "SF Mono", Monaco, Consolas, monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            height: 56px;
            background: var(--bg-main);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: var(--bg-card);
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid var(--border);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
        }

        .status-dot.active { background: var(--accent-green); box-shadow: 0 0 8px rgba(16, 185, 129, 0.5); }
        .status-dot.error { background: var(--accent-orange); }

        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* 左侧控制面板 */
        .control-panel {
            width: 320px;
            background: var(--bg-main);
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 16px;
        }

        button {
            padding: 10px 14px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg-hover);
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        button:hover:not(:disabled) { background: #2a3142; }
        button.primary { background: var(--accent-blue); border-color: var(--accent-blue); color: white; }
        button.danger { border-color: var(--accent-red); color: var(--accent-red); background: transparent; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        select, input {
            width: 100%;
            padding: 8px 10px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg-deep);
            color: var(--text-primary);
            font-size: 12px;
            margin-bottom: 10px;
            outline: none;
        }
        select:focus, input:focus { border-color: var(--accent-blue); }

        /* 右侧内容区 */
        .content-area {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            background: radial-gradient(circle at top, #1a1f2e 0%, var(--bg-main) 100%);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 视频预览 */
        .video-wrapper {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .video-box {
            flex: 1;
            min-width: 300px;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .video-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
        }

        .video-title { font-size: 13px; font-weight: 600; }
        .video-status { font-size: 11px; color: var(--text-muted); }

        video {
            width: 100%;
            background: #000;
            display: block;
        }

        .video-controls {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .video-controls button {
            width: auto;
            flex: 1;
            min-width: 120px;
        }

        /* 轨道信息 */
        .track-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 8px;
        }

        .track-item {
            background: var(--bg-deep);
            border-radius: 6px;
            padding: 10px;
            border: 1px solid var(--border);
            font-size: 11px;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            align-items: center;
            gap: 8px;
        }

        .track-label { color: var(--text-muted); }
        .track-val { font-family: var(--font-mono); }
        .track-val.kind { color: var(--accent-blue); }
        .track-val.state { color: var(--accent-green); }
        .track-val.state.ended { color: var(--accent-orange); }
        .track-val.muted { color: var(--accent-orange); }

        /* 日志 */
        .log-area {
            height: 120px;
            background: var(--bg-main);
            border-top: 1px solid var(--border);
            padding: 10px;
            overflow-y: auto;
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-muted);
        }
        .log-entry { margin-bottom: 4px; }
        .log-time { color: var(--accent-blue); margin-right: 6px; }
        .log-msg { color: var(--text-secondary); }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-icon">MS</div>
        <span>MediaStream 控制台</span>
    </div>
    <div class="status-badge">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">检测环境...</span>
    </div>
</header>

<main class="main-container">
    <!-- 左侧控制 -->
    <aside class="control-panel">
        <div class="card">
            <div class="section-title">API 支持</div>
            <p id="api-support-text" style="font-size: 12px; color: var(--text-secondary); margin-bottom: 8px;">
                正在检测...
            </p>
        </div>

        <div class="card">
            <div class="section-title">获取媒体流</div>
            <button id="btn-camera" class="primary">📷 打开摄像头</button>
            <button id="btn-screen">🖥 共享屏幕</button>
            <button id="btn-stop" class="danger">⏹ 停止所有流</button>
        </div>

        <div class="card">
            <div class="section-title">设备选择</div>
            <label style="font-size: 11px; color: var(--text-muted); margin-bottom: 4px; display: block;">视频输入设备</label>
            <select id="select-video-input">
                <option value="">默认</option>
            </select>

            <label style="font-size: 11px; color: var(--text-muted); margin-bottom: 4px; display: block;">音频输入设备</label>
            <select id="select-audio-input">
                <option value="">默认</option>
            </select>
        </div>
    </aside>

    <!-- 右侧展示 -->
    <section class="content-area">
        <div class="video-wrapper">
            <!-- 摄像头 -->
            <div class="video-box">
                <div class="video-header">
                    <span class="video-title">摄像头</span>
                    <span class="video-status" id="camera-status">未连接</span>
                </div>
                <video id="video-camera" autoplay playsinline muted></video>
                <div class="video-controls">
                    <button id="btn-mute-audio" disabled>🎤 静音麦克风</button>
                    <button id="btn-toggle-video" disabled>👁 关闭视频</button>
                </div>
                <div style="padding: 0 16px 12px;">
                    <div class="section-title">轨道信息</div>
                    <div class="track-list" id="camera-tracks"></div>
                </div>
            </div>

            <!-- 屏幕共享 -->
            <div class="video-box">
                <div class="video-header">
                    <span class="video-title">屏幕共享</span>
                    <span class="video-status" id="screen-status">未连接</span>
                </div>
                <video id="video-screen" autoplay playsinline muted></video>
                <div class="video-controls">
                    <button id="btn-stop-screen" disabled>⏹ 停止共享</button>
                </div>
                <div style="padding: 0 16px 12px;">
                    <div class="section-title">轨道信息</div>
                    <div class="track-list" id="screen-tracks"></div>
                </div>
            </div>
        </div>

        <!-- 日志 -->
        <div style="margin-top: auto;">
            <div class="section-title">事件日志</div>
            <div class="log-area" id="log-area">
                <div class="log-entry"><span class="log-time">[System]</span> <span class="log-msg">初始化完成...</span></div>
            </div>
        </div>
    </section>
</main>

<script>
    // ========================================
    // MediaStream 控制台
    // ========================================

    const $ = id => document.getElementById(id);

    const state = {
        supported: 'mediaDevices' in navigator && 'getUserMedia' in navigator.mediaDevices,
        cameraStream: null,
        screenStream: null,
        devices: {
            video: [],
            audio: []
        }
    };

    // 初始化
    async function init() {
        updateStatus();
        await loadDevices();
        setupListeners();
    }

    function updateStatus() {
        const dot = $('status-dot');
        const text = $('status-text');

        if (state.supported) {
            dot.classList.add('active');
            text.textContent = 'API 支持';
            $('api-support-text').innerHTML = '当前支持 <b>MediaDevices.getUserMedia / getDisplayMedia</b>。';
        } else {
            dot.classList.add('error');
            text.textContent = 'API 不支持';
            $('api-support-text').textContent = '当前环境不支持 MediaStream API。';
            $('btn-camera').disabled = true;
            $('btn-screen').disabled = true;
        }
    }

    async function loadDevices() {
        if (!state.supported) return;
        try {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoSelect = $('select-video-input');
            const audioSelect = $('select-audio-input');

            devices.forEach(device => {
                const option = document.createElement('option');
                option.value = device.deviceId;
                option.textContent = device.label || `${device.kind} (${device.deviceId.slice(0, 8)})`;

                if (device.kind === 'videoinput') {
                    state.devices.video.push(device);
                    videoSelect.appendChild(option);
                } else if (device.kind === 'audioinput') {
                    state.devices.audio.push(device);
                    audioSelect.appendChild(option);
                }
            });
        } catch (e) {
            console.error('枚举设备失败', e);
        }
    }

    function setupListeners() {
        $('btn-camera').addEventListener('click', startCamera);
        $('btn-screen').addEventListener('click', startScreen);
        $('btn-stop').addEventListener('click', stopAll);

        $('btn-mute-audio').addEventListener('click', toggleMicMute);
        $('btn-toggle-video').addEventListener('click', toggleVideoTrack);

        $('btn-stop-screen').addEventListener('click', stopScreen);

        // 设备切换
        $('select-video-input').addEventListener('change', restartCameraWithDevice);
        $('select-audio-input').addEventListener('change', restartCameraWithDevice);
    }

    // ========================================
    // 摄像头逻辑
    // ========================================

    async function startCamera() {
        if (!state.supported) return;

        try {
            const videoId = $('select-video-input').value || undefined;
            const audioId = $('select-audio-input').value || undefined;

            const constraints = {
                video: videoId ? { deviceId: { exact: videoId } } : true,
                audio: audioId ? { deviceId: { exact: audioId } } : true
            };

            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            state.cameraStream = stream;

            $('video-camera').srcObject = stream;
            $('camera-status').textContent = '已连接';
            $('btn-mute-audio').disabled = false;
            $('btn-toggle-video').disabled = false;

            log('摄像头已连接: ' + stream.id);
            renderCameraTracks();

            // 监听轨道结束事件
            stream.getTracks().forEach(track => {
                track.onended = () => {
                    log(`轨道结束: ${track.kind} (${track.id})`);
                    renderCameraTracks();
                };
            });

        } catch (err) {
            console.error(err);
            $('camera-status').textContent = '错误: ' + err.message;
            log('摄像头错误: ' + err.message, true);
        }
    }

    async function restartCameraWithDevice() {
        if (!state.cameraStream) return;
        stopStream(state.cameraStream);
        state.cameraStream = null;
        await startCamera();
    }

    function toggleMicMute() {
        if (!state.cameraStream) return;
        const audioTracks = state.cameraStream.getAudioTracks();
        if (!audioTracks.length) return;

        const track = audioTracks[0];
        track.enabled = !track.enabled;
        const btn = $('btn-mute-audio');
        btn.textContent = track.enabled ? '🎤 静音麦克风' : '🔊 取消静音';
        log(`麦克风 ${track.enabled ? '取消静音' : '静音'}: ${track.id}`);
        renderCameraTracks();
    }

    function toggleVideoTrack() {
        if (!state.cameraStream) return;
        const videoTracks = state.cameraStream.getVideoTracks();
        if (!videoTracks.length) return;

        const track = videoTracks[0];
        track.enabled = !track.enabled;
        const btn = $('btn-toggle-video');
        btn.textContent = track.enabled ? '👁 关闭视频' : '👀 打开视频';
        log(`视频 ${track.enabled ? '打开' : '关闭'}: ${track.id}`);
        renderCameraTracks();
    }

    function renderCameraTracks() {
        const container = $('camera-tracks');
        container.innerHTML = '';

        if (!state.cameraStream) {
            container.innerHTML = '<div style="color:var(--text-muted);">无轨道</div>';
            return;
        }

        const tracks = state.cameraStream.getTracks();
        tracks.forEach(track => {
            const item = document.createElement('div');
            item.className = 'track-item';

            item.innerHTML = `
          <span class="track-label">${track.kind === 'audio' ? '🎤 音频' : '📹 视频'}</span>
          <span class="track-val kind">${track.kind}</span>
          <span class="track-val state ${track.readyState === 'ended' ? 'ended' : ''}">${track.readyState}</span>
          <span class="track-val muted">${track.muted ? 'muted' : ''}</span>
          <span class="track-val" style="grid-column: 1 / -1; font-size: 10px;">label: ${track.label || '-'}</span>
          <span class="track-val" style="grid-column: 1 / -1; font-size: 10px;">enabled: ${track.enabled}</span>
          <span class="track-val" style="grid-column: 1 / -1; font-size: 10px;">id: ${track.id}</span>
        `;

            container.appendChild(item);
        });
    }

    // ========================================
    // 屏幕共享逻辑
    // ========================================

    async function startScreen() {
        if (!state.supported) return;

        try {
            const stream = await navigator.mediaDevices.getDisplayMedia({
                video: true,
                audio: true
            });

            state.screenStream = stream;
            $('video-screen').srcObject = stream;
            $('screen-status').textContent = '已连接';
            $('btn-stop-screen').disabled = false;

            log('屏幕共享已连接: ' + stream.id);
            renderScreenTracks();

            // 监听结束事件（用户点击停止共享）
            stream.getTracks().forEach(track => {
                track.onended = () => {
                    log(`屏幕轨道结束: ${track.kind} (${track.id})`);
                    stopScreen();
                };
            });

        } catch (err) {
            console.error(err);
            $('screen-status').textContent = '错误: ' + err.message;
            log('屏幕共享错误: ' + err.message, true);
        }
    }

    function stopScreen() {
        if (state.screenStream) {
            state.screenStream.getTracks().forEach(track => track.stop());
            state.screenStream = null;
        }
        $('video-screen').srcObject = null;
        $('screen-status').textContent = '未连接';
        $('btn-stop-screen').disabled = true;
        renderScreenTracks();
        log('屏幕共享已停止');
    }

    function renderScreenTracks() {
        const container = $('screen-tracks');
        container.innerHTML = '';

        if (!state.screenStream) {
            container.innerHTML = '<div style="color:var(--text-muted);">无轨道</div>';
            return;
        }

        const tracks = state.screenStream.getTracks();
        tracks.forEach(track => {
            const item = document.createElement('div');
            item.className = 'track-item';

            item.innerHTML = `
          <span class="track-label">${track.kind === 'audio' ? '🔊 音频' : '🖥 视频'}</span>
          <span class="track-val kind">${track.kind}</span>
          <span class="track-val state ${track.readyState === 'ended' ? 'ended' : ''}">${track.readyState}</span>
          <span class="track-val muted">${track.muted ? 'muted' : ''}</span>
          <span class="track-val" style="grid-column: 1 / -1; font-size: 10px;">label: ${track.label || '-'}</span>
          <span class="track-val" style="grid-column: 1 / -1; font-size: 10px;">enabled: ${track.enabled}</span>
          <span class="track-val" style="grid-column: 1 / -1; font-size: 10px;">id: ${track.id}</span>
        `;

            container.appendChild(item);
        });
    }

    // ========================================
    // 通用工具
    // ========================================

    function stopStream(stream) {
        if (!stream) return;
        stream.getTracks().forEach(track => track.stop());
    }

    function stopAll() {
        stopStream(state.cameraStream);
        stopStream(state.screenStream);
        state.cameraStream = null;
        state.screenStream = null;

        $('video-camera').srcObject = null;
        $('video-screen').srcObject = null;

        $('camera-status').textContent = '未连接';
        $('screen-status').textContent = '未连接';

        $('btn-mute-audio').disabled = true;
        $('btn-toggle-video').disabled = true;
        $('btn-stop-screen').disabled = true;

        renderCameraTracks();
        renderScreenTracks();
        log('已停止所有媒体流');
    }

    function log(msg, isError = false) {
        const panel = $('log-area');
        const time = new Date().toLocaleTimeString('zh-CN', { hour12: false });
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-msg" style="color:${isError ? 'var(--accent-red)' : 'inherit'}">${msg}</span>`;
        panel.appendChild(entry);
        panel.scrollTop = panel.scrollHeight;
    }

    init();
</script>
</body>
</html>
