<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0f1a;
      --bg-secondary: #111827;
      --bg-tertiary: #1a2234;
      --bg-card: #151d2e;
      --bg-code: #0d1320;
      --fg-primary: #e8edf5;
      --fg-secondary: #94a3b8;
      --fg-muted: #64748b;
      --accent: #22d3ee;
      --accent-secondary: #a78bfa;
      --accent-success: #10b981;
      --accent-warning: #f59e0b;
      --accent-error: #ef4444;
      --border: #1e293b;
      --border-light: #334155;
      --glow: rgba(34, 211, 238, 0.15);
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      --radius: 12px;
      --radius-sm: 8px;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="light"] {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f1f5f9;
      --bg-card: #ffffff;
      --bg-code: #f1f5f9;
      --fg-primary: #0f172a;
      --fg-secondary: #475569;
      --fg-muted: #94a3b8;
      --accent: #0891b2;
      --accent-secondary: #7c3aed;
      --accent-success: #059669;
      --accent-warning: #d97706;
      --accent-error: #dc2626;
      --border: #e2e8f0;
      --border-light: #cbd5e1;
      --glow: rgba(8, 145, 178, 0.1);
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg-primary);
      color: var(--fg-primary);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background Pattern */
    .bg-pattern {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: 
        radial-gradient(ellipse 80% 50% at 50% -20%, var(--glow), transparent),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(167, 139, 250, 0.08), transparent);
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image: 
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.3;
    }

    /* Layout */
    .app-container {
      position: relative;
      z-index: 1;
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      z-index: 100;
      transition: transform var(--transition);
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #f7df1e 0%, #e8c900 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #000;
      font-size: 14px;
    }

    .logo-text {
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.5px;
    }

    .logo-version {
      font-size: 11px;
      color: var(--fg-muted);
      background: var(--bg-tertiary);
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: auto;
    }

    /* Search */
    .search-container {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .search-box {
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--fg-primary);
      font-family: inherit;
      font-size: 14px;
      transition: var(--transition);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }

    .search-input::placeholder {
      color: var(--fg-muted);
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--fg-muted);
      pointer-events: none;
    }

    .search-shortcut {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 11px;
      color: var(--fg-muted);
      background: var(--bg-card);
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    /* Navigation */
    .nav-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0;
    }

    .nav-section {
      margin-bottom: 8px;
    }

    .nav-section-title {
      padding: 8px 20px;
      font-size: 11px;
      font-weight: 600;
      color: var(--fg-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      color: var(--fg-secondary);
      text-decoration: none;
      font-size: 14px;
      cursor: pointer;
      transition: var(--transition);
      border-left: 3px solid transparent;
    }

    .nav-item:hover {
      background: var(--bg-tertiary);
      color: var(--fg-primary);
    }

    .nav-item.active {
      background: var(--bg-tertiary);
      color: var(--accent);
      border-left-color: var(--accent);
    }

    .nav-item-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.7;
    }

    .nav-item.active .nav-item-icon {
      opacity: 1;
    }

    .nav-item-count {
      margin-left: auto;
      font-size: 11px;
      background: var(--bg-card);
      padding: 2px 8px;
      border-radius: 10px;
      color: var(--fg-muted);
    }

    /* Main Content */
    .main-content {
      flex: 1;
      margin-left: 280px;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .content-header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      backdrop-filter: blur(12px);
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--fg-muted);
    }

    .breadcrumb-sep {
      color: var(--border-light);
    }

    .breadcrumb-current {
      color: var(--fg-primary);
      font-weight: 500;
    }

    .header-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-btn {
      padding: 8px 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--fg-secondary);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: var(--transition);
      font-family: inherit;
    }

    .header-btn:hover {
      background: var(--bg-card);
      color: var(--fg-primary);
      border-color: var(--border-light);
    }

    .header-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg-primary);
    }

    .header-btn.primary:hover {
      filter: brightness(1.1);
    }

    /* Content Area */
    .content-area {
      flex: 1;
      padding: 32px;
      max-width: 1400px;
    }

    /* Page Header */
    .page-header {
      margin-bottom: 32px;
    }

    .page-title {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .page-title-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .page-description {
      font-size: 16px;
      color: var(--fg-secondary);
      max-width: 700px;
    }

    /* Stats Bar */
    .stats-bar {
      display: flex;
      gap: 24px;
      margin-top: 20px;
      padding: 16px 20px;
      background: var(--bg-card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .stat-item {
      display: flex;
      flex-direction: column;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-label {
      font-size: 12px;
      color: var(--fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Cards Grid */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      margin-top: 24px;
    }

    .api-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: var(--transition);
      cursor: pointer;
    }

    .api-card:hover {
      border-color: var(--border-light);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .api-card-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .api-card-icon {
      width: 40px;
      height: 40px;
      background: var(--bg-tertiary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      flex-shrink: 0;
    }

    .api-card-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .api-card-meta {
      font-size: 12px;
      color: var(--fg-muted);
    }

    .api-card-body {
      padding: 16px 20px;
    }

    .api-card-desc {
      font-size: 14px;
      color: var(--fg-secondary);
      margin-bottom: 12px;
    }

    .api-card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      font-size: 11px;
      padding: 3px 10px;
      background: var(--bg-tertiary);
      border-radius: 20px;
      color: var(--fg-muted);
    }

    .tag.es6 {
      background: rgba(34, 211, 238, 0.15);
      color: var(--accent);
    }

    .tag.es2020 {
      background: rgba(167, 139, 250, 0.15);
      color: var(--accent-secondary);
    }

    /* Code Block */
    .code-section {
      margin-top: 32px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title::before {
      content: '';
      width: 4px;
      height: 20px;
      background: var(--accent);
      border-radius: 2px;
    }

    .code-block {
      background: var(--bg-code);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 16px;
    }

    .code-header {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border);
    }

    .code-dots {
      display: flex;
      gap: 6px;
      margin-right: 12px;
    }

    .code-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--border-light);
    }

    .code-dot:nth-child(1) { background: #ef4444; }
    .code-dot:nth-child(2) { background: #f59e0b; }
    .code-dot:nth-child(3) { background: #10b981; }

    .code-filename {
      font-size: 13px;
      color: var(--fg-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .code-actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }

    .code-action-btn {
      padding: 6px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--fg-secondary);
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: var(--transition);
      font-family: inherit;
    }

    .code-action-btn:hover {
      background: var(--bg-tertiary);
      color: var(--fg-primary);
    }

    .code-content {
      padding: 20px;
      overflow-x: auto;
    }

    .code-content pre {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.7;
      color: var(--fg-primary);
    }

    .code-content .keyword { color: #c792ea; }
    .code-content .string { color: #c3e88d; }
    .code-content .number { color: #f78c6c; }
    .code-content .comment { color: #546e7a; font-style: italic; }
    .code-content .function { color: #82aaff; }
    .code-content .operator { color: #89ddff; }
    .code-content .property { color: #ffcb6b; }
    .code-content .class { color: #ffcb6b; }
    .code-content .method { color: #82aaff; }

    /* Output Panel */
    .output-panel {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-top: 12px;
    }

    .output-header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 600;
      color: var(--fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .output-content {
      padding: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--accent-success);
      min-height: 60px;
    }

    .output-content.error {
      color: var(--accent-error);
    }

    /* Detail Panel */
    .detail-panel {
      display: none;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-top: 24px;
      overflow: hidden;
    }

    .detail-panel.active {
      display: block;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .detail-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .detail-close {
      margin-left: auto;
      padding: 8px;
      background: var(--bg-tertiary);
      border: none;
      border-radius: 6px;
      color: var(--fg-secondary);
      cursor: pointer;
      transition: var(--transition);
    }

    .detail-close:hover {
      background: var(--bg-card);
      color: var(--fg-primary);
    }

    .detail-body {
      padding: 20px;
    }

    .detail-section {
      margin-bottom: 24px;
    }

    .detail-section h4 {
      font-size: 14px;
      font-weight: 600;
      color: var(--fg-muted);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .param-table {
      width: 100%;
      border-collapse: collapse;
    }

    .param-table th,
    .param-table td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .param-table th {
      font-size: 12px;
      font-weight: 600;
      color: var(--fg-muted);
      background: var(--bg-tertiary);
    }

    .param-table td {
      font-size: 13px;
    }

    .param-name {
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
    }

    .param-type {
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent-secondary);
      font-size: 12px;
    }

    /* Tabs */
    .tabs-container {
      margin-top: 24px;
    }

    .tabs-header {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }

    .tab-btn {
      padding: 12px 20px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--fg-muted);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
      margin-bottom: -1px;
    }

    .tab-btn:hover {
      color: var(--fg-secondary);
    }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Quick Reference */
    .quick-ref {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .quick-ref-item {
      padding: 16px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }

    .quick-ref-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
    }

    .quick-ref-desc {
      font-size: 13px;
      color: var(--fg-secondary);
    }

    /* Compatibility Badge */
    .compat-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: var(--bg-tertiary);
      border-radius: 20px;
      font-size: 11px;
      color: var(--fg-muted);
    }

    .compat-badge.supported {
      background: rgba(16, 185, 129, 0.15);
      color: var(--accent-success);
    }

    .compat-badge.partial {
      background: rgba(245, 158, 11, 0.15);
      color: var(--accent-warning);
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 14px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 10px;
      transform: translateY(100px);
      opacity: 0;
      transition: var(--transition);
      z-index: 1000;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast-icon {
      width: 20px;
      height: 20px;
      color: var(--accent-success);
    }

    /* Mobile Toggle */
    .mobile-toggle {
      display: none;
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 56px;
      height: 56px;
      background: var(--accent);
      border: none;
      border-radius: 50%;
      color: var(--bg-primary);
      cursor: pointer;
      z-index: 200;
      box-shadow: 0 4px 20px rgba(34, 211, 238, 0.4);
    }

    /* Install Banner */
    .install-banner {
      display: none;
      padding: 12px 20px;
      background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
      color: var(--bg-primary);
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      cursor: pointer;
    }

    .install-banner.show {
      display: block;
    }

    /* Offline Indicator */
    .offline-indicator {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 8px;
      background: var(--accent-warning);
      color: var(--bg-primary);
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      transform: translateY(-100%);
      transition: var(--transition);
      z-index: 1001;
    }

    // ========== 代码高亮 ==========
    function highlightSyntax(code) {
      const blocks = [];
      
      let result = code;
      
      // 1. 提取多行注释
      result = result.replace(/\/\*[\s\S]*?\*\//g, (match) => {
        const idx = blocks.length;
        blocks.push({ type: 'comment', content: match });
        return `[[BLOCK${idx}]]`;
      });
      
      // 2. 提取单行注释
      result = result.replace(/\/\/.*$/gm, (match) => {
        const idx = blocks.length;
        blocks.push({ type: 'comment', content: match });
        return `[[BLOCK${idx}]]`;
      });
      
      // 3. 提取字符串
      result = result.replace(/(["'`])(?:(?!\1)[^\\]|\\.)*?\1/g, (match) => {
        const idx = blocks.length;
        blocks.push({ type: 'string', content: match });
        return `[[BLOCK${idx}]]`;
      });

      // 4. 转义HTML特殊字符
      result = result.replace(/&/g, '&amp;');
      result = result.replace(/</g, '&lt;');
      result = result.replace(/>/g, '&gt;');

      // 5. 处理运算符（在添加标签之前）
      result = result.replace(/([+\-*/%=!&|^~?:])/g, '[[OP]]$1[[/OP]]');

      // 6. 处理关键字
      result = result.replace(/\b(const|let|var|function|return|if|else|for|while|do|switch|case|break|default|try|catch|finally|throw|new|class|extends|super|this|import|export|from|async|await|yield|static|get|set|of|in|typeof|instanceof|true|false|null|undefined)\b/g, '[[KW]]$1[[/KW]]');
      
      // 7. 处理数字
      result = result.replace(/\b(\d+\.?\d*)\b/g, '[[NUM]]$1[[/NUM]]');
      
      // 8. 处理函数调用
      result = result.replace(/([a-zA-Z_$][\w$]*)\s*\(/g, '[[FN]]$1[[/FN]](');
      
      // 9. 处理属性访问
      result = result.replace(/\.([a-zA-Z_$][\w$]*)/g, '.[[PROP]]$1[[/PROP]]');

      // 10. 将占位符转换为实际的span标签
      result = result.replace(/\[\[KW\]\]/g, '<span class="keyword">');
      result = result.replace(/\[\[\/KW\]\]/g, '</span>');
      result = result.replace(/\[\[NUM\]\]/g, '<span class="number">');
      result = result.replace(/\[\[\/NUM\]\]/g, '</span>');
      result = result.replace(/\[\[FN\]\]/g, '<span class="function">');
      result = result.replace(/\[\[\/FN\]\]/g, '</span>');
      result = result.replace(/\[\[PROP\]\]/g, '<span class="property">');
      result = result.replace(/\[\[\/PROP\]\]/g, '</span>');
      result = result.replace(/\[\[OP\]\]/g, '<span class="operator">');
      result = result.replace(/\[\[\/OP\]\]/g, '</span>');

      // 11. 恢复注释和字符串
      blocks.forEach((block, idx) => {
        const escaped = block.content
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
        
        const className = block.type === 'comment' ? 'comment' : 'string';
        const replacement = '<span class="' + className + '">' + escaped + '</span>';
        
        result = result.replace(`[[BLOCK${idx}]]`, replacement);
      });

      return result;
    }

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, m => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      })[m]);
    }

    // ========== 代码执行 ==========
    function runCode(code, outputId) {
      const output = document.getElementById(outputId);
      const logs = [];
      
      // 劫持 console.log
      const originalLog = console.log;
      console.log = (...args) => {
        logs.push(args.map(arg => 
          typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)
        ).join(' '));
      };
      
      // 检测代码是否包含异步关键字
      const hasAsync = /\b(async|await)\b/.test(code);
      
      // 包装代码：如果是异步代码，自动包装为async IIFE
      let wrappedCode = code;
      if (hasAsync && !code.includes('async function') && !code.includes('async ()')) {
        // 检测是否已经有顶层await
        if (/^\s*(const|let|var)\s+\w+\s*=\s*await\b/m.test(code) || 
            /^\s*await\s+/m.test(code)) {
          wrappedCode = `(async () => {\n${code}\n})()`;
        }
      }
      
      try {
        // 使用 Function 构造函数执行代码
        const fn = new Function(wrappedCode);
        const result = fn();
        
        // 处理返回的Promise
        if (result instanceof Promise) {
          output.innerHTML = '执行中...';
          result.then(() => {
            output.innerHTML = logs.length > 0 
              ? logs.join('\n') 
              : '代码执行成功，无输出';
            output.classList.remove('error');
          }).catch(error => {
            output.innerHTML = `错误: ${error.message}`;
            output.classList.add('error');
          }).finally(() => {
            console.log = originalLog;
          });
        } else {
          output.innerHTML = logs.length > 0 
            ? logs.join('\n') 
            : '代码执行成功，无输出';
          output.classList.remove('error');
          console.log = originalLog;
        }
      } catch (error) {
        output.innerHTML = `错误: ${error.message}`;
        output.classList.add('error');
        console.log = originalLog;
      }
    }

    }

    // ========== PWA ==========
    function registerServiceWorker() {
      if ('serviceWorker' in navigator) {
        // 注意：Blob URL 方式的 Service Worker 在大多数浏览器中不被支持
        // Service Worker 需要从同源 HTTPS URL 加载
        // 这里创建一个内联的 Service Worker 仅用于演示目的
        // 在生产环境中，应该将 Service Worker 文件部署到服务器上
        
        const swCode = `
          const CACHE_NAME = 'js-reference-v1';
          const urlsToCache = ['/'];
          
          self.addEventListener('install', event => {
            event.waitUntil(
              caches.open(CACHE_NAME)
                .then(cache => cache.addAll(urlsToCache))
                .catch(() => console.log('Cache addAll failed'))
            );
          });
          
          self.addEventListener('fetch', event => {
            event.respondWith(
              caches.match(event.request)
                .then(response => response || fetch(event.request))
                .catch(() => fetch(event.request))
            );
          });
        `;
        
        try {
          const blob = new Blob([swCode], { type: 'application/javascript' });
          const swUrl = URL.createObjectURL(blob);
          
          navigator.serviceWorker.register(swUrl).then(registration => {
            console.log('Service Worker 注册成功（演示模式）');
            // 清理 Blob URL
            URL.revokeObjectURL(swUrl);
          }).catch(error => {
            // Blob URL 方式不被支持是预期行为，静默处理
            console.log('Service Worker 注册跳过（需要HTTPS服务器）');
          });
        } catch (error) {
          // 静默处理错误
          console.log('Service Worker 不可用');
        }
      }
    }

        installBtn.style.display = 'flex';
      });
      
      installBanner.addEventListener('click', installApp);
      installBtn.addEventListener('click', installApp);
      
      window.addEventListener('appinstalled', () => {
        deferredPrompt = null;
        installBanner.classList.remove('show');
        installBtn.style.display = 'none';
        showToast('应用安装成功');
      });
    }

    async function installApp() {
      if (!deferredPrompt) return;
      
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      
      if (outcome === 'accepted') {
        showToast('正在安装...');
      }
      
      deferredPrompt = null;
      installBanner.classList.remove('show');
    }
