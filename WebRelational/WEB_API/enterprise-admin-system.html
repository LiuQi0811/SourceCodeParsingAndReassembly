<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Admin System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e14;
            --bg-secondary: #111820;
            --bg-card: #151c25;
            --bg-elevated: #1a222d;
            --border: #2a3441;
            --border-light: #3d4a5c;
            --text-primary: #e8eef5;
            --text-secondary: #8899a8;
            --text-muted: #5c6b7a;
            --accent: #00d4aa;
            --accent-dim: rgba(0, 212, 170, 0.15);
            --accent-glow: rgba(0, 212, 170, 0.4);
            --warning: #f59e0b;
            --error: #ef4444;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-light);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* 背景纹理 */
        .bg-pattern {
            background-image:
                    radial-gradient(circle at 20% 80%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
                    radial-gradient(circle at 80% 20%, rgba(245, 158, 11, 0.03) 0%, transparent 50%),
                    linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
        }

        /* 侧边栏 */
        .sidebar {
            width: 260px;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar.collapsed {
            width: 72px;
        }
        .sidebar.collapsed .nav-text,
        .sidebar.collapsed .logo-text {
            opacity: 0;
            width: 0;
            overflow: hidden;
        }

        /* 导航项 */
        .nav-item {
            position: relative;
            transition: all 0.2s ease;
        }
        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 0;
            background: var(--accent);
            border-radius: 0 3px 3px 0;
            transition: height 0.2s ease;
        }
        .nav-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }
        .nav-item.active {
            background: var(--accent-dim);
        }
        .nav-item.active::before {
            height: 60%;
        }
        .nav-item.active .nav-icon {
            color: var(--accent);
        }

        /* 选项卡 */
        .tab-item {
            position: relative;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .tab-item::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent);
            transform: scaleX(0);
            transition: transform 0.2s ease;
        }
        .tab-item.active::after {
            transform: scaleX(1);
        }
        .tab-item.active {
            background: var(--bg-card);
            color: var(--accent);
        }
        .tab-item:hover:not(.active) {
            background: rgba(255, 255, 255, 0.03);
        }
        .tab-close {
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .tab-item:hover .tab-close {
            opacity: 1;
        }

        /* 页面过渡 */
        .page-enter {
            opacity: 0;
            transform: translateY(10px);
        }
        .page-enter-active {
            opacity: 1;
            transform: translateY(0);
            transition: all 0.3s ease;
        }

        /* 卡片 */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            transition: all 0.2s ease;
        }
        .card:hover {
            border-color: var(--border-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* 统计卡片 */
        .stat-card {
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            transform: translate(30%, -30%);
            opacity: 0.1;
        }
        .stat-card.accent::before { background: var(--accent); }
        .stat-card.warning::before { background: var(--warning); }
        .stat-card.success::before { background: var(--success); }
        .stat-card.error::before { background: var(--error); }

        /* 按钮 */
        .btn-primary {
            background: var(--accent);
            color: var(--bg-primary);
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            filter: brightness(1.1);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }
        .btn-ghost:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* 表格 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        .data-table th {
            text-align: left;
            padding: 12px 16px;
            font-weight: 500;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .data-table td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }
        .data-table tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        /* 状态标签 */
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-badge.success {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
        }
        .status-badge.warning {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }
        .status-badge.error {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }
        .status-badge.pending {
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
        }

        /* 输入框 */
        .input-field {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: 8px;
            transition: all 0.2s ease;
            width: 100%;
        }
        .input-field:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }
        .input-field::placeholder {
            color: var(--text-muted);
        }

        /* 图表容器 */
        .chart-container {
            position: relative;
            height: 200px;
        }

        /* 动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-fadeInUp {
            animation: fadeInUp 0.5s ease forwards;
        }
        .animate-pulse {
            animation: pulse 2s infinite;
        }

        /* 延迟动画 */
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
        .delay-400 { animation-delay: 0.4s; }

        /* 移动端响应式 */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -260px;
                z-index: 50;
                height: 100vh;
            }
            .sidebar.mobile-open {
                left: 0;
            }
            .sidebar.collapsed {
                left: -72px;
            }
            .main-content {
                margin-left: 0 !important;
            }
        }

        /* prefers-reduced-motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* 通知 */
        .notification-dot {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 8px;
            height: 8px;
            background: var(--error);
            border-radius: 50%;
        }

        /* 折叠按钮 */
        .collapse-btn {
            transition: transform 0.3s ease;
        }
        .sidebar.collapsed .collapse-btn {
            transform: rotate(180deg);
        }
    </style>
</head>
<body class="bg-pattern">
<div id="app" class="flex h-screen">
    <!-- 侧边栏 -->
    <aside id="sidebar" class="sidebar h-full bg-[var(--bg-secondary)] border-r border-[var(--border)] flex flex-col z-40">
        <!-- Logo -->
        <div class="h-16 flex items-center px-5 border-b border-[var(--border)]">
            <div class="w-9 h-9 rounded-lg bg-[var(--accent)] flex items-center justify-center flex-shrink-0">
                <svg class="w-5 h-5 text-[var(--bg-primary)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                </svg>
            </div>
            <span class="logo-text ml-3 font-semibold text-lg whitespace-nowrap transition-all duration-300">EnterpriseOS</span>
        </div>

        <!-- 导航菜单 -->
        <nav class="flex-1 py-4 overflow-y-auto">
            <div class="px-3 mb-2">
                <span class="text-xs font-medium text-[var(--text-muted)] uppercase tracking-wider">主菜单</span>
            </div>
            <ul id="nav-menu" class="space-y-1 px-2">
                <!-- 导航项由JS渲染 -->
            </ul>

            <div class="px-3 mt-6 mb-2">
                <span class="text-xs font-medium text-[var(--text-muted)] uppercase tracking-wider">系统</span>
            </div>
            <ul id="system-menu" class="space-y-1 px-2">
                <!-- 系统菜单由JS渲染 -->
            </ul>
        </nav>

        <!-- 折叠按钮 -->
        <div class="p-4 border-t border-[var(--border)]">
            <button id="collapse-btn" class="w-full flex items-center justify-center py-2 rounded-lg btn-ghost">
                <svg class="collapse-btn w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/>
                </svg>
            </button>
        </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content flex-1 flex flex-col min-w-0 transition-all duration-300" style="margin-left: 0;">
        <!-- 顶部栏 -->
        <header class="h-16 bg-[var(--bg-secondary)] border-b border-[var(--border)] flex items-center justify-between px-4 md:px-6 flex-shrink-0">
            <div class="flex items-center gap-4">
                <!-- 移动端菜单按钮 -->
                <button id="mobile-menu-btn" class="md:hidden p-2 rounded-lg hover:bg-[var(--bg-elevated)]">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
                <!-- 面包屑 -->
                <div id="breadcrumb" class="flex items-center text-sm">
                    <span class="text-[var(--text-muted)]">首页</span>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <!-- 搜索 -->
                <div class="hidden md:flex items-center relative">
                    <input type="text" placeholder="搜索..." class="input-field w-64 pl-10 text-sm">
                    <svg class="w-4 h-4 absolute left-3 text-[var(--text-muted)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                </div>

                <!-- 通知 -->
                <button class="relative p-2 rounded-lg hover:bg-[var(--bg-elevated)] transition-colors">
                    <svg class="w-5 h-5 text-[var(--text-secondary)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                    </svg>
                    <span class="notification-dot"></span>
                </button>

                <!-- 用户头像 -->
                <div class="flex items-center gap-3 pl-3 border-l border-[var(--border)]">
                    <div class="w-9 h-9 rounded-full bg-gradient-to-br from-[var(--accent)] to-[var(--warning)] flex items-center justify-center text-sm font-semibold text-[var(--bg-primary)]">
                        AD
                    </div>
                    <div class="hidden md:block">
                        <div class="text-sm font-medium">Admin</div>
                        <div class="text-xs text-[var(--text-muted)]">超级管理员</div>
                    </div>
                </div>
            </div>
        </header>

        <!-- 选项卡栏 -->
        <div class="h-10 bg-[var(--bg-secondary)] border-b border-[var(--border)] flex items-center overflow-x-auto flex-shrink-0">
            <div id="tabs-container" class="flex h-full">
                <!-- 选项卡由JS渲染 -->
            </div>
            <div class="flex-1"></div>
            <div id="tabs-actions" class="flex items-center gap-1 px-2">
                <!-- 下拉菜单 -->
                <div class="relative">
                    <button id="tabs-dropdown-btn" class="p-1.5 rounded hover:bg-[var(--bg-elevated)] transition-colors">
                        <svg class="w-4 h-4 text-[var(--text-muted)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </button>
                    <div id="tabs-dropdown" class="hidden absolute right-0 top-full mt-1 w-40 bg-[var(--bg-elevated)] border border-[var(--border)] rounded-lg shadow-xl py-1 z-50">
                        <button class="w-full text-left px-4 py-2 text-sm hover:bg-[var(--bg-card)] transition-colors" onclick="TabManager.closeOtherTabs()">关闭其他</button>
                        <button class="w-full text-left px-4 py-2 text-sm hover:bg-[var(--bg-card)] transition-colors" onclick="TabManager.closeAllTabs()">关闭所有</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 页面内容区 -->
        <div id="page-container" class="flex-1 overflow-auto p-4 md:p-6">
            <!-- 页面内容由JS渲染 -->
        </div>
    </main>
</div>

<!-- 移动端遮罩 -->
<div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden" onclick="toggleMobileSidebar()"></div>

<script>
    // ============================================
    // 路由系统 (类似 vue-router)
    // ============================================
    const Router = {
        routes: new Map(),
        currentRoute: null,
        beforeHooks: [],
        afterHooks: [],

        // 注册路由
        register(path, config) {
            this.routes.set(path, {
                path,
                name: config.name,
                component: config.component,
                meta: config.meta || {},
                icon: config.icon,
                children: config.children || []
            });
            return this;
        },

        // 批量注册
        registerRoutes(routes) {
            Object.entries(routes).forEach(([path, config]) => {
                this.register(path, config);
            });
            return this;
        },

        // 前置守卫
        beforeEach(hook) {
            this.beforeHooks.push(hook);
        },

        // 后置守卫
        afterEach(hook) {
            this.afterHooks.push(hook);
        },

        // 导航
        push(path, params = {}) {
            if (!this.routes.has(path)) {
                console.warn(`Route not found: ${path}`);
                path = '/dashboard';
            }

            const route = this.routes.get(path);
            const from = this.currentRoute;
            const to = { ...route, params };

            // 执行前置守卫
            for (const hook of this.beforeHooks) {
                const result = hook(to, from);
                if (result === false) return;
            }

            // 更新URL
            window.location.hash = path;
            this.currentRoute = to;

            // 添加到选项卡
            if (!route.meta.hideTab) {
                TabManager.addTab(to);
            }

            // 渲染组件
            this.renderComponent(to);

            // 执行后置守卫
            this.afterHooks.forEach(hook => hook(to, from));
        },

        // 渲染组件
        renderComponent(route) {
            const container = document.getElementById('page-container');
            if (!container) return;

            container.innerHTML = '';

            if (typeof route.component === 'function') {
                const content = route.component(route.params);
                container.innerHTML = content;
            } else if (typeof route.component === 'string') {
                container.innerHTML = route.component;
            }

            // 添加动画类
            container.classList.add('page-enter');
            requestAnimationFrame(() => {
                container.classList.add('page-enter-active');
            });

            // 更新面包屑
            this.updateBreadcrumb(route);

            // 更新导航高亮
            this.updateNavActive(route.path);
        },

        // 更新面包屑
        updateBreadcrumb(route) {
            const breadcrumb = document.getElementById('breadcrumb');
            if (!breadcrumb) return;

            const parts = [
                { name: '首页', path: '/dashboard' }
            ];

            if (route.meta.parent) {
                const parent = this.routes.get(route.meta.parent);
                if (parent) {
                    parts.push({ name: parent.name, path: parent.path });
                }
            }
            parts.push({ name: route.name, path: route.path });

            breadcrumb.innerHTML = parts.map((part, i) => {
                const isLast = i === parts.length - 1;
                if (isLast) {
                    return `<span class="text-[var(--text-primary)] font-medium">${part.name}</span>`;
                }
                return `<a href="#${part.path}" class="text-[var(--text-muted)] hover:text-[var(--accent)] transition-colors">${part.name}</a><span class="mx-2 text-[var(--text-muted)]">/</span>`;
            }).join('');
        },

        // 更新导航高亮
        updateNavActive(path) {
            document.querySelectorAll('.nav-item').forEach(item => {
                const href = item.getAttribute('data-path');
                if (href === path || (path.startsWith(href) && href !== '/')) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        },

        // 初始化
        init() {
            // 监听 hash 变化
            window.addEventListener('hashchange', () => {
                const path = window.location.hash.slice(1) || '/dashboard';
                this.push(path);
            });

            // 初始导航
            const initialPath = window.location.hash.slice(1) || '/dashboard';
            this.push(initialPath);
        }
    };

    // ============================================
    // 选项卡管理器
    // ============================================
    const TabManager = {
        tabs: [],
        activeTab: null,
        maxTabs: 15,

        init() {
            const dropdownBtn = document.getElementById('tabs-dropdown-btn');
            const dropdown = document.getElementById('tabs-dropdown');

            if (dropdownBtn && dropdown) {
                dropdownBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    dropdown.classList.toggle('hidden');
                });

                document.addEventListener('click', () => {
                    dropdown.classList.add('hidden');
                });
            }
        },

        addTab(route) {
            // 检查是否已存在
            const existing = this.tabs.find(t => t.path === route.path);
            if (existing) {
                this.activateTab(route.path);
                return;
            }

            // 限制最大数量
            if (this.tabs.length >= this.maxTabs) {
                this.tabs.shift();
            }

            this.tabs.push({
                path: route.path,
                name: route.name,
                icon: route.icon,
                closable: route.meta.closable !== false
            });

            this.activateTab(route.path);
            this.render();
        },

        activateTab(path) {
            this.activeTab = path;
            this.render();
        },

        closeTab(path, event) {
            if (event) event.stopPropagation();

            const index = this.tabs.findIndex(t => t.path === path);
            if (index === -1) return;

            // 不允许关闭最后一个
            if (this.tabs.length === 1) return;

            this.tabs.splice(index, 1);

            // 如果关闭的是当前激活的，切换到相邻的
            if (this.activeTab === path) {
                const newIndex = Math.min(index, this.tabs.length - 1);
                Router.push(this.tabs[newIndex].path);
            }

            this.render();
        },

        closeOtherTabs() {
            this.tabs = this.tabs.filter(t => t.path === this.activeTab);
            this.render();
        },

        closeAllTabs() {
            const homeTab = this.tabs.find(t => t.path === '/dashboard');
            this.tabs = homeTab ? [homeTab] : [this.tabs[0]];
            Router.push(this.tabs[0].path);
            this.render();
        },

        render() {
            const container = document.getElementById('tabs-container');
            if (!container) return;

            container.innerHTML = this.tabs.map(tab => {
                const isActive = tab.path === this.activeTab;
                return `
            <div class="tab-item flex items-center gap-2 px-4 h-full border-r border-[var(--border)] ${isActive ? 'active' : ''}"
                 onclick="Router.push('${tab.path}')">
              ${tab.icon ? `<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">${tab.icon}</svg>` : ''}
              <span class="text-xs whitespace-nowrap">${tab.name}</span>
              ${tab.closable && this.tabs.length > 1 ? `
                <button class="tab-close p-0.5 rounded hover:bg-[var(--bg-elevated)]" onclick="TabManager.closeTab('${tab.path}', event)">
                  <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                  </svg>
                </button>

    // 路由守卫示例

        return true;

    Router.afterEach((to, from) => {
        // 页面渲染后的操作
        initCharts();

    // ============================================
    // 图表初始化
    // ============================================
    function initCharts() {
        const revenueChart = document.getElementById('revenue-chart');
        if (revenueChart) {
            const data = [35, 42, 38, 55, 48, 62, 58];
            const labels = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
            const maxVal = Math.max(...data);

            revenueChart.innerHTML = `
          <svg width="100%" height="100%" viewBox="0 0 400 180" preserveAspectRatio="none">
            <defs>
              <linearGradient id="chartGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:rgba(0,212,170,0.3)"/>
                <stop offset="100%" style="stop-color:rgba(0,212,170,0)"/>
              </linearGradient>
            </defs>
            <path d="${generateAreaPath(data, 400, 180)}" fill="url(#chartGradient)"/>
            <path d="${generateLinePath(data, 400, 180)}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/>
            ${data.map((v, i) => {
                const x = (i / (data.length - 1)) * 400;
                const y = 180 - (v / maxVal) * 150;
                return `<circle cx="${x}" cy="${y}" r="4" fill="var(--accent)" class="transition-all hover:r-6"/>`;
            }).join('')}
          </svg>
          <div class="absolute bottom-0 left-0 right-0 flex justify-between px-2 text-xs text-[var(--text-muted)]">
            ${labels.map(l => `<span>${l}</span>`).join('')}
          </div>
        `;
        }
    }

    function generateLinePath(data, width, height) {
        const maxVal = Math.max(...data);
        const points = data.map((v, i) => {
            const x = (i / (data.length - 1)) * width;
            const y = height - (v / maxVal) * (height - 30);
            return `${x},${y}`;
        });
        return `M ${points.join(' L ')}`;
    }

    function generateAreaPath(data, width, height) {
        const maxVal = Math.max(...data);
        const points = data.map((v, i) => {
            const x = (i / (data.length - 1)) * width;
            const y = height - (v / maxVal) * (height - 30);
            return `${x},${y}`;
        });
        return `M 0,${height} L ${points.join(' L ')} L ${width},${height} Z`;
    }

    // ============================================
    // 侧边栏折叠
    // ============================================
    function initSidebar() {
        const sidebar = document.getElementById('sidebar');
        const collapseBtn = document.getElementById('collapse-btn');
        const mainContent = document.querySelector('.main-content');

        if (collapseBtn && sidebar) {
            collapseBtn.addEventListener('click', () => {
                sidebar.classList.toggle('collapsed');
                if (window.innerWidth >= 768) {
                    mainContent.style.marginLeft = sidebar.classList.contains('collapsed') ? '-188px' : '0';
                }
            });
        }

        // 移动端菜单
        const mobileBtn = document.getElementById('mobile-menu-btn');
        const overlay = document.getElementById('sidebar-overlay');

        if (mobileBtn) {
            mobileBtn.addEventListener('click', toggleMobileSidebar);
        }
    }

    function toggleMobileSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');

        sidebar.classList.toggle('mobile-open');
        overlay.classList.toggle('hidden');
    }

    // ============================================
    // 初始化
    // ============================================
    document.addEventListener('DOMContentLoaded', () => {
        renderNavMenu();
        initSidebar();
        TabManager.init();
        Router.init();
    });
