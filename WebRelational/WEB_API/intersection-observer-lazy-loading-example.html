<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intersection Observer 懒加载示例</title>
    <style>
        /* 样式仅为演示 */
        .scroll-container {
            height: 400px;
            overflow-y: scroll;
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 20px;
        }

        .content-block {
            height: 200px;
            margin-bottom: 20px;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5em;
        }

        .lazy-image {
            width: 100%;
            height: 200px;
            background-color: #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #666;
        }

        .lazy-image img {
            max-width: 100%;
            max-height: 100%;
            display: block;
            opacity: 0;
            transition: opacity 1s ease-in;
        }

        .lazy-image img.loaded {
            opacity: 1;
        }

        .status-log {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 5px;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            max-width: 300px;
            z-index: 100;
        }
    </style>
</head>
<body>

<h1>Intersection Observer API - 图片懒加载示例</h1>
<p>向下滚动查看懒加载效果。</p>

<div class="scroll-container" id="scrollRoot">
    <!-- 一些填充内容，使图片初始在视口外 -->
    <div class="content-block">占位内容 1</div>
    <div class="content-block">占位内容 2</div>

    <!-- 懒加载图片区域 -->
    <div class="lazy-image" data-img-src="https://placekitten.com/408/287">
        <span>图片加载中...</span>
        <img src="" alt="懒加载图片">
    </div>

    <div class="content-block">占位内容 3</div>

    <div class="lazy-image" data-img-src="https://placekitten.com/408/288">
        <span>图片加载中...</span>
        <img src="" alt="懒加载图片">
    </div>

    <div class="content-block">占位内容 4</div>

    <div class="lazy-image" data-img-src="https://placekitten.com/408/289">
        <span>图片加载中...</span>
        <img src="" alt="懒加载图片">
    </div>
</div>

<!-- 状态日志 -->
<div class="status-log" id="statusLog"></div>

<script>
    // 获取日志容器
    const statusLog = document.getElementById('statusLog');

    function log(message) {
        const p = document.createElement('p');
        p.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
        statusLog.appendChild(p);
        statusLog.scrollTop = statusLog.scrollHeight;
    }

    log('页面加载完成，开始初始化观察器...');

    // 配置选项
    const options = {
        root: document.getElementById('scrollRoot'), // 指定根元素为滚动容器，而不是浏览器视口
        rootMargin: '0px',
        threshold: 0.1 // 当目标元素有10%进入根元素视口时触发
    };

    // 创建观察器回调
    const callback = (entries, observer) => {
        entries.forEach(entry => {
            // 每个 entry 描述一个目标元素的交叉变化
            if (entry.isIntersecting) {
                log(`目标 ${entry.target.dataset.imgSrc} 进入视口!`);

                const container = entry.target;
                const img = container.querySelector('img');
                const src = container.dataset.imgSrc;

                if (img && src) {
                    // 1. 设置 src，开始加载图片
                    img.src = src;
                    // 2. 监听图片加载完成事件
                    img.onload = () => {
                        log(`图片 ${src} 加载完成。`);
                        // 加载完成后添加类名，触发淡入动画
                        img.classList.add('loaded');
                        // 移除“加载中”提示文字
                        const span = container.querySelector('span');
                        if (span) {
                            span.style.display = 'none';
                        }
                    };
                    img.onerror = () => {
                        log(`图片 ${src} 加载失败!`, 'error');
                    };
                }

                // 停止观察该元素，避免重复加载
                observer.unobserve(entry.target);
            }
        });
    };

    // 创建观察器实例
    const observer = new IntersectionObserver(callback, options);

    // 获取并开始观察所有懒加载图片容器
    document.querySelectorAll('.lazy-image').forEach(lazyImage => {
        observer.observe(lazyImage);
    });

    log(`正在观察 ${document.querySelectorAll('.lazy-image').length} 个懒加载目标。`);
</script>
</body>
</html>
