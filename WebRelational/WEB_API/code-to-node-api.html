<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Node.js API 速查手册</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0e14;
      --bg-secondary: #0f1419;
      --bg-tertiary: #1a1f26;
      --bg-card: #141a21;
      --border: #2d3640;
      --text-primary: #e6e6e6;
      --text-secondary: #8a9199;
      --text-muted: #5c6773;
      --accent: #39bae6;
      --accent-green: #7fd962;
      --accent-orange: #ff9940;
      --accent-purple: #d2a6ff;
      --accent-red: #ff6b6b;
      --accent-cyan: #95e6cb;
      --accent-yellow: #ffb454;
      --accent-pink: #f07178;
      --code-bg: #0d1016;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      margin: 0;
      min-height: 100vh;
    }

    .font-mono { font-family: 'JetBrains Mono', monospace; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* Code Tokens - 使用 data 属性选择器 */
    .token-keyword { color: #ff8f40; font-weight: 500; }
    .token-string { color: #c2d94c; }
    .token-function { color: #ffb454; }
    .token-number { color: #e6b450; }
    .token-comment { color: #5c6773; font-style: italic; }
    .token-property { color: #73d0ff; }
    .token-operator { color: #f29668; }
    .token-class { color: #59c2ff; }
    .token-constant { color: #e6b450; }
    .token-builtin { color: #f07178; }
    .token-punctuation { color: #626a73; }
    .token-decorator { color: #d2a6ff; }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-fade-in { animation: fadeInUp 0.4s ease-out forwards; opacity: 0; }
    .stagger-1 { animation-delay: 0.05s; }
    .stagger-2 { animation-delay: 0.1s; }
    .stagger-3 { animation-delay: 0.15s; }
    .stagger-4 { animation-delay: 0.2s; }

    @media (prefers-reduced-motion: reduce) {
      .animate-fade-in { animation: none; opacity: 1; transform: none; }
    }

    /* Code Block */
    .code-block {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    .code-block::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.3;
    }

    .code-header {
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .code-dots { display: flex; gap: 6px; }
    .code-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); }
    .code-dot.red { background: #ff5f57; }
    .code-dot.yellow { background: #febc2e; }
    .code-dot.green { background: #28c840; }

    .code-content {
      padding: 16px 20px;
      overflow-x: auto;
      line-height: 1.7;
      font-size: 13px;
    }

    .code-content code {
      font-family: 'JetBrains Mono', monospace;
      white-space: pre;
    }

    /* Navigation */
    .nav-item {
      transition: all 0.2s ease;
      border-left: 2px solid transparent;
    }

    .nav-item:hover { background: var(--bg-tertiary); }
    .nav-item.active { background: var(--bg-tertiary); border-left-color: var(--accent); }

    /* API Card */
    .api-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      transition: all 0.25s ease;
    }

    .api-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(57, 186, 230, 0.08);
    }

    /* Button */
    .btn-copy {
      transition: all 0.2s ease;
      border: 1px solid var(--border);
    }

    .btn-copy:hover {
      background: var(--accent);
      color: var(--bg-primary);
      border-color: var(--accent);
    }

    .btn-copy.copied {
      background: var(--accent-green);
      color: var(--bg-primary);
      border-color: var(--accent-green);
    }

    /* Tab */
    .tab-btn {
      transition: all 0.2s ease;
      position: relative;
      padding-bottom: 12px;
    }

    .tab-btn::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transition: transform 0.2s ease;
    }

    .tab-btn.active { color: var(--accent); }
    .tab-btn.active::after { transform: scaleX(1); }

    /* Search */
    .search-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(57, 186, 230, 0.15);
    }

    /* Mobile Menu */
    .mobile-nav {
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .mobile-nav.open { transform: translateX(0); }

    .overlay {
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .overlay.open { opacity: 1; visibility: visible; }

    /* Param Tag */
    .param-tag {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-tertiary);
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    /* Background */
    .bg-pattern {
      background-image: 
        radial-gradient(circle at 20% 80%, rgba(57, 186, 230, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(210, 166, 255, 0.03) 0%, transparent 50%);
    }
  </style>
</head>
<body class="antialiased bg-pattern">

  <!-- Sidebar -->

          <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
            <path d="M12 1.85c-.27 0-.55.07-.78.2l-7.44 4.3c-.48.28-.78.8-.78 1.36v8.58c0 .56.3 1.08.78 1.36l7.44 4.3c.23.13.51.2.78.2s.55-.07.78-.2l7.44-4.3c.48-.28.78-.8.78-1.36V7.71c0-.56-.3-1.08-.78-1.36l-7.44-4.3c-.23-.13-.51-.2-.78-.2zM12 4.15l6.21 3.59v7.18L12 18.51 5.79 14.92V7.74L12 4.15z"/>

    <!-- Search -->

  <!-- Toast -->

    <span>已复制到剪贴板</span>

  <script>
    // ==================== API 数据 ====================
    const apiData = {
      fs: {
        name: 'File System',
        moduleName: 'fs',
        description: '文件系统操作模块，提供文件的读写、创建、删除等功能',
        color: 'var(--accent-green)',
        methods: [
          {
            name: 'readFile',
            fullName: 'fs.readFile',
            signature: 'fs.readFile(path[, options], callback)',
            description: '异步读取文件的全部内容',
            params: [
              { name: 'path', type: 'string | Buffer | URL', desc: '文件路径' },
              { name: 'options', type: 'Object | string', desc: '编码或配置对象' },
              { name: 'callback', type: 'Function', desc: '回调函数 (err, data)' }
            ],
            example: `const fs = require('fs');

// 异步读取文件
fs.readFile('example.txt', 'utf8', (err, data) => {
  if (err) {
    console.error('读取失败:', err.message);
    return;
  }
  console.log('文件内容:', data);
});

// 使用 Promise 版本 (推荐)
const fsPromises = require('fs/promises');

async function readFileAsync() {
  try {
    const data = await fsPromises.readFile('example.txt', 'utf8');
    console.log('文件内容:', data);
  } catch (err) {
    console.error('读取错误:', err);
  }
}`
          },
          {
            name: 'writeFile',
            fullName: 'fs.writeFile',
            signature: 'fs.writeFile(file, data[, options], callback)',
            description: '异步写入数据到文件',
            params: [
              { name: 'file', type: 'string | Buffer | URL', desc: '文件路径' },
              { name: 'data', type: 'string | Buffer', desc: '要写入的数据' },
              { name: 'options', type: 'Object | string', desc: '编码或配置' },
              { name: 'callback', type: 'Function', desc: '回调函数' }
            ],
            example: `const fs = require('fs');

// 写入文本文件
fs.writeFile('message.txt', 'Hello Node.js!', 'utf8', (err) => {
  if (err) throw err;
  console.log('文件已保存!');
});

// 写入 JSON 配置
const config = { name: 'App', version: '2.0.0' };
fs.writeFile('config.json', JSON.stringify(config, null, 2), (err) => {
  if (err) console.error('写入失败:', err);
  else console.log('配置已保存');
});`
          },
          {
            name: 'mkdir',
            fullName: 'fs.mkdir',
            signature: 'fs.mkdir(path[, options], callback)',
            description: '创建目录，支持递归创建',
            params: [
              { name: 'path', type: 'string | Buffer | URL', desc: '目录路径' },
              { name: 'options', type: 'Object', desc: '{ recursive: boolean }' }
            ],
            example: `const fs = require('fs');

// 创建单层目录
fs.mkdir('my-dir', (err) => {
  if (err && err.code !== 'EEXIST') throw err;
  console.log('目录已创建');
});

// 递归创建多层目录
fs.mkdir('deep/nested/dir', { recursive: true }, (err, path) => {
  if (err) throw err;
  console.log('创建的目录:', path);
});`
          }
        ]
      },
      http: {
        name: 'HTTP',
        moduleName: 'http',
        description: 'HTTP 服务器和客户端模块',
        color: 'var(--accent)',
        methods: [
          {
            name: 'createServer',
            fullName: 'http.createServer',
            signature: 'http.createServer([options][, requestListener])',
            description: '创建 HTTP 服务器实例',
            params: [
              { name: 'options', type: 'Object', desc: '服务器配置' },
              { name: 'requestListener', type: 'Function', desc: '(req, res) => void' }
            ],
            example: `const http = require('http');

// 创建基础服务器
const server = http.createServer((req, res) => {
  console.log(\`\${req.method} \${req.url}\`);
  res.writeHead(200, { 'Content-Type': 'text/html; charset=utf-8' });
  res.end('<h1>Hello World!</h1>');
});

server.listen(3000, () => {
  console.log('服务器运行在 http://localhost:3000');
});`
          },
          {
            name: 'get',
            fullName: 'http.get',
            signature: 'http.get(url[, options][, callback])',
            description: '发起 HTTP GET 请求',
            params: [
              { name: 'url', type: 'string | URL', desc: '请求地址' },
              { name: 'options', type: 'Object', desc: '请求配置' },
              { name: 'callback', type: 'Function', desc: '响应回调' }
            ],
            example: `const http = require('http');

http.get('http://jsonplaceholder.typicode.com/posts/1', (res) => {
  const { statusCode } = res;
  if (statusCode !== 200) {
    console.error('请求失败:', statusCode);
    res.resume();
    return;
  }

  res.setEncoding('utf8');
  let rawData = '';
  res.on('data', (chunk) => { rawData += chunk; });
  res.on('end', () => {
    console.log(JSON.parse(rawData));
  });
}).on('error', console.error);`
          }
        ]
      },
      path: {
        name: 'Path',
        moduleName: 'path',
        description: '文件路径处理工具，跨平台兼容',
        color: 'var(--accent-orange)',
        methods: [
          {
            name: 'join',
            fullName: 'path.join',
            signature: 'path.join([...paths])',
            description: '连接路径片段，自动规范化',
            params: [
              { name: '...paths', type: 'string', desc: '路径片段' }
            ],
            example: `const path = require('path');

// 连接路径
const fullPath = path.join('/foo', 'bar', 'baz/asdf', 'quux', '..');
console.log(fullPath); // '/foo/bar/baz/asdf'

// 跨平台路径构建
const dataPath = path.join(__dirname, 'data', 'users.json');
console.log(dataPath);`
          },
          {
            name: 'resolve',
            fullName: 'path.resolve',
            signature: 'path.resolve([...paths])',
            description: '将路径解析为绝对路径',
            params: [
              { name: '...paths', type: 'string', desc: '路径片段' }
            ],
            example: `const path = require('path');

// 解析为绝对路径
console.log(path.resolve('foo/bar', '/tmp/file/'));
// '/tmp/file'

console.log(path.resolve('wwwroot', 'static', '../public'));
// '/当前目录/wwwroot/public'`
          }
        ]
      },
      events: {
        name: 'Events',
        moduleName: 'events',
        description: '事件驱动架构核心模块',
        color: 'var(--accent-cyan)',
        methods: [
          {
            name: 'EventEmitter',
            fullName: 'events.EventEmitter',
            signature: 'new EventEmitter()',
            description: '创建事件发射器实例',
            params: [],
            example: `const EventEmitter = require('events');

class MyEmitter extends EventEmitter {}

const emitter = new MyEmitter();

// 监听事件
emitter.on('event', (data) => {
  console.log('触发事件:', data);
});

// 触发事件
emitter.emit('event', { message: 'Hello' });`
          }
        ]
      },
      crypto: {
        name: 'Crypto',
        moduleName: 'crypto',
        description: '加密解密、哈希计算模块',
        color: 'var(--accent-red)',
        methods: [
          {
            name: 'createHash',
            fullName: 'crypto.createHash',
            signature: 'crypto.createHash(algorithm[, options])',
            description: '创建哈希对象',
            params: [
              { name: 'algorithm', type: 'string', desc: '算法: md5, sha256 等' }
            ],
            example: `const crypto = require('crypto');

// SHA256 哈希
const hash = crypto.createHash('sha256')
  .update('hello world')
  .digest('hex');
console.log('SHA256:', hash);

// MD5 哈希
const md5 = crypto.createHash('md5')
  .update('password123')
  .digest('hex');
console.log('MD5:', md5);`
          }
        ]
      }
    };

    // ==================== 状态 ====================
    let currentModule = 'fs';
    let currentTab = 'overview';

    // ==================== DOM 缓存 ====================
    const $ = id => document.getElementById(id);

    // ==================== 代码高亮器 ====================
    class CodeHighlighter {
      constructor() {
        this.keywords = ['const', 'let', 'var', 'function', 'return', 'if', 'else', 'for', 'while', 'class', 'extends', 'new', 'this', 'try', 'catch', 'throw', 'async', 'await', 'import', 'export', 'from', 'default', 'typeof', 'instanceof'];
        this.builtins = ['console', 'JSON', 'Object', 'Array', 'String', 'Number', 'Boolean', 'Date', 'Math', 'Promise', 'Error', 'Buffer', 'URL', 'Map', 'Set'];
        this.constants = ['null', 'undefined', 'true', 'false', 'NaN', 'Infinity'];
      }

      highlight(code) {
        const tokens = this.tokenize(code);
        return this.render(tokens);
      }

      tokenize(code) {
        const tokens = [];
        let i = 0;
        const len = code.length;

        while (i < len) {
          // 跳过空白
          if (this.isWhitespace(code[i])) {
            let ws = '';
            while (i < len && this.isWhitespace(code[i])) {
              ws += code[i];
              i++;
            }
            tokens.push({ type: 'whitespace', value: ws });
            continue;
          }

          // 单行注释
          if (code.slice(i, i + 2) === '//') {
            let comment = '';
            while (i < len && code[i] !== '\n') {
              comment += code[i];
              i++;
            }
            tokens.push({ type: 'comment', value: comment });
            continue;
          }

          // 字符串 - 单引号
          if (code[i] === "'") {
            let str = "'";
            i++;
            while (i < len && code[i] !== "'") {
              if (code[i] === '\\' && i + 1 < len) {
                str += code[i] + code[i + 1];
                i += 2;
              } else {
                str += code[i];
                i++;
              }
            }
            if (i < len) { str += code[i]; i++; }
            tokens.push({ type: 'string', value: str });
            continue;
          }

          // 字符串 - 双引号
          if (code[i] === '"') {
            let str = '"';
            i++;
            while (i < len && code[i] !== '"') {
              if (code[i] === '\\' && i + 1 < len) {
                str += code[i] + code[i + 1];
                i += 2;
              } else {
                str += code[i];
                i++;
              }
            }
            if (i < len) { str += code[i]; i++; }
            tokens.push({ type: 'string', value: str });
            continue;
          }

          // 模板字符串
          if (code[i] === '`') {
            let str = '`';
            i++;
            while (i < len && code[i] !== '`') {
              str += code[i];
              i++;
            }
            if (i < len) { str += code[i]; i++; }
            tokens.push({ type: 'string', value: str });
            continue;
          }

          // 数字
          if (this.isDigit(code[i]) || (code[i] === '.' && i + 1 < len && this.isDigit(code[i + 1]))) {
            let num = '';
            while (i < len && (this.isDigit(code[i]) || code[i] === '.' || code[i] === 'x' || code[i] === 'X' || (code[i] >= 'a' && code[i] <= 'f') || (code[i] >= 'A' && code[i] <= 'F'))) {
              num += code[i];
              i++;
            }
            tokens.push({ type: 'number', value: num });
            continue;
          }

          // 标识符
          if (this.isIdentifierStart(code[i])) {
            let id = '';
            while (i < len && this.isIdentifierPart(code[i])) {
              id += code[i];
              i++;
            }
            
            // 判断类型
            if (this.keywords.includes(id)) {
              tokens.push({ type: 'keyword', value: id });
            } else if (this.builtins.includes(id)) {
              tokens.push({ type: 'builtin', value: id });
            } else if (this.constants.includes(id)) {
              tokens.push({ type: 'constant', value: id });
            } else {
              // 检查是否是函数调用
              const nextNonWs = this.peekNextNonWhitespace(code, i);
              if (nextNonWs === '(') {
                tokens.push({ type: 'function', value: id });
              } else {
                tokens.push({ type: 'identifier', value: id });
              }
            }
            continue;
          }

          // 运算符和标点
          const op = code[i];
          if ('+-*/%=<>!&|^~?:;,.()[]{}'.includes(op)) {
            tokens.push({ type: 'operator', value: op });
            i++;
            continue;
          }

          // 其他字符
          tokens.push({ type: 'text', value: code[i] });
          i++;
        }

        return tokens;
      }

      peekNextNonWhitespace(code, i) {
        while (i < code.length && this.isWhitespace(code[i])) {
          i++;
        }
        return i < code.length ? code[i] : '';
      }

      isWhitespace(c) {
        return c === ' ' || c === '\t' || c === '\n' || c === '\r';
      }

      isDigit(c) {
        return c >= '0' && c <= '9';
      }

      isIdentifierStart(c) {
        return (c >= 'a' && c <= 'z') || (c >= 'A' && c <= 'Z') || c === '_' || c === '$';
      }

      isIdentifierPart(c) {
        return this.isIdentifierStart(c) || this.isDigit(c);
      }

      escapeHtml(str) {
        return str
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      render(tokens) {
        let html = '';
        for (const token of tokens) {
          const escaped = this.escapeHtml(token.value);
          switch (token.type) {
            case 'keyword':
              html += '<span class="token-keyword">' + escaped + '</span>';
              break;
            case 'string':
              html += '<span class="token-string">' + escaped + '</span>';
              break;
            case 'comment':
              html += '<span class="token-comment">' + escaped + '</span>';
              break;
            case 'number':
              html += '<span class="token-number">' + escaped + '</span>';
              break;
            case 'function':
              html += '<span class="token-function">' + escaped + '</span>';
              break;
            case 'builtin':
              html += '<span class="token-builtin">' + escaped + '</span>';
              break;
            case 'constant':
              html += '<span class="token-constant">' + escaped + '</span>';
              break;
            default:
              html += escaped;
          }
        }
        return html;
      }
    }

    const highlighter = new CodeHighlighter();

    // ==================== 初始化 ====================
    function init() {
      // 统计
      let totalApi = 0;
      Object.values(apiData).forEach(m => totalApi += m.methods.length);
      $('moduleCount').textContent = Object.keys(apiData).length;
      $('apiCount').textContent = totalApi;

      renderNav();
      renderContent();

      // 事件绑定
      $('menuBtn').addEventListener('click', toggleNav);
      $('overlay').addEventListener('click', toggleNav);
      $('searchInput').addEventListener('input', debounce(handleSearch, 200));
    }

    // ==================== 渲染导航 ====================
    function renderNav() {
      const navList = $('navList');
      navList.innerHTML = Object.entries(apiData).map(([key, m]) => `
        <button class="nav-item w-full text-left px-4 py-3 flex items-center gap-3 ${currentModule === key ? 'active' : ''}" data-module="${key}">
          <span class="w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0" 
                style="background: ${m.color}; color: ${m.color}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
              <path d="M2 17l10 5 10-5"></path>
              <path d="M2 12l10 5 10-5"></path>
            </svg>
          </span>
          <span class="flex-1 min-w-0">
            <div class="font-medium text-sm">${m.name}</div>
            <div class="text-xs text-[var(--text-muted)]">${m.methods.length} API</div>
          </span>
        </button>
      `).join('');

      navList.querySelectorAll('[data-module]').forEach(btn => {
        btn.addEventListener('click', () => {
          currentModule = btn.dataset.module;
          currentTab = 'overview';
          renderNav();
          renderContent();
          toggleNav(false);
        });
      });
    }

    // ==================== 渲染内容 ====================
    function renderContent() {
      const module = apiData[currentModule];
      if (!module) return;

      // Header
      $('moduleHeader').innerHTML = `
        <div class="flex items-start gap-5 animate-fade-in">
          <div class="w-14 h-14 rounded-2xl flex items-center justify-center flex-shrink-0 shadow-lg" 
               style="background: linear-gradient(135deg, ${module.color}20, ${module.color}40); border: 1px solid ${module.color}30">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="${module.color}" stroke-width="2">
              <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
              <path d="M2 17l10 5 10-5"></path>
              <path d="M2 12l10 5 10-5"></path>
            </svg>
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-3 mb-2">
              <h2 class="text-2xl lg:text-3xl font-bold">${module.name}</h2>
              <code class="text-xs px-2 py-1 rounded" style="background: ${module.color}15; color: ${module.color}">${module.moduleName}</code>
            </div>
            <p class="text-[var(--text-secondary)]">${module.description}</p>
          </div>
        </div>
      `;

      // Breadcrumb
      $('breadcrumb').innerHTML = `
        <span class="text-[var(--text-muted)]">文档</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-[var(--text-muted)]">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
        <span style="color: ${module.color}">${module.name}</span>
      `;

      // Tabs
      $('tabsContainer').innerHTML = `
        <button class="tab-btn ${currentTab === 'overview' ? 'active' : ''} text-sm font-medium whitespace-nowrap" data-tab="overview">概述</button>
        <button class="tab-btn ${currentTab === 'methods' ? 'active' : ''} text-sm font-medium text-[var(--text-secondary)] whitespace-nowrap" data-tab="methods">方法列表 (${module.methods.length})</button>
      `;

      $('tabsContainer').querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentTab = btn.dataset.tab;
          renderContent();
        });
      });

      // Content
      const content = currentTab === 'overview' ? renderOverview(module) : renderMethods(module);
      $('contentArea').innerHTML = content;
      bindCopyButtons();
    }

    function renderOverview(module) {
      return `
        <div class="space-y-6">
          <div class="api-card p-6 animate-fade-in">
            <h3 class="text-lg font-semibold mb-4">引入方式</h3>
            <div class="grid md:grid-cols-2 gap-4">
              ${renderCodeBlock(`const ${module.moduleName} = require('${module.moduleName}');`, 'CommonJS')}
              ${renderCodeBlock(`import ${module.moduleName} from '${module.moduleName}';`, 'ES Modules')}
            </div>
          </div>
          <div class="grid md:grid-cols-2 gap-4">
            ${module.methods.slice(0, 4).map((m, i) => `
              <div class="api-card p-5 animate-fade-in stagger-${i + 1}">
                <h4 class="font-semibold mb-2" style="color: ${module.color}">${m.fullName}</h4>
                <code class="text-xs bg-[var(--bg-tertiary)] px-2 py-1 rounded block mb-3">${m.signature}</code>
                <p class="text-sm text-[var(--text-secondary)]">${m.description}</p>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderMethods(module) {
      return `
        <div class="space-y-4">
          ${module.methods.map((m, i) => `
            <div class="api-card animate-fade-in" style="animation-delay: ${i * 0.05}s">
              <div class="p-6 border-b border-[var(--border)]">
                <h4 class="text-lg font-semibold mb-2" style="color: ${module.color}">${m.fullName}</h4>
                <code class="text-sm text-[var(--text-secondary)]">${m.signature}</code>
                <p class="text-[var(--text-secondary)] mt-2">${m.description}</p>
              </div>
              ${m.params.length > 0 ? `
                <div class="p-4 bg-[var(--bg-tertiary)]/30 border-b border-[var(--border)]">
                  <h5 class="text-xs font-semibold text-[var(--text-muted)] uppercase tracking-wider mb-3">参数</h5>
                  <div class="space-y-2">
                    ${m.params.map(p => `
                      <div class="param-tag">
                        <code class="font-mono text-sm" style="color: ${module.color}">${p.name}</code>
                        <span class="text-xs text-[var(--text-muted)]">${p.type}</span>
                        <span class="text-sm text-[var(--text-secondary)]">${p.desc}</span>
                      </div>
                    `).join('')}
                  </div>
                </div>
              ` : ''}
              <div class="p-6">
                ${renderCodeBlock(m.example, '示例')}
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderCodeBlock(code, label) {
      const highlighted = highlighter.highlight(code);
      return `
        <div class="code-block">
          <div class="code-header">
            <div class="code-dots">
              <span class="code-dot red"></span>
              <span class="code-dot yellow"></span>
              <span class="code-dot green"></span>
            </div>
            <div class="flex items-center gap-3">
              <span class="text-xs text-[var(--text-muted)]">${label}</span>
              <button class="btn-copy text-xs px-3 py-1.5 rounded-lg bg-[var(--bg-tertiary)] text-[var(--text-secondary)]">复制</button>
            </div>
          </div>
          <pre class="code-content"><code>${highlighted}</code></pre>
        </div>
      `;
    }

    // ==================== 复制功能 ====================
    function bindCopyButtons() {
      document.querySelectorAll('.btn-copy').forEach(btn => {
        btn.addEventListener('click', async function() {
          const code = this.closest('.code-block').querySelector('code').textContent;
          await navigator.clipboard.writeText(code);
          this.textContent = '已复制';
          this.classList.add('copied');
          showToast();
          setTimeout(() => {
            this.textContent = '复制';
            this.classList.remove('copied');
          }, 2000);
        });
      });
    }

    function showToast() {
      const toast = $('toast');
      toast.style.transform = 'translateY(0)';
      toast.style.opacity = '1';
      setTimeout(() => {
        toast.style.transform = 'translateY(20px)';
        toast.style.opacity = '0';
      }, 2000);
    }

    // ==================== 搜索 ====================
    function handleSearch(e) {
      const query = e.target.value.toLowerCase().trim();
      if (!query) { renderNav(); return; }

      const results = {};
      Object.entries(apiData).forEach(([key, m]) => {
        const matched = m.methods.filter(method =>
          method.name.toLowerCase().includes(query) ||
          method.description.toLowerCase().includes(query)
        );
        if (matched.length > 0) {
          results[key] = { ...m, methods: matched };
        }
      });

      if (Object.keys(results).length === 0) {
        $('navList').innerHTML = '<div class="px-4 py-8 text-center text-[var(--text-muted)]">未找到结果</div>';
      } else {
        // 渲染搜索结果
        $('navList').innerHTML = Object.entries(results).map(([key, m]) => `
          <div class="px-4 py-2">
            <div class="text-xs text-[var(--text-muted)] mb-2">${m.name}</div>
            ${m.methods.map(method => `
              <button class="nav-item w-full text-left px-3 py-2 rounded-lg text-sm" data-module="${key}">
                <span style="color: ${m.color}">${method.fullName}</span>
              </button>
            `).join('')}
          </div>
        `).join('');

        $('navList').querySelectorAll('[data-module]').forEach(btn => {
          btn.addEventListener('click', () => {
            currentModule = btn.dataset.module;
            currentTab = 'methods';
            $('searchInput').value = '';
            renderNav();
            renderContent();
            toggleNav(false);
          });
        });
      }
    }

    // ==================== 工具函数 ====================
    function debounce(fn, delay) {
      let timer;
      return function(...args) {
        clearTimeout(timer);
        timer = setTimeout(() => fn.apply(this, args), delay);
      };
    }

    function toggleNav(force) {
      const sidebar = $('sidebar');
      const overlay = $('overlay');
      const shouldOpen = force !== undefined ? force : !sidebar.classList.contains('open');
      sidebar.classList.toggle('open', shouldOpen);
      overlay.classList.toggle('open', shouldOpen);
    }

    // ==================== 启动 ====================
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
