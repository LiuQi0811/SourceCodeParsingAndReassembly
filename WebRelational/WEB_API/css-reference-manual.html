<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS 参考手册 - 企业级UI应用</title>
  <style>
    /* CSS变量定义 */
    :root {
      --primary-color: #667eea;
      --primary-dark: #5a67d8;
      --secondary-color: #764ba2;
      --accent-color: #f093fb;
      --success-color: #48bb78;
      --warning-color: #ed8936;
      --error-color: #f56565;
      --info-color: #4299e1;
      --bg-primary: #ffffff;
      --bg-secondary: #f7fafc;
      --bg-tertiary: #edf2f7;
      --text-primary: #1a202c;
      --text-secondary: #4a5568;
      --text-muted: #718096;
      --border-color: #e2e8f0;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --transition-fast: 0.15s ease;
      --transition-normal: 0.3s ease;
      --transition-slow: 0.5s ease;
    }

    [data-theme="dark"] {
      --bg-primary: #1a202c;
      --bg-secondary: #2d3748;
      --bg-tertiary: #4a5568;
      --text-primary: #f7fafc;
      --text-secondary: #e2e8f0;
      --text-muted: #a0aec0;
      --border-color: #4a5568;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      line-height: 1.6;
    }

    .app-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg-secondary);
      transition: background var(--transition-normal);
    }

    .app-header {
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      color: white;
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-lg);
    }

    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo { display: flex; align-items: center; gap: 0.75rem; }
    .logo-icon {
      width: 40px; height: 40px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
    }
    .logo-text { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
    .header-actions { display: flex; align-items: center; gap: 1rem; }

    .theme-toggle {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-md);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all var(--transition-fast);
    }
    .theme-toggle:hover { background: rgba(255, 255, 255, 0.3); }

    .search-container { position: relative; width: 300px; }
    .search-input {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.5rem;
      border: 2px solid transparent;
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.15);
      color: white;
      font-size: 0.9rem;
      transition: all var(--transition-fast);
    }
    .search-input::placeholder { color: rgba(255, 255, 255, 0.7); }
    .search-input:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.25);
      border-color: rgba(255, 255, 255, 0.5);
    }
    .search-icon {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.7);
    }

    .main-content {
      flex: 1;
      display: flex;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      padding: 1.5rem;
      gap: 1.5rem;
    }

    .sidebar {
      width: 280px;
      flex-shrink: 0;
      background: var(--bg-primary);
      border-radius: var(--radius-lg);
      padding: 1rem;
      box-shadow: var(--shadow-md);
      height: fit-content;
      position: sticky;
      top: 100px;
    }

    .sidebar-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      padding: 0 0.5rem;
    }

    .sidebar-nav { display: flex; flex-direction: column; gap: 0.25rem; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all var(--transition-fast);
      color: var(--text-secondary);
    }
    .nav-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .nav-item.active {
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      color: white;
    }
    .nav-icon { font-size: 1.25rem; }
    .nav-label { font-size: 0.9rem; font-weight: 500; }
    .nav-count {
      margin-left: auto;
      background: var(--bg-tertiary);
      padding: 0.125rem 0.5rem;
      border-radius: var(--radius-sm);
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .nav-item.active .nav-count {
      background: rgba(255, 255, 255, 0.2);
      color: white;
    }

    .content-area { flex: 1; min-width: 0; }

    .tabs-bar {
      display: flex;
      gap: 0.5rem;
      background: var(--bg-primary);
      padding: 0.5rem;
      border-radius: var(--radius-lg);
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow-sm);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .tab-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      border: none;
      background: transparent;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-secondary);
      transition: all var(--transition-fast);
      white-space: nowrap;
    }
    .tab-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      color: white;
    }
    .tab-icon { font-size: 1.1rem; }

    .category-filter {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .category-btn {
      padding: 0.5rem 1rem;
      border: 2px solid var(--border-color);
      background: var(--bg-primary);
      border-radius: var(--radius-lg);
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      transition: all var(--transition-fast);
    }
    .category-btn:hover { border-color: var(--primary-color); color: var(--primary-color); }
    .category-btn.active {
      background: var(--primary-color);
      border-color: var(--primary-color);
      color: white;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--bg-primary);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-color);
      transition: all var(--transition-normal);
    }
    .card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.75rem;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-primary);
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    }

    .card-category {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0.25rem 0.5rem;
      background: var(--bg-tertiary);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
    }

    .card-description {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    .card-syntax {
      background: var(--bg-tertiary);
      padding: 0.75rem;
      border-radius: var(--radius-md);
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 0.85rem;
      color: var(--text-primary);
      overflow-x: auto;
      margin-bottom: 0.75rem;
    }

    .card-example {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
      padding: 0.75rem;
      border-radius: var(--radius-md);
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 0.85rem;
      color: var(--primary-color);
      border-left: 3px solid var(--primary-color);
    }

    .card-default {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
    }

    .demo-section {
      background: var(--bg-primary);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow-md);
    }

    .demo-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .demo-box {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 1.25rem;
    }

    .demo-box-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border-color);
    }

    .demo-preview {
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
      margin-bottom: 1rem;
      overflow: hidden;
    }

    .demo-preview-box {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      border-radius: var(--radius-md);
      transition: transform 0.3s ease;
    }

    .demo-controls { display: flex; flex-direction: column; gap: 0.75rem; }
    .control-row { display: flex; align-items: center; gap: 0.75rem; }
    .control-label { font-size: 0.85rem; color: var(--text-secondary); min-width: 80px; }

    .control-slider {
      flex: 1;
      -webkit-appearance: none;
      height: 6px;
      border-radius: 3px;
      background: var(--bg-tertiary);
      outline: none;
    }
    .control-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      cursor: pointer;
      box-shadow: var(--shadow-sm);
    }

    .control-value {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-primary);
      min-width: 50px;
      text-align: right;
    }

    .color-preview {
      width: 100%;
      height: 80px;
      border-radius: var(--radius-md);
      margin-bottom: 1rem;
    }

    .color-inputs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
    }

    .color-input-group { display: flex; flex-direction: column; gap: 0.25rem; }
    .color-input-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; }

    .color-input {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 0.9rem;
      text-align: center;
    }

    .gradient-preview {
      width: 100%;
      height: 80px;
      border-radius: var(--radius-md);
      margin-bottom: 1rem;
    }

    .gradient-controls { display: flex; flex-direction: column; gap: 0.75rem; }
    .color-picker-row { display: flex; align-items: center; gap: 0.75rem; }

    .color-picker {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      padding: 0;
    }

    .animation-preview {
      position: relative;
      width: 100%;
      height: 80px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
      margin-bottom: 1rem;
      overflow: hidden;
    }

    .animation-ball {
      position: absolute;
      width: 30px;
      height: 30px;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      border-radius: 50%;
      top: 50%;
      left: 10px;
      transform: translateY(-50%);
    }

    .animation-ball.running { animation: bounce 1s ease-in-out infinite; }

    @keyframes bounce {
      0%, 100% { left: 10px; }
      50% { left: calc(100% - 40px); }
    }

    .animation-btn {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: var(--radius-md);
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      color: white;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    .animation-btn:hover { transform: scale(1.02); }

    .transition-box {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      border-radius: var(--radius-md);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }
    .transition-box:hover {
      transform: scale(1.2) rotate(45deg);
      border-radius: 50%;
    }

    .selector-demo {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 1rem;
      margin-top: 1rem;
    }

    .selector-demo-title {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 0.75rem;
    }

    .selector-demo-elements { display: flex; flex-wrap: wrap; gap: 0.5rem; }

    .demo-element {
      padding: 0.5rem 1rem;
      background: var(--bg-tertiary);
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      color: var(--text-primary);
      transition: all var(--transition-fast);
      cursor: pointer;
      border: none;
    }
    .demo-element:hover { background: var(--primary-color); color: white; }
    .demo-element.active { background: var(--success-color); color: white; }
    .demo-element.disabled { opacity: 0.5; cursor: not-allowed; }
    .demo-element.disabled:hover { background: var(--bg-tertiary); color: var(--text-primary); }

    .pseudo-demo {
      position: relative;
      padding: 1rem;
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
    }
    .pseudo-demo::before { content: '★ '; color: var(--warning-color); }
    .pseudo-demo::after { content: ' →'; color: var(--primary-color); }

    .first-letter-demo::first-letter { font-size: 2em; font-weight: bold; color: var(--primary-color); }
    .first-line-demo::first-line { font-weight: bold; color: var(--primary-color); }
    .selection-demo::selection { background: var(--primary-color); color: white; }
    .placeholder-demo::placeholder { color: var(--primary-color); font-style: italic; }

    .value-type-card {
      background: var(--bg-primary);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      border: 1px solid var(--border-color);
    }

    .value-type-name {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--primary-color);
      margin-bottom: 0.5rem;
    }

    .value-type-desc { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 1rem; }
    .value-examples { display: flex; flex-wrap: wrap; gap: 0.5rem; }

    .value-example {
      padding: 0.25rem 0.75rem;
      background: var(--bg-tertiary);
      border-radius: var(--radius-sm);
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 0.85rem;
      color: var(--text-primary);
    }

    .function-demo {
      margin-top: 1rem;
      padding: 1rem;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
    }

    .calc-demo { display: flex; gap: 1rem; align-items: center; }

    .calc-box {
      height: 40px;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.3s ease forwards; }

    @media (max-width: 1024px) {
      .sidebar { display: none; }
      .main-content { padding: 1rem; }
    }

    @media (max-width: 768px) {
      .header-content { flex-direction: column; align-items: stretch; }
      .search-container { width: 100%; }
      .header-actions { justify-content: center; }
      .tabs-bar { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .tab-label { display: none; }
      .cards-grid { grid-template-columns: 1fr; }
      .demo-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 480px) {
      .logo-text { font-size: 1.2rem; }
      .category-filter { overflow-x: auto; flex-wrap: nowrap; padding-bottom: 0.5rem; }
      .category-btn { flex-shrink: 0; }
    }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-tertiary); border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in { animation: fadeIn 0.3s ease forwards; }

    /* 新增：状态指示器 */
    .status-badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: var(--radius-sm);
      font-size: 0.7rem;
      font-weight: 500;
      margin-left: 0.5rem;
    }
    .status-new { background: var(--success-color); color: white; }
    .status-exp { background: var(--warning-color); color: white; }
  </style>
</head>
<body>
  <div class="app-container" id="app">
    <header class="app-header">
      <div class="header-content">
        <div class="logo">
          <div class="logo-icon">🎨</div>
          <span class="logo-text">CSS 参考手册</span>
        </div>
        <div class="search-container">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-input" id="searchInput" placeholder="搜索CSS属性、选择器...">
        </div>
        <div class="header-actions">
          <button class="theme-toggle" id="themeToggle">
            <span id="themeIcon">🌙</span>
            <span id="themeText">深色模式</span>
          </button>
        </div>
      </div>
    </header>

    <main class="main-content">
      <aside class="sidebar">
        <div class="sidebar-title">导航菜单</div>
        <nav class="sidebar-nav" id="sidebarNav"></nav>
      </aside>

      <div class="content-area">
        <div class="tabs-bar" id="tabsBar"></div>

        <!-- CSS属性 -->
        <div class="tab-content active" id="tab-properties">
          <div class="category-filter" id="categoryFilter"></div>
          <div class="cards-grid" id="propertiesGrid"></div>
        </div>

        <!-- 选择器 -->
        <div class="tab-content" id="tab-selectors">
          <div class="cards-grid" id="selectorsGrid"></div>
        </div>

        <!-- 关系选择器 -->
        <div class="tab-content" id="tab-relations">
          <div class="cards-grid" id="relationsGrid"></div>
        </div>

        <!-- 伪类 -->
        <div class="tab-content" id="tab-pseudo-classes">
          <div class="cards-grid" id="pseudoClassesGrid"></div>
        </div>

        <!-- 伪元素 -->
        <div class="tab-content" id="tab-pseudo-elements">
          <div class="cards-grid" id="pseudoElementsGrid"></div>
        </div>

        <!-- At规则 -->
        <div class="tab-content" id="tab-at-rules">
          <div class="cards-grid" id="atRulesGrid"></div>
        </div>

        <!-- 值类型 -->
        <div class="tab-content" id="tab-values">
          <div class="cards-grid" id="valuesGrid"></div>
        </div>

        <!-- 函数 -->
        <div class="tab-content" id="tab-functions">
          <div class="category-filter" id="functionCategoryFilter"></div>
          <div class="cards-grid" id="functionsGrid"></div>
        </div>

        <!-- 交互演示 -->
        <div class="tab-content" id="tab-interactive">
          <div class="demo-section">
            <h2 class="demo-title">🎮 实时交互演示</h2>
            <div class="demo-grid" id="interactiveGrid"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    // ==================== 完整的CSS属性数据 ====================
    const cssProperties = [
      // ===== 布局属性 =====

      { name: 'cross-fade()', syntax: 'cross-fade(<image-mix>)', description: '混合两张图像', example: 'background: cross-fade(url(a.png), url(b.png), 50%);', category: '其他' },
      { name: 'element()', syntax: 'element(<id-selector>)', description: '将元素作为背景图像使用（实验性）', example: 'background: element(#myElement);', category: '其他' },
      { name: 'counter()', syntax: 'counter(<name> [, <style>]?)', description: '返回计数器的当前值', example: 'content: counter(section) ". ";\ncontent: counter(chapter, upper-roman);', category: '其他' },
      { name: 'counters()', syntax: 'counters(<name>, <separator> [, <style>]?)', description: '返回嵌套计数器的值', example: 'content: counters(item, ".") " ";\ncontent: counters(item, "-", decimal);', category: '其他' },
      { name: 'symbols()', syntax: 'symbols(<type> <symbol>+)', description: '定义内联计数器样式', example: 'list-style: symbols(cyclic "•" "○" "■");', category: '其他' },
      { name: 'calc-size()', syntax: 'calc-size(<basis>, <calc>)', description: '计算尺寸值，支持auto关键字（实验性）', example: 'height: calc-size(auto, size + 20px);', category: '其他' },
      { name: 'anchor()', syntax: 'anchor(<anchor-element>? <anchor-side>, <fallback>?)', description: '锚点定位函数（实验性）', example: 'top: anchor(--my-anchor bottom);', category: '其他' },
      { name: 'anchor-size()', syntax: 'anchor-size(<anchor-element>? <anchor-size>, <fallback>?)', description: '锚点尺寸函数（实验性）', example: 'width: anchor-size(--my-anchor width);', category: '其他' },
      { name: 'path()', syntax: 'path(<string> | <url>)', description: '定义SVG路径，用于clip-path或offset-path', example: 'clip-path: path("M 0 0 L 100 0 L 100 100 Z");\noffset-path: path("M 0 0 Q 50 50 100 0");', category: '其他' },
      { name: 'clip-path', syntax: 'clip-path: <basic-shape> | <geometry-box> | url()', description: '基本形状函数集合', example: 'clip-path: circle(50%);\nclip-path: polygon(50% 0%, 100% 100%, 0% 100%);\nclip-path: inset(10px 20px);', category: '其他' },
      { name: 'circle()', syntax: 'circle(<radius>? [at <position>]?)', description: '定义圆形裁剪区域', example: 'clip-path: circle(50% at center);\nclip-path: circle(100px at 50% 50%);', category: '其他' },
      { name: 'ellipse()', syntax: 'ellipse(<rx> <ry>? [at <position>]?)', description: '定义椭圆形裁剪区域', example: 'clip-path: ellipse(50% 30% at center);', category: '其他' },
      { name: 'inset()', syntax: 'inset(<offset>{1,4} [round <radius>]?)', description: '定义矩形裁剪区域', example: 'clip-path: inset(10px 20px 30px 40px round 10px);', category: '其他' },
      { name: 'polygon()', syntax: 'polygon(<fill-rule>? <vertex>#)', description: '定义多边形裁剪区域', example: 'clip-path: polygon(50% 0%, 100% 100%, 0% 100%);\nclip-path: polygon(evenodd, 0 0, 100% 0, 100% 100%, 0 100%);', category: '其他' },
      { name: 'xywh()', syntax: 'xywh(<x> <y> <width> <height> [round <radius>]?)', description: '定义矩形区域（从指定点开始）', example: 'clip-path: xywh(10px 20px 100px 50px round 5px);', category: '其他' },
      { name: 'rect()', syntax: 'rect(<top> <right> <bottom> <left> [round <radius>]?)', description: '定义矩形区域', example: 'clip-path: rect(10px 100px 50px 10px);', category: '其他' },
    ];

    // 导航数据
    const navItems = [
      { id: 'properties', icon: '📋', label: 'CSS属性', count: cssProperties.length },
      { id: 'selectors', icon: '🎯', label: '选择器', count: cssSelectors.length },
      { id: 'relations', icon: '🔗', label: '关系选择器', count: cssRelationSelectors.length },
      { id: 'pseudo-classes', icon: '🎭', label: '伪类', count: cssPseudoClasses.length },
      { id: 'pseudo-elements', icon: '✨', label: '伪元素', count: cssPseudoElements.length },
      { id: 'at-rules', icon: '📐', label: 'At规则', count: cssAtRules.length },
      { id: 'values', icon: '📏', label: '值类型', count: cssValueTypes.length },
      { id: 'functions', icon: '⚡', label: '函数', count: cssFunctions.length },
      { id: 'interactive', icon: '🎮', label: '交互演示', count: 6 },
    ];

    // 状态变量
    let currentTab = 'properties';
    let currentCategory = 'all';
    let currentFunctionCategory = 'all';
    let darkMode = false;
    let animationRunning = false;
    let searchTerm = '';

    // 初始化
    function init() {
      renderSidebar();
      renderTabs();
      renderCategoryFilter();
      renderFunctionCategoryFilter();
      renderProperties();
      renderSelectors();
      renderRelations();
      renderPseudoClasses();
      renderPseudoElements();
      renderAtRules();
      renderValues();
      renderFunctions();
      renderInteractive();
      setupEventListeners();
      setupInteractiveDemos();
    }

    function renderSidebar() {
      document.getElementById('sidebarNav').innerHTML = navItems.map(item => `
        <div class="nav-item ${currentTab === item.id ? 'active' : ''}" data-tab="${item.id}">
          <span class="nav-icon">${item.icon}</span>
          <span class="nav-label">${item.label}</span>
          <span class="nav-count">${item.count}</span>
        </div>
      `).join('');
    }

    function renderTabs() {
      document.getElementById('tabsBar').innerHTML = navItems.map(item => `
        <button class="tab-btn ${currentTab === item.id ? 'active' : ''}" data-tab="${item.id}">
          <span class="tab-icon">${item.icon}</span>
          <span class="tab-label">${item.label}</span>
        </button>
      `).join('');
    }

    function renderCategoryFilter() {
      const categories = ['all', ...new Set(cssProperties.map(p => p.category))];
      document.getElementById('categoryFilter').innerHTML = categories.map(cat => `
        <button class="category-btn ${currentCategory === cat ? 'active' : ''}" data-category="${cat}">
          ${cat === 'all' ? '全部' : cat}
        </button>
      `).join('');
    }

    function renderFunctionCategoryFilter() {
      const categories = ['all', ...new Set(cssFunctions.map(f => f.category))];
      document.getElementById('functionCategoryFilter').innerHTML = categories.map(cat => `
        <button class="category-btn ${currentFunctionCategory === cat ? 'active' : ''}" data-function-category="${cat}">
          ${cat === 'all' ? '全部' : cat}
        </button>
      `).join('');
    }

    function renderProperties() {
      const filtered = cssProperties.filter(p => {
        const matchesSearch = p.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                             p.description.toLowerCase().includes(searchTerm.toLowerCase());
        const matchesCategory = currentCategory === 'all' || p.category === currentCategory;
        return matchesSearch && matchesCategory;
      });
      
      document.getElementById('propertiesGrid').innerHTML = filtered.map(p => `
        <div class="card">
          <div class="card-header">
            <span class="card-title">${p.name}</span>
            <span class="card-category">${p.category}</span>
          </div>
          <p class="card-description">${p.description}</p>
          <div class="card-syntax">${escapeHtml(p.syntax)}</div>
          <div class="card-example">${escapeHtml(p.example)}</div>
          <div class="card-default">默认值: ${p.defaultValue}</div>
        </div>
      `).join('');
    }

    function renderSelectors() {
      document.getElementById('selectorsGrid').innerHTML = cssSelectors.map(s => `
        <div class="card">
          <div class="card-header">
            <span class="card-title">${s.name}</span>
          </div>
          <p class="card-description">${s.description}</p>
          <div class="card-syntax">${escapeHtml(s.syntax)}</div>
          <div class="card-example">${escapeHtml(s.example)}</div>
          <div class="selector-demo">
            <div class="selector-demo-title">实时演示（悬停查看效果）:</div>
            <div class="selector-demo-elements">
              <span class="demo-element">元素1</span>

              <span class="demo-element disabled">元素3</span>
              <span class="demo-element">元素4</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    function renderRelations() {
      document.getElementById('relationsGrid').innerHTML = cssRelationSelectors.map(s => `
        <div class="card">
          <div class="card-header">
            <span class="card-title">${s.name}</span>
          </div>
          <p class="card-description">${s.description}</p>
          <div class="card-syntax">${escapeHtml(s.syntax)}</div>

          <div class="selector-demo">

            <div style="padding: 0.5rem; background: var(--bg-tertiary); border-radius: var(--radius-sm);">
              <div style="padding: 0.5rem; border: 2px dashed var(--border-color); border-radius: var(--radius-sm);">
                <span style="font-size: 0.8rem; color: var(--text-muted);">父元素</span>
                <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">

                  <span class="demo-element">子元素2</span>
                </div>
              </div>
            </div>
          </div>
        </div>

    function renderPseudoClasses() {
      document.getElementById('pseudoClassesGrid').innerHTML = cssPseudoClasses.map(p => `
        <div class="card">
          <div class="card-header">
            <span class="card-title">${p.name}</span>
          </div>
          <p class="card-description">${p.description}</p>
          <div class="card-syntax">${escapeHtml(p.syntax)}</div>
          <div class="card-example">${escapeHtml(p.example)}</div>

              <button class="demo-element" style="border: none; cursor: pointer;">悬停我</button>

            </div>
          </div>
        </div>
      `).join('');
    }

    function renderPseudoElements() {
      document.getElementById('pseudoElementsGrid').innerHTML = cssPseudoElements.map(p => {
        let demoContent = '';
        if (p.name === '::before' || p.name === '::after') {
          demoContent = '<div class="pseudo-demo">这是一个带有伪元素的文本</div>';
        } else if (p.name === '::first-letter') {
          demoContent = '<p class="first-letter-demo" style="padding: 0.5rem;">这是一段文字，首字母会被放大并着色。</p>';
        } else if (p.name === '::first-line') {
          demoContent = '<p class="first-line-demo" style="padding: 0.5rem;">这是第一行文字会被加粗。这是第二行文字，保持正常样式。继续添加更多内容来展示效果。</p>';
        } else if (p.name === '::selection') {
          demoContent = '<p class="selection-demo" style="padding: 0.5rem;">选中这段文字查看效果，背景色会变成主题色。</p>';
        } else if (p.name === '::placeholder') {
          demoContent = '<input type="text" placeholder="这是占位符文本" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-sm);">';
        } else {
          demoContent = '<div style="padding: 0.5rem; color: var(--text-muted); font-size: 0.85rem;">查看代码示例了解用法</div>';
        }
        
        return `
          <div class="card">
            <div class="card-header">
              <span class="card-title">${p.name}</span>
            </div>
            <p class="card-description">${p.description}</p>
            <div class="card-syntax">${escapeHtml(p.syntax)}</div>
            <div class="card-example">${escapeHtml(p.example)}</div>
            <div class="selector-demo">
              <div class="selector-demo-title">效果演示:</div>
              ${demoContent}
            </div>
          </div>
        `;
      }).join('');
    }

    function renderAtRules() {
      document.getElementById('atRulesGrid').innerHTML = cssAtRules.map(r => `
        <div class="card">
          <div class="card-header">
            <span class="card-title">${r.name}</span>
          </div>
          <p class="card-description">${r.description}</p>
          <div class="card-syntax">${escapeHtml(r.syntax)}</div>
          <div class="card-example">${escapeHtml(r.example)}</div>
        </div>

    function renderValues() {
      document.getElementById('valuesGrid').innerHTML = cssValueTypes.map(v => `
        <div class="value-type-card">

      const filtered = cssFunctions.filter(f => 
        currentFunctionCategory === 'all' || f.category === currentFunctionCategory
      );
      
      document.getElementById('functionsGrid').innerHTML = filtered.map(f => {
        let demoContent = '';
        if (f.category === '数学') {
          demoContent = `
            <div class="function-demo">
              <div class="calc-demo">
                <div class="calc-box" style="width: calc(50% - 10px);">calc(50% - 10px)</div>
                <div class="calc-box" style="width: calc(30% + 20px);">calc(30% + 20px)</div>
              </div>
            </div>
          `;
        } else if (f.category === '颜色') {
          demoContent = `
            <div class="function-demo">
              <div style="display: flex; gap: 0.5rem;">
                <div style="flex: 1; height: 30px; background: rgb(255, 100, 50); border-radius: var(--radius-sm);"></div>
                <div style="flex: 1; height: 30px; background: hsl(200, 80%, 50%); border-radius: var(--radius-sm);"></div>
                <div style="flex: 1; height: 30px; background: rgba(100, 200, 150, 0.7); border-radius: var(--radius-sm);"></div>
              </div>
            </div>
          `;
        } else if (f.category === '渐变') {
          const gradientBg = f.example.replace('background: ', '').replace(/;$/, '');
          demoContent = `
            <div class="function-demo">
              <div style="height: 40px; background: ${gradientBg}; border-radius: var(--radius-sm);"></div>
            </div>
          `;
        } else if (f.category === '滤镜') {
          demoContent = `
            <div class="function-demo">
              <div style="display: flex; gap: 0.5rem; align-items: center;">
                <div style="width: 40px; height: 40px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: var(--radius-sm);"></div>
                <span style="color: var(--text-muted);">→</span>
                <div style="width: 40px; height: 40px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: var(--radius-sm); filter: ${f.example.replace('filter: ', '').replace(/;$/, '')};"></div>
              </div>
            </div>
          `;
        }
        
        return `
          <div class="card">
            <div class="card-header">
              <span class="card-title">${f.name}</span>
              <span class="card-category">${f.category}</span>
            </div>
            <p class="card-description">${f.description}</p>
            <div class="card-syntax">${escapeHtml(f.syntax)}</div>
            <div class="card-example">${escapeHtml(f.example)}</div>
            ${demoContent}
          </div>
        `;
      }).join('');
    }

    function renderInteractive() {
      document.getElementById('interactiveGrid').innerHTML = `
        <!-- Transform演示 -->
        <div class="demo-box">

        <div class="demo-box">
          <div class="demo-box-title">RGB 颜色</div>
          <div class="color-preview" id="colorPreview"></div>
          <div class="color-inputs">
            <div class="color-input-group">
              <span class="color-input-label">R</span>
              <input type="number" class="color-input" id="colorR" min="0" max="255" value="66">
            </div>
            <div class="color-input-group">
              <span class="color-input-label">G</span>
              <input type="number" class="color-input" id="colorG" min="0" max="255" value="133">
            </div>
            <div class="color-input-group">
              <span class="color-input-label">B</span>
              <input type="number" class="color-input" id="colorB" min="0" max="255" value="244">
            </div>
            <div class="color-input-group">
              <span class="color-input-label">A</span>
              <input type="number" class="color-input" id="colorA" min="0" max="1" step="0.1" value="1">
            </div>
          </div>
          <div style="margin-top: 0.75rem; font-size: 0.85rem; color: var(--text-muted);" id="colorCode">
            rgba(66, 133, 244, 1)
          </div>
        </div>

        <!-- 渐变演示 -->
        <div class="demo-box">
          <div class="demo-box-title">Linear Gradient 线性渐变</div>
          <div class="gradient-preview" id="gradientPreview"></div>
          <div class="gradient-controls">
            <div class="control-row">
              <span class="control-label">角度</span>
              <input type="range" class="control-slider" id="gradientAngle" min="0" max="360" value="45">
              <span class="control-value" id="gradientAngleValue">45°</span>
            </div>
            <div class="color-picker-row">
              <input type="color" class="color-picker" id="gradientColor1" value="#667eea">
              <span style="font-size: 0.85rem; color: var(--text-secondary);">起始颜色</span>
              <input type="color" class="color-picker" id="gradientColor2" value="#764ba2" style="margin-left: auto;">
              <span style="font-size: 0.85rem; color: var(--text-secondary);">结束颜色</span>
            </div>
          </div>
        </div>

        <!-- 动画演示 -->
        <div class="demo-box">
          <div class="demo-box-title">Animation 动画</div>
          <div class="animation-preview">
            <div class="animation-ball" id="animationBall"></div>
          </div>
          <button class="animation-btn" id="animationBtn">▶ 播放动画</button>
          <div style="margin-top: 0.75rem; font-size: 0.85rem; color: var(--text-muted);">
            @keyframes bounce { 0%, 100% { left: 10px; } 50% { left: calc(100% - 40px); } }
          </div>
        </div>

        <!-- 过渡演示 -->
        <div class="demo-box">
          <div class="demo-box-title">Transition 过渡</div>
          <div class="demo-preview">
            <div class="transition-box"></div>
          </div>
          <div style="font-size: 0.85rem; color: var(--text-muted);">
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
          </div>
          <div style="margin-top: 0.5rem; font-size: 0.85rem; color: var(--text-secondary);">
            悬停方块查看过渡效果：缩放 + 旋转 + 圆角变化
          </div>
        </div>

        <!-- clamp演示 -->
        <div class="demo-box">
          <div class="demo-box-title">clamp() 响应式字体</div>
          <div style="font-size: clamp(1rem, 2.5vw, 2rem); padding: 1rem; background: var(--bg-tertiary); border-radius: var(--radius-md); text-align: center; margin-bottom: 0.75rem;">
            响应式文字大小
          </div>
          <div style="font-size: 0.85rem; color: var(--text-muted);">
            font-size: clamp(1rem, 2.5vw, 2rem);
          </div>
          <div style="margin-top: 0.5rem; font-size: 0.85rem; color: var(--text-secondary);">
            调整浏览器窗口大小查看效果
          </div>
        </div>
      `;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function setupEventListeners() {
      // 选项卡切换
      document.getElementById('tabsBar').addEventListener('click', (e) => {
        const btn = e.target.closest('.tab-btn');
        if (btn) {
          currentTab = btn.dataset.tab;
          updateActiveStates();
        }
      });

      // 侧边栏导航
      document.getElementById('sidebarNav').addEventListener('click', (e) => {
        const item = e.target.closest('.nav-item');
        if (item) {
          currentTab = item.dataset.tab;
          updateActiveStates();
        }
      });

      // 分类过滤
      document.getElementById('categoryFilter').addEventListener('click', (e) => {
        const btn = e.target.closest('.category-btn');
        if (btn && btn.dataset.category) {
          currentCategory = btn.dataset.category;
          renderCategoryFilter();
          renderProperties();
        }
      });

      // 函数分类过滤
      document.getElementById('functionCategoryFilter').addEventListener('click', (e) => {
        const btn = e.target.closest('.category-btn');
        if (btn && btn.dataset.functionCategory) {
          currentFunctionCategory = btn.dataset.functionCategory;
          renderFunctionCategoryFilter();
          renderFunctions();
        }
      });

      // 搜索
      document.getElementById('searchInput').addEventListener('input', (e) => {
        searchTerm = e.target.value;
        renderProperties();
      });

      // 主题切换
      document.getElementById('themeToggle').addEventListener('click', () => {
        darkMode = !darkMode;
        document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
        document.getElementById('themeIcon').textContent = darkMode ? '☀️' : '🌙';
        document.getElementById('themeText').textContent = darkMode ? '浅色模式' : '深色模式';
      });
    }

    function updateActiveStates() {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === currentTab);
      });
      
      document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.toggle('active', item.dataset.tab === currentTab);
      });
      
      document.querySelectorAll('.tab-content').forEach(content => {
        content.classList.toggle('active', content.id === `tab-${currentTab}`);
      });
    }

    function setupInteractiveDemos() {
      // Transform演示
      const rotateSlider = document.getElementById('rotateSlider');
      const scaleSlider = document.getElementById('scaleSlider');
      const translateSlider = document.getElementById('translateSlider');
      const transformBox = document.getElementById('transformBox');

      function updateTransform() {
        const rotate = rotateSlider.value;
        const scale = scaleSlider.value / 100;
        const translate = translateSlider.value;
        transformBox.style.transform = `rotate(${rotate}deg) scale(${scale}) translateX(${translate}px)`;
        document.getElementById('rotateValue').textContent = `${rotate}°`;
        document.getElementById('scaleValue').textContent = `${scaleSlider.value}%`;
        document.getElementById('translateValue').textContent = `${translate}px`;
      }

      rotateSlider.addEventListener('input', updateTransform);
      scaleSlider.addEventListener('input', updateTransform);
      translateSlider.addEventListener('input', updateTransform);

      // 颜色演示
      ['colorR', 'colorG', 'colorB', 'colorA'].forEach(id => {
        document.getElementById(id).addEventListener('input', updateColor);
      });
      updateColor();

      // 渐变演示
      document.getElementById('gradientAngle').addEventListener('input', updateGradient);
      document.getElementById('gradientColor1').addEventListener('input', updateGradient);
      document.getElementById('gradientColor2').addEventListener('input', updateGradient);
      updateGradient();

      // 动画演示
      document.getElementById('animationBtn').addEventListener('click', () => {
        animationRunning = !animationRunning;
        const ball = document.getElementById('animationBall');
        const btn = document.getElementById('animationBtn');
        ball.classList.toggle('running', animationRunning);
        btn.textContent = animationRunning ? '⏸ 暂停动画' : '▶ 播放动画';
      });
    }

    function updateColor() {
      const r = document.getElementById('colorR').value;
      const g = document.getElementById('colorG').value;
      const b = document.getElementById('colorB').value;
      const a = document.getElementById('colorA').value;
      document.getElementById('colorPreview').style.background = `rgba(${r}, ${g}, ${b}, ${a})`;
      document.getElementById('colorCode').textContent = `rgba(${r}, ${g}, ${b}, ${a})`;
    }

    function updateGradient() {
      const angle = document.getElementById('gradientAngle').value;
      const color1 = document.getElementById('gradientColor1').value;
      const color2 = document.getElementById('gradientColor2').value;
      document.getElementById('gradientPreview').style.background = `linear-gradient(${angle}deg, ${color1}, ${color2})`;
      document.getElementById('gradientAngleValue').textContent = `${angle}°`;
    }

    // 启动应用
    init();
  </script>
</body>
</html>
