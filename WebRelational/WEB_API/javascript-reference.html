<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript 企业级参考手册</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #3b82f6;
            --secondary-color: #64748b;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --code-bg: #1e293b;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 20px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-lg);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.2);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
        }

        .logo-text h1 {
            font-size: 24px;
            font-weight: 700;
        }

        .logo-text p {
            font-size: 13px;
            opacity: 0.9;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: white;
            color: var(--primary-color);
        }

        .btn-primary:hover {
            background: #f1f5f9;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.25);
        }

        /* Main Container */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Tab Navigation */
        .tab-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
            background: var(--card-bg);
            padding: 12px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
        }

        .tab-btn {
            padding: 12px 20px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-radius: var(--radius-md);
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab-btn:hover {
            background: var(--bg-color);
            color: var(--text-primary);
        }

        .tab-btn.active {
            background: var(--primary-color);
            color: white;
        }

        /* Tab Content */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Section Cards */
        .section-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            transition: all 0.3s;
        }

        .card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-badge {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: 500;
        }

        .badge-success {
            background: #dcfce7;
            color: #166534;
        }

        .badge-warning {
            background: #fef3c7;
            color: #92400e;
        }

        .badge-info {
            background: #dbeafe;
            color: #1e40af;
        }

        .card-body {
            padding: 20px;
        }

        /* Code Block */
        .code-block {
            background: var(--code-bg);
            border-radius: var(--radius-md);
            padding: 16px;
            margin: 12px 0;
            overflow-x: auto;
        }

        .code-block pre {
            margin: 0;
            color: #e2e8f0;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 13px;
            line-height: 1.5;
        }

        .code-block .keyword { color: #c792ea; }
        .code-block .string { color: #c3e88d; }
        .code-block .number { color: #f78c6c; }
        .code-block .comment { color: #546e7a; }
        .code-block .function { color: #82aaff; }
        .code-block .operator { color: #89ddff; }

        /* Output Area */
        .output-area {
            background: #f1f5f9;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            margin-top: 12px;
            font-family: monospace;
            font-size: 13px;
            min-height: 40px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .output-area.success {
            border-color: var(--success-color);
            background: #ecfdf5;
        }

        .output-area.error {
            border-color: var(--danger-color);
            background: #fef2f2;
        }

        /* Input Group */
        .input-group {
            display: flex;
            gap: 8px;
            margin: 12px 0;
            flex-wrap: wrap;
        }

        .input-group input,
        .input-group select {
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 14px;
            flex: 1;
            min-width: 120px;
            transition: border-color 0.2s;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn-run {
            background: var(--primary-color);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-run:hover {
            background: var(--primary-dark);
        }

        .btn-run:active {
            transform: scale(0.98);
        }

        /* API List */
        .api-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
        }

        .api-tag {
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .api-tag:hover {
            background: var(--primary-color);
            color: white;
        }

        /* Stats */
        .stats-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            flex: 1;
            min-width: 150px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary-color);
        }

        .stat-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }

            .section-grid {
                grid-template-columns: 1fr;
            }

            .tab-nav {
                overflow-x: auto;
                flex-wrap: nowrap;
                padding: 8px;
            }

            .tab-btn {
                padding: 10px 16px;
                font-size: 13px;
            }

            .stats-row {
                flex-direction: column;
            }
        }

        /* Search */
        .search-box {
            position: relative;
            margin-bottom: 20px;
        }

        .search-box input {
            width: 100%;
            padding: 14px 20px 14px 48px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-lg);
            font-size: 15px;
            transition: all 0.2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
        }

        /* Description */
        .description {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 16px;
            line-height: 1.7;
        }

        /* Table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
        }

        .data-table th,
        .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .data-table th {
            background: #f8fafc;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .data-table td {
            font-size: 14px;
        }

        .data-table tr:hover td {
            background: #f8fafc;
        }

        /* Full Width Card */
        .card-full {
            grid-column: 1 / -1;
        }

        /* Method List */
        .method-item {
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            margin: 8px 0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .method-item:hover {
            border-color: var(--primary-color);
            background: #f8fafc;
        }

        .method-name {
            font-weight: 600;
            color: var(--primary-color);
        }

        .method-desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--text-primary);
            color: white;
            padding: 14px 24px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Loading */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">JS</div>
                <div class="logo-text">
                    <h1>JavaScript 企业级参考手册</h1>
                    <p>原生 API 完整实现 · 可交互演示</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="runAllTests()">🧪 运行所有测试</button>
                <button class="btn btn-primary" onclick="exportResults()">📊 导出结果</button>
            </div>
        </div>
    </header>

    <main class="main-container">
        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-value" id="totalApis">250</div>
                <div class="stat-label">API 总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="testedApis">0</div>
                <div class="stat-label">已测试</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="passedApis">0</div>
                <div class="stat-label">通过测试</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="failedApis">0</div>
                <div class="stat-label">测试失败</div>
            </div>
        </div>

        <!-- Search -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索 API、方法、属性..." oninput="handleSearch()">
        </div>

        <!-- Tab Navigation -->
        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="builtins">📦 内置对象</button>
            <button class="tab-btn" data-tab="operators">➕ 表达式和运算符</button>
            <button class="tab-btn" data-tab="statements">📝 语句和声明</button>
            <button class="tab-btn" data-tab="functions">⚙️ 函数</button>
            <button class="tab-btn" data-tab="classes">🏛️ 类</button>
            <button class="tab-btn" data-tab="regexp">🔍 正则表达式</button>
            <button class="tab-btn" data-tab="errors">⚠️ 错误处理</button>
            <button class="tab-btn" data-tab="more">📚 更多其他</button>
        </nav>

        <!-- Tab Contents -->
        <div id="builtins" class="tab-content active">
            <div class="section-grid" id="builtins-content"></div>
        </div>

        <div id="operators" class="tab-content">
            <div class="section-grid" id="operators-content"></div>
        </div>

        <div id="statements" class="tab-content">
            <div class="section-grid" id="statements-content"></div>
        </div>

        <div id="functions" class="tab-content">
            <div class="section-grid" id="functions-content"></div>
        </div>

        <div id="classes" class="tab-content">
            <div class="section-grid" id="classes-content"></div>
        </div>

        <div id="regexp" class="tab-content">
            <div class="section-grid" id="regexp-content"></div>
        </div>

        <div id="errors" class="tab-content">
            <div class="section-grid" id="errors-content"></div>
        </div>

        <div id="more" class="tab-content">
            <div class="section-grid" id="more-content"></div>
        </div>
    </main>

    <script>
        // ==================== 全局状态 ====================
        const testResults = {
            total: 0,
            tested: 0,
            passed: 0,
            failed: 0
        };

        // ==================== 工具函数 ====================
        function updateStats() {
            document.getElementById('totalApis').textContent = testResults.total;
            document.getElementById('testedApis').textContent = testResults.tested;
            document.getElementById('passedApis').textContent = testResults.passed;
            document.getElementById('failedApis').textContent = testResults.failed;
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = type === 'success' ? '#10b981' : '#ef4444';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function escapeHtml(str) {
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function formatOutput(value) {
            if (value === undefined) return 'undefined';
            if (value === null) return 'null';
            if (typeof value === 'object') {
                try {
                    return JSON.stringify(value, null, 2);
                } catch {
                    return String(value);
                }
            }
            return String(value);
        }

        // ==================== Tab 切换 ====================
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
            });
        });

        // ==================== 搜索功能 ====================
        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.card').forEach(card => {
                const text = card.textContent.toLowerCase();
                card.style.display = text.includes(query) ? '' : 'none';
            });
        }

        // ==================== 内置对象模块 ====================
        function initBuiltins() {
            const container = document.getElementById('builtins-content');
            
            // Object 对象
            container.innerHTML += `
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">🔷 Object 对象</span>
                        <span class="card-badge badge-success">核心对象</span>
                    </div>
                    <div class="card-body">
                        <p class="description">Object 是 JavaScript 中所有对象的基类，提供了创建和操作对象的方法。</p>
                        <div class="api-list">
                            <span class="api-tag" onclick="testObjectKeys()">Object.keys()</span>
                            <span class="api-tag" onclick="testObjectValues()">Object.values()</span>
                            <span class="api-tag" onclick="testObjectEntries()">Object.entries()</span>
                            <span class="api-tag" onclick="testObjectAssign()">Object.assign()</span>
                            <span class="api-tag" onclick="testObjectFreeze()">Object.freeze()</span>
                            <span class="api-tag" onclick="testObjectSeal()">Object.seal()</span>
                            <span class="api-tag" onclick="testObjectDefineProperty()">defineProperty()</span>
                            <span class="api-tag" onclick="testObjectDefineProperties()">defineProperties()</span>
                            <span class="api-tag" onclick="testObjectGetOwnPropertyDescriptor()">getOwnPropertyDescriptor()</span>
                            <span class="api-tag" onclick="testObjectGetOwnPropertyDescriptors()">getOwnPropertyDescriptors()</span>
                            <span class="api-tag" onclick="testObjectGetOwnPropertyNames()">getOwnPropertyNames()</span>
                            <span class="api-tag" onclick="testObjectGetOwnPropertySymbols()">getOwnPropertySymbols()</span>
                            <span class="api-tag" onclick="testObjectGetPrototypeOf()">getPrototypeOf()</span>
                            <span class="api-tag" onclick="testObjectSetPrototypeOf()">setPrototypeOf()</span>
                            <span class="api-tag" onclick="testObjectCreate()">Object.create()</span>
                            <span class="api-tag" onclick="testObjectIs()">Object.is()</span>
                            <span class="api-tag" onclick="testObjectIsExtensible()">isExtensible()</span>
                            <span class="api-tag" onclick="testObjectPreventExtensions()">preventExtensions()</span>
                        </div>
                        <div class="code-block">
                            <pre><span class="keyword">const</span> obj = { a: <span class="number">1</span>, b: <span class="number">2</span> };
<span class="comment">// 获取所有键</span>
Object.<span class="function">keys</span>(obj); <span class="comment">// ['a', 'b']</span>
<span class="comment">// 定义属性</span>
Object.<span class="function">defineProperty</span>(obj, 'c', {
    value: <span class="number">3</span>,
    writable: <span class="keyword">false</span>,
    enumerable: <span class="keyword">true</span>
});</pre>
                        </div>
                        <div class="input-group">
                            <button class="btn-run" onclick="testAllObjectMethods()">▶ 运行所有测试</button>
                        </div>
                        <div class="output-area" id="object-output">点击运行测试查看结果...</div>
                    </div>
                </div>
            `;

            // Array 数组
            container.innerHTML += `
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">📊 Array 数组</span>
                        <span class="card-badge badge-success">核心对象</span>
                    </div>
                    <div class="card-body">
                        <p class="description">Array 是用于存储有序集合的对象，提供了丰富的数组操作方法。</p>
                        <div class="api-list">
                            <span class="api-tag" onclick="testArrayMap()">map()</span>
                            <span class="api-tag" onclick="testArrayFilter()">filter()</span>
                            <span class="api-tag" onclick="testArrayReduce()">reduce()</span>
                            <span class="api-tag" onclick="testArrayReduceRight()">reduceRight()</span>
                            <span class="api-tag" onclick="testArrayFind()">find()</span>
                            <span class="api-tag" onclick="testArrayFindIndex()">findIndex()</span>
                            <span class="api-tag" onclick="testArrayFindLast()">findLast()</span>
                            <span class="api-tag" onclick="testArrayFindLastIndex()">findLastIndex()</span>
                            <span class="api-tag" onclick="testArraySort()">sort()</span>
                            <span class="api-tag" onclick="testArrayToSorted()">toSorted()</span>
                            <span class="api-tag" onclick="testArrayReverse()">reverse()</span>
                            <span class="api-tag" onclick="testArrayToReversed()">toReversed()</span>
                            <span class="api-tag" onclick="testArrayFlat()">flat()</span>
                            <span class="api-tag" onclick="testArrayFlatMap()">flatMap()</span>
                            <span class="api-tag" onclick="testArrayIncludes()">includes()</span>
                            <span class="api-tag" onclick="testArrayIndexOf()">indexOf()</span>
                            <span class="api-tag" onclick="testArrayLastIndexOf()">lastIndexOf()</span>
                            <span class="api-tag" onclick="testArrayEvery()">every()</span>
                            <span class="api-tag" onclick="testArraySome()">some()</span>
                            <span class="api-tag" onclick="testArrayPush()">push()</span>
                            <span class="api-tag" onclick="testArrayPop()">pop()</span>
                            <span class="api-tag" onclick="testArrayShift()">shift()</span>
                            <span class="api-tag" onclick="testArrayUnshift()">unshift()</span>
                            <span class="api-tag" onclick="testArraySplice()">splice()</span>
                            <span class="api-tag" onclick="testArrayToSpliced()">toSpliced()</span>
                            <span class="api-tag" onclick="testArraySlice()">slice()</span>
                            <span class="api-tag" onclick="testArrayConcat()">concat()</span>
                            <span class="api-tag" onclick="testArrayJoin()">join()</span>
                            <span class="api-tag" onclick="testArrayFill()">fill()</span>

            document.getElementById('object-output').textContent = `Object.preventExtensions():\n禁止添加新属性，但可修改/删除\nobj = ${JSON.stringify(obj)}\nObject.isExtensible(): ${Object.isExtensible(obj)}`;
            document.getElementById('object-output').className = 'output-area success';

        function testAllObjectMethods() {
            const obj = { a: 1, b: 2, c: 3 };
            const results = [];
            
            // 基础方法
            results.push(`=== 基础方法 ===`);
            results.push(`Object.keys: ${JSON.stringify(Object.keys(obj))}`);
            results.push(`Object.values: ${JSON.stringify(Object.values(obj))}`);
            results.push(`Object.entries: ${JSON.stringify(Object.entries(obj))}`);
            results.push(`Object.assign: ${JSON.stringify(Object.assign({}, obj, { d: 4 }))}`);
            
            // freeze/seal
            const frozen = Object.freeze({ x: 1 });
            results.push(`\n=== 冻结/密封 ===`);
            results.push(`Object.freeze.isFrozen: ${Object.isFrozen(frozen)}`);
            const sealed = Object.seal({ y: 1 });
            results.push(`Object.seal.isSealed: ${Object.isSealed(sealed)}`);
            
            // defineProperty
            const defObj = {};
            Object.defineProperty(defObj, 'name', { value: 'test', writable: false });
            results.push(`\n=== defineProperty ===`);
            results.push(`defineProperty: ${JSON.stringify(defObj)}`);
            results.push(`getOwnPropertyDescriptor: ${JSON.stringify(Object.getOwnPropertyDescriptor(defObj, 'name'))}`);
            
            // defineProperties
            const multiObj = {};
            Object.defineProperties(multiObj, { a: { value: 1, enumerable: true }, b: { value: 2, enumerable: true } });
            results.push(`defineProperties: ${JSON.stringify(multiObj)}`);
            
            // getOwnPropertyNames/Symbols
            const symObj = { a: 1, [Symbol('s')]: 2 };
            Object.defineProperty(symObj, 'hidden', { value: 3, enumerable: false });
            results.push(`\n=== 属性查询 ===`);
            results.push(`getOwnPropertyNames: ${JSON.stringify(Object.getOwnPropertyNames(symObj))}`);
            results.push(`getOwnPropertySymbols: ${Object.getOwnPropertySymbols(symObj).length} 个`);
            results.push(`getOwnPropertyDescriptors: ${Object.keys(Object.getOwnPropertyDescriptors(symObj)).length} 个属性`);
            
            // 原型操作
            results.push(`\n=== 原型操作 ===`);
            results.push(`getPrototypeOf({}) === Object.prototype: ${Object.getPrototypeOf({}) === Object.prototype}`);
            const created = Object.create({ proto: true });
            results.push(`Object.create: ${created.proto}`);
            
            // Object.is
            results.push(`\n=== Object.is ===`);
            results.push(`Object.is(NaN, NaN): ${Object.is(NaN, NaN)}`);
            results.push(`Object.is(-0, +0): ${Object.is(-0, +0)}`);
            
            // 可扩展性
            results.push(`\n=== 可扩展性 ===`);
            const extObj = {};
            results.push(`isExtensible({}): ${Object.isExtensible(extObj)}`);
            Object.preventExtensions(extObj);
            results.push(`preventExtensions 后: ${Object.isExtensible(extObj)}`);
            
            document.getElementById('object-output').textContent = results.join('\n');
            document.getElementById('object-output').className = 'output-area success';
            testResults.tested += 18;
            testResults.passed += 18;
            updateStats();
        }

        }

            results.push(`\nReflect 方法:`);
            results.push(`Reflect.get(obj, 'name'): ${Reflect.get(obj, 'name')}`);
            results.push(`Reflect.set(obj, 'age', 31): ${Reflect.set(obj, 'age', 31)}`);
            results.push(`Reflect.has(obj, 'name'): ${Reflect.has(obj, 'name')}`);
            results.push(`Reflect.ownKeys(obj): ${JSON.stringify(Reflect.ownKeys(obj))}`);
            results.push(`Reflect.deleteProperty(obj, 'age'): ${Reflect.deleteProperty(obj, 'age')}`);
            results.push(`Reflect.ownKeys(obj) 删除后: ${JSON.stringify(Reflect.ownKeys(obj))}`);
            
            document.getElementById('reflect-output').textContent = results.join('\n');
            document.getElementById('reflect-output').className = 'output-area success';
        }

        function testGlobalEncode() {
            const input = document.getElementById('global-input').value;
            const encoded = encodeURI(input);
            const encodedComponent = encodeURIComponent(input);
            
            document.getElementById('global-output').textContent = `原字符串: '${input}'\n\nencodeURI: '${encoded}'\nencodeURIComponent: '${encodedComponent}'`;
            document.getElementById('global-output').className = 'output-area success';
        }

        function testGlobalDecode() {
            const input = document.getElementById('global-input').value;
            try {
                const decoded = decodeURI(input);
                document.getElementById('global-output').textContent = `输入: '${input}'\n\ndecodeURI: '${decoded}'`;
                document.getElementById('global-output').className = 'output-area success';
            } catch (e) {
                document.getElementById('global-output').textContent = `解码错误: ${e.message}`;
                document.getElementById('global-output').className = 'output-area error';
            }
        }

        function testSetTimeout() {
            const delay = parseInt(document.getElementById('timer-delay').value);
            const output = document.getElementById('timer-output');
            
            output.textContent = `等待 ${delay}ms...`;
            output.className = 'output-area';
            
            const start = Date.now();
            setTimeout(() => {
                const elapsed = Date.now() - start;
                output.textContent = `setTimeout 回调执行!\n延迟: ${elapsed}ms`;
                output.className = 'output-area success';
            }, delay);
        }

        let intervalId = null;
        let intervalCount = 0;

        function testSetInterval() {
            const delay = parseInt(document.getElementById('timer-delay').value);
            const output = document.getElementById('timer-output');
            
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = null;
                intervalCount = 0;
                output.textContent = '已停止之前的定时器';
                return;
            }
            
            intervalCount = 0;
            output.textContent = `开始周期执行 (每 ${delay}ms)...\n计数: ${intervalCount}`;
            
            intervalId = setInterval(() => {
                intervalCount++;
                output.textContent = `setInterval 执行中...\n计数: ${intervalCount}\n\n点击再次停止`;
            }, delay);
        }

        function testWeakMap() {
            const weakMap = new WeakMap();
            const obj1 = { id: 1 };
            const obj2 = { id: 2 };
            
            weakMap.set(obj1, 'metadata1');
            weakMap.set(obj2, 'metadata2');
            
            const results = [];
            results.push(`WeakMap 操作:`);
            results.push(`const weakMap = new WeakMap();`);
            results.push(`weakMap.set(obj1, 'metadata1');`);
            results.push(`weakMap.set(obj2, 'metadata2');`);
            results.push(`\nweakMap.get(obj1): '${weakMap.get(obj1)}'`);
            results.push(`weakMap.has(obj2): ${weakMap.has(obj2)}`);
            results.push(`weakMap.delete(obj1): ${weakMap.delete(obj1)}`);
            results.push(`weakMap.has(obj1): ${weakMap.has(obj1)}`);
            results.push(`\n注意: WeakMap 的键必须是对象，且不会阻止垃圾回收`);
            
            document.getElementById('weak-output').textContent = results.join('\n');
            document.getElementById('weak-output').className = 'output-area success';
        }

        function testWeakSet() {
            const weakSet = new WeakSet();

            const obj2 = { id: 2 };
            
            weakSet.add(obj1);

            results.push(`\nweakSet.has(obj1): ${weakSet.has(obj1)}`);

        function testBigInt() {
            const input = document.getElementById('bigint-input').value;
            
            const big1 = BigInt(input);
            const big2 = 9007199254740992n;
            
            const results = [];
            results.push(`BigInt 操作:`);
            results.push(`const big1 = BigInt('${input}');`);
            results.push(`big1: ${big1}`);
            results.push(`typeof big1: ${typeof big1}`);
            results.push(`\n运算:`);
            results.push(`big1 + 1n: ${big1 + 1n}`);
            results.push(`big1 * 2n: ${big1 * 2n}`);
            results.push(`big1 ** 2n: ${big1 ** 2n}`);
            results.push(`\n比较:`);
            results.push(`big1 < ${big2}n: ${big1 < big2}`);
            results.push(`big1 === BigInt('${input}'): ${big1 === BigInt(input)}`);
            results.push(`\n转换:`);
            results.push(`String(big1): '${String(big1)}'`);
            results.push(`Number(123n): ${Number(123n)}`);
            results.push(`\n注意: BigInt 与 Number 不能混合运算`);
            
            document.getElementById('bigint-output').textContent = results.join('\n');
            document.getElementById('bigint-output').className = 'output-area success';
        }

        // ==================== 运行所有测试 ====================
        function runAllTests() {
            testResults.tested = 0;
            testResults.passed = 0;
            testResults.failed = 0;
            
            // 运行所有测试
            testAllObjectMethods();
            testAllArrayMethods();
            testAllStringMethods();
            testAllNumberMethods();
            testAllDateMethods();
            testAllMathMethods();
            testAllJSONMethods();
            testAllMapSetMethods();
            testAllPromiseMethods();
            testAllSymbolMethods();
            
            showToast(`测试完成! 通过: ${testResults.passed}, 失败: ${testResults.failed}`);
        }

        // ==================== 导出结果 ====================
        function exportResults() {
            const data = {
                timestamp: new Date().toISOString(),
                results: testResults,
                userAgent: navigator.userAgent
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'javascript-test-results.json';
            a.click();
            URL.revokeObjectURL(url);
            
            showToast('结果已导出!');
        }

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            initBuiltins();
            initOperators();
            initStatements();
            initFunctions();
            initClasses();
            initRegexp();
            initErrors();
            initMore();
            
            // 计算总 API 数
            testResults.total = 250;
            updateStats();
        });
    </script>
