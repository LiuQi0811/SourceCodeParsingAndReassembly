<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar Group 带组的头像</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
            href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap"
            rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/gh/alpinejs/alpine@v2.x.x/dist/alpine.min.js"></script>
</head>

<body>
<div class="flex items-center justify-center -space-x-1">
    <div class="h-10 w-10">
        <img class="h-full w-full rounded-full object-cover object-center ring ring-white"
             src="https://images.unsplash.com/photo-1645378999013-95abebf5f3c1?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80"
             alt=""/>
    </div>
    <div class="h-10 w-10">
        <img class="h-full w-full rounded-full object-cover object-center ring ring-white"
             src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80"
             alt=""/>
    </div>
    <div class="h-10 w-10">
        <img class="h-full w-full rounded-full object-cover object-center ring ring-white"
             src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80"
             alt=""/>
    </div>
    <div class="h-10 w-10">
        <img class="h-full w-full rounded-full object-cover object-center ring ring-white"
             src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80"
             alt=""/>
    </div>
    <div class="h-10 w-10">
        <img class="h-full w-full rounded-full object-cover object-center ring ring-white"
             src="https://images.unsplash.com/photo-1568602471122-7832951cc4c5?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80"
             alt=""/>
    </div>
    <div class="h-10 w-10">
        <img class="h-full w-full rounded-full object-cover object-center ring ring-white"
             src="https://images.unsplash.com/photo-1487309078313-fad80c3ec1e5?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80"
             alt=""/>
    </div>
    <div class="flex h-10 w-10 items-center justify-center overflow-hidden rounded-full bg-blue-100 text-blue-400 ring ring-white">
        <span class="text-base"> LQ </span>
    </div>
</div>
</body>

</html>
