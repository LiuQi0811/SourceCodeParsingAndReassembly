<div id="app">
</div>
<script src="./vue.global.js"></script>
<script>
    const {
        createApp,
        ref
    } = Vue;

    // ComputedCount 组件
    const ComputedCount = {
        setup() {
            const count = ref(0);
            const increment = () => {
                count.value++;
            };
            return {
                count,increment
            };
        },
        template: `
            <div class="card">
                <button @click="increment">Count is: {{ count }}</button>
            </div>
        `
    };
    // OriginalHtml 组件
    const OriginalHtml = {
        setup(){
            const rawHtml = ref('<span style="color: red">This should be red.</span>');
            return {rawHtml };
        },
        template: `
            <div class="original-html card">
                <p>Using text interpolation: {{ rawHtml }}</p>
                <p>Using v-html directive:<span v-html="rawHtml"></span></p>
            </div>
        `
    };

    // AttributeBinding 组件
    const AttributeBinding = {
        setup(){
            const titleClass = ref("title");
            return {titleClass};
        },
        template: `
        <div class="attribute-binding card">
            <h1 :class="titleClass">Make me red</h1>
        </div>
        `
    };

    // FormBinding 组件
    const FormBinding = {
        setup(){
            const text = ref("");
            const onInput = (event) => {
                text.value = event.target.value;
            };
            return {
                text,
                onInput
            };
        },
        template: `
        <div class="form-binding card">
           <input :value="text" @input="onInput" placeholder="Type here">
           <p>{{ text }}</p>
        </div>
        `
    };

    // ConditionalRendering 组件
    const ConditionalRendering = {
        setup(){
            const awesome = ref(true);
            function toggle() {
               awesome.value = !awesome.value;
            };
            return {awesome,toggle};
        },
        template: `
        <div class="conditional-rendering card">
            <button @click="toggle">Toggle</button>
            <h1 v-if="awesome">Vue is awesome!</h1>
            <h1 v-else>Oh no</h1>
        </div>
        `
    };

    // App 根组件
    const App = {
        components: {
            ComputedCount,
            OriginalHtml,
            AttributeBinding,
            FormBinding,
            ConditionalRendering
        },
        setup() {
            return {};
        },
        template: `
        <div class="container">
            <ComputedCount />
            <OriginalHtml />
            <AttributeBinding />
            <FormBinding />
            <ConditionalRendering />
        </div>
        `
    }
    createApp(App).mount("#app");
</script>
