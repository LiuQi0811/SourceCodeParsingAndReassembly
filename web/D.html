<div id="app">
    <div v-for="item in msgList" :key="item">
        <span @click="Click(item)">{{ item }}</span>
    </div>
</div>
<script src="./vue.global.js"></script>
<script>
    const { createApp, ref } = Vue;
    const app = createApp({
        setup() {
            const Click = (item) => {
                alert(item);
            }
            const msgList = ref([1, 2, 3, 4, 5, 6]);
            return {
                msgList, Click
            }
        }
    });
    app.mount('#app');
</script>
