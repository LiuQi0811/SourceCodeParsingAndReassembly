<div id="app">
    <button @click="count++">Count is: {{ count }}</button>
</div>
<script type="importmap">
    { "imports": { "vue": "./vue.esm-browser.js" } }
</script>
<script type="module">
    import {createApp, ref} from 'vue';

    createApp({
        setup() {
            const count = ref(0);
            return {count}
        }
    }).mount("#app");
</script>
