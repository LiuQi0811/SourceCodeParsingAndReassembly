<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue 3 API 完整演示</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 1400px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 20px; }
        .demo-card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .demo-card h3 { margin-top: 0; color: #42b883; border-bottom: 2px solid #42b883; padding-bottom: 10px; }
        .demo-output { background: #f8f8f8; border: 1px solid #ddd; border-radius: 4px; padding: 10px; margin-top: 10px; font-family: 'Courier New', monospace; font-size: 13px; overflow-x: auto; white-space: pre-wrap; word-wrap: break-word; }
        button { background: #42b883; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin: 5px; }
        button:hover { background: #33a06f; }
        input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; margin: 5px; }
        h1 { text-align: center; color: #35495e; }
        .section-title { grid-column: 1 / -1; color: #35495e; margin-top: 30px; margin-bottom: 10px; font-size: 20px; border-left: 4px solid #42b883; padding-left: 10px; }
        .component-box { border: 1px solid #e0e0e0; border-radius: 6px; padding: 15px; margin: 10px 0; background: #fafafa; }
        .child-component { border: 1px dashed #999; border-radius: 4px; padding: 10px; margin: 10px 0; background: #f0f7ff; }
    </style>
</head>
<body>
    <h1>Vue 3 API 完整演示</h1>
    <div id="app"></div>
    
    <script src="script.js"></script>
    <script>
        const { ref, reactive, computed, watch, watchEffect, createApp, 
                provide, inject, shallowRef, triggerRef, unref, toValue, nextTick } = Vue;

        // Demo 1: ref
        const Demo1 = {
            setup() {
                const count = ref(0);
                const message = ref('Hello Vue 3!');
                return { count, message };
            },
            template: '<div class="demo-card"><h3>1. ref</h3><p>创建响应式引用值</p><div><button @click="count++">count++</button><input v-model="message" placeholder="输入内容"></div><div class="demo-output">count: {{ count }}<br>message: {{ message }}</div></div>'
        };

        // Demo 2: reactive
        const Demo2 = {
            setup() {
                const user = reactive({ name: '张三', age: 25 });
                return { user };
            },
            template: '<div class="demo-card"><h3>2. reactive</h3><p>创建响应式对象</p><div><input v-model="user.name" placeholder="姓名"><input v-model.number="user.age" type="number" placeholder="年龄"></div><div class="demo-output">姓名: {{ user.name }}<br>年龄: {{ user.age }}</div></div>'
        };

        // Demo 3: computed
        const Demo3 = {
            setup() {
                const a = ref(10);
                const b = ref(20);
                const sum = computed(() => a.value + b.value);
                return { a, b, sum };
            },
            template: '<div class="demo-card"><h3>3. computed</h3><p>计算属性</p><div><input v-model.number="a" type="number"><span>+</span><input v-model.number="b" type="number"></div><div class="demo-output">A: {{ a }}<br>B: {{ b }}<br>sum: {{ sum }}</div></div>'
        };

        // Demo 4: watch & watchEffect
        const Demo4 = {
            setup() {
                const count = ref(0);
                const log = ref([]);
                watch(count, (n, o) => log.value.push('watch: ' + o + '→' + n));
                watchEffect(() => log.value.push('watchEffect: ' + count.value));
                return { count, log };
            },
            template: '<div class="demo-card"><h3>4. watch & watchEffect</h3><button @click="count++">增加计数</button><div class="demo-output"><pre>{{ log.slice(-6).join("\\n") }}</pre></div></div>'
        };

        // Demo 5: 工具函数
        const Demo5 = {
            setup() {
                const input = ref('hello-world');
                return { input };
            },
            template: '<div class="demo-card"><h3>5. 工具函数</h3><p>camelize, capitalize</p><input v-model="input" placeholder="输入文本"><div class="demo-output">原始: {{ input }}<br>camelize: {{ input.replace(/-\\w/g, c => c.slice(1).toUpperCase()) }}<br>capitalize: {{ input.charAt(0).toUpperCase() + input.slice(1) }}</div></div>'
        };

        // Demo 6: normalizeClass & normalizeStyle
        const Demo6 = {
            setup() {
                return {};
            },
            template: '<div class="demo-card"><h3>6. normalizeClass & normalizeStyle</h3><div class="demo-output"><strong>normalizeClass:</strong><br>数组: ["a","b"] → a b<br>对象: {"a":true,"b":false} → a<br><br><strong>normalizeStyle:</strong><br>对象: {"color":"red","fontSize":"14px"} → {"color":"red","fontSize":"14px"}</div></div>'
        };

        // Demo 7: nextTick
        const Demo7 = {
            setup() {
                const log = ref([]);
                const test = async() => {
                    log.value.push('1. 开始');
                    log.value.push('2. 修改DOM');
                    await nextTick();
                    log.value.push('3. nextTick后');
                };
                return { log, test };
            },
            template: '<div class="demo-card"><h3>7. nextTick</h3><button @click="test">测试 nextTick</button><div class="demo-output"><pre>{{ log.join("\\n") }}</pre></div></div>'
        };

        // Demo 8: mergeProps
        const Demo8 = {
            setup() {
                return {};
            },
            template: '<div class="demo-card"><h3>8. mergeProps</h3><div class="demo-output">props1: {"class":"foo"}<br>props2: {"class":"bar","style":{"color":"red"}}<br>merged: {"class":"foo bar","style":{"color":"red"}}</div></div>'
        };

        // Demo 10: Props & Emits
        const ChildComp = {
            props: ['msg'],
            emits: ['update', 'notify'],
            setup(props, { emit }) {
                const local = ref(0);
                const inc = () => { local.value++; emit('update', local.value); };
                const notify = () => emit('notify', '来自子组件的通知!');
                return { local, inc, notify };
            },
            template: '<div class="child-component"><h4>子组件</h4><p>收到Prop: {{ msg }}</p><p>本地计数: {{ local }}</p><button @click="inc">增加并emit</button><button @click="notify">发送通知</button></div>'
        };

        const Demo10 = {
            components: { ChildComp },
            setup() {
                const pMsg = ref('Hello from Parent');
                const received = ref('');
                const note = ref('');
                return { pMsg, received, note };
            },
            template: '<div class="demo-card"><h3>10. Props & Emits</h3><div class="component-box"><h4>父组件</h4><input v-model="pMsg"><p>收到update: {{ received }}</p><p>收到notify: {{ note }}</p><ChildComp :msg="pMsg" @update="v => received = v" @notify="m => note = m" /></div></div>'
        };

        // Demo 11: Provide & Inject
        const DeepChild = {
            setup() {
                const theme = inject('theme');
                const user = inject('user');
                const update = inject('updateUser');
                const updateDeep = () => update({name: "Updated Deep"});
                return { theme, user, update, updateDeep };
            },
            template: '<div class="child-component"><h5>深层子组件</h5><p>Theme: {{ theme }}</p><p>User: {{ user ? user.name : "无" }}</p><button @click="updateDeep">深层更新</button></div>'
        };

        const Demo11 = {
            components: { DeepChild },
            setup() {
                const theme = ref('light');
                const user = reactive({ name: 'Root User' });
                provide('theme', theme);
                provide('user', user);
                provide('updateUser', u => Object.assign(user, u));
                const toggle = () => theme.value = theme.value === 'light' ? 'dark' : 'light';
                const updateRootUser = () => user.name = 'Changed Root';
                return { theme, user, toggle, updateRootUser };
            },
            template: '<div class="demo-card"><h3>11. Provide & Inject</h3><div class="component-box"><h4>根组件 (Provider)</h4><p>Theme: {{ theme }}</p><p>User: {{ user.name }}</p><button @click="toggle">切换主题</button><button @click="updateRootUser">根更新</button><div class="child-component"><h4>中间组件</h4><DeepChild /></div></div></div>'
        };

        // Demo 12: 插槽
        const CardComp = {
            props: ['title'],
            template: '<div class="component-box"><h4>{{ title }}</h4><slot name="header" :count="5">默认头部</slot><hr><div style="padding:10px 0;"><slot>默认内容</slot></div><hr><slot name="footer">默认底部</slot></div>'
        };

        const Demo12 = {
            components: { CardComp },
            setup() {
                const item1 = ref('项目1');
                const item2 = ref('项目2');
                const item3 = ref('项目3');
                return { item1, item2, item3 };
            },
            template: '<div class="demo-card"><h3>12. 插槽</h3><div><CardComp title="带所有插槽"><template #header="{count}"><span style="color:#42b883">自定义头部 (count: {{count}})</span></template><p>自定义内容!</p><ul><li>{{item1}}</li><li>{{item2}}</li><li>{{item3}}</li></ul><template #footer><button style="background:#35495e">自定义按钮</button></template></CardComp><br><CardComp title="只有默认"><p>只有默认内容</p></CardComp></div></div>'
        };

        // Demo 13: shallowRef 等
        const Demo13 = {
            setup() {
                const shallow = shallowRef({ count: 0 });
                const maybe = ref('我是ref');
                const not = '我不是';
                const updateDeep = () => shallow.value.count++;
                const updateRoot = () => shallow.value = { count: shallow.value.count + 1 };
                const force = () => triggerRef(shallow);
                return { shallow, maybe, not, updateDeep, updateRoot, force, uMaybe: () => unref(maybe), uNot: () => unref(not), vMaybe: () => toValue(maybe), vFn: () => toValue(() => '函数返回值') };
            },
            template: '<div class="demo-card"><h3>13. shallowRef 等</h3><div><h4>shallowRef</h4><p>shallow.count: {{ shallow.count }}</p><button @click="updateDeep">深层修改</button><button @click="updateRoot">根级修改</button><button @click="force">triggerRef强制更新</button><h4 style="margin-top:15px">unref / toValue</h4><div class="demo-output">unref(maybe): {{ uMaybe() }}<br>unref(not): {{ uNot() }}<br>toValue(maybe): {{ vMaybe() }}<br>toValue(fn): {{ vFn() }}</div></div></div>'
        };

        // 主 App
        const App = {
            components: { Demo1, Demo2, Demo3, Demo4, Demo5, Demo6, Demo7, Demo8, Demo10, Demo11, Demo12, Demo13 },
            setup() { return {}; },
            template: '<div class="container"><h2 class="section-title">第一部分：基础响应式 API</h2><Demo1 /><Demo2 /><Demo3 /><Demo4 /><h2 class="section-title">第二部分：工具函数</h2><Demo5 /><Demo6 /><Demo7 /><Demo8 /><h2 class="section-title">第三部分：组件</h2><Demo10 /><Demo11 /><Demo12 /><Demo13 /></div>'
        };

        const app = createApp(App);
        app.mount('#app');
    </script>
</body>
</html>
