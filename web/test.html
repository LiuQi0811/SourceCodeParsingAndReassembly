<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试页面</title>
</head>
<body>
    <h1>测试页面</h1>
    <div id="test1"></div>
    <div id="test2"></div>
    <div id="app"></div>
    
    <script src="script.js"></script>
    <script>
        // 测试 1: 检查 Vue 是否存在
        const test1 = document.getElementById('test1');
        test1.innerHTML = '<p>Vue 是否存在: ' + (typeof Vue !== 'undefined' ? '✅ 是' : '❌ 否') + '</p>';
        
        if (typeof Vue !== 'undefined') {
            // 测试 2: 列出 Vue 的导出
            const test2 = document.getElementById('test2');
            const exports = Object.keys(Vue).sort();
            test2.innerHTML = '<p>Vue 导出的属性: ' + exports.join(', ') + '</p>';
            
            // 测试 3: 简单的 Vue 应用
            const { ref, createApp } = Vue;
            
            const TestApp = {
                setup() {
                    const count = ref(0);
                    return { count };
                },
                template: '<div><button @click="count++">点击计数: {{ count }}</button></div>'
            };
            
            const app = createApp(TestApp);
            app.mount('#app');
        }
    </script>
</body>
</html>
